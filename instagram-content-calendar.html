.stat-card .label{font-size:0.75rem;color:#8b949e;}

.modal h3{font-size:1.1rem;margin-bottom:16px;color:#e6edf3;}
.input-group{margin-bottom:14px;}
.input-group label{display:block;font-size:0.85rem;color:#8b949e;margin-bottom:6px;font-weight:500;}
.input-group input,.input-group textarea,.input-group select{width:100%;padding:10px 14px;background:rgba(13,17,23,0.8);border:1px solid rgba(48,54,61,0.8);border-radius:8px;color:#e6edf3;font-size:0.95rem;outline:none;transition:border-color .3s;font-family:inherit;}
.input-group input:focus,.input-group textarea:focus,.input-group select:focus{border-color:#58a6ff;}

.type-pill.reel{color:#f85149;}
.type-pill.post{color:#58a6ff;}
.type-pill.story{color:#d29922;}
.type-pill.carousel{color:#39d353;}
.type-pill.active{font-weight:700;}
.type-pill.reel.active{background:rgba(248,81,73,0.2);border-color:#f85149;}

.type-pill.story.active{background:rgba(210,153,34,0.2);border-color:#d29922;}
.type-pill.carousel.active{background:rgba(57,211,83,0.2);border-color:#39d353;}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all .3s;}

.btn-sm{padding:6px 14px;font-size:0.8rem;background:rgba(48,54,61,0.6);color:#e6edf3;border:1px solid rgba(48,54,61,0.8);}
.btn-sm:hover{background:rgba(88,166,255,0.15);border-color:#58a6ff;}
.btn-danger{background:rgba(248,81,73,0.15);color:#f85149;border:1px solid rgba(248,81,73,0.3);}
.btn-danger:hover{background:rgba(248,81,73,0.25);}
.modal-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:#39d353;color:#0d1117;padding:10px 24px;border-radius:8px;font-weight:700;opacity:0;transition:all 0.3s;pointer-events:none;z-index:200;font-size:0.9rem;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
footer{text-align:center;padding:20px;color:#484f58;font-size:0.8rem;border-top:1px solid rgba(48,54,61,0.4);}
footer a{color:#8b949e;margin:0 10px;}footer a:hover{color:#58a6ff;}
@media(max-width:700px){h1{font-size:1.5rem;}main{padding:20px 10px 60px;}.card{padding:14px;}.day-cell{min-height:70px;padding:4px;}.day-header{font-size:0.65rem;padding:6px 2px;}.content-tag{font-size:0.55rem;}}
</style>

<main>
<h1>Instagram Content Calendar</h1>
<p class="subtitle">Plan Reels, Stories, Posts, and Carousels across a monthly calendar</p>
<span class="free-badge">100% Free</span>

<div class="card">
<div class="stats-row" id="statsRow">
<div class="stat-card"><div class="num" id="totalPosts">0</div><div class="label">Total Posts</div></div>
<div class="stat-card"><div class="num" id="reelCount" style="color:#f85149">0</div><div class="label">Reels</div></div>
<div class="stat-card"><div class="num" id="postCount" style="color:#58a6ff">0</div><div class="label">Posts</div></div>
<div class="stat-card"><div class="num" id="storyCount" style="color:#d29922">0</div><div class="label">Stories</div></div>

<div class="card">

</div>
<div class="legend-bar">
<div class="legend-item"><div class="legend-dot" style="background:#f85149"></div>Reel</div>
<div class="legend-item"><div class="legend-dot" style="background:#58a6ff"></div>Post</div>
<div class="legend-item"><div class="legend-dot" style="background:#d29922"></div>Story</div>
<div class="legend-item"><div class="legend-dot" style="background:#39d353"></div>Carousel</div>
</div>
<div class="calendar-grid" id="calendarGrid"></div>
<div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
<button class="btn btn-sm" onclick="exportCalendar()">Export as Text</button>
<button class="btn btn-sm btn-danger" onclick="clearMonth()">Clear Month</button>
</div>
</div>
</main>

<div class="modal-overlay" id="modal">
<div class="modal">
<h3 id="modalTitle">Add Content</h3>
<div class="type-pills" id="typePills">
<div class="type-pill reel" data-v="reel" onclick="selectType('reel')">Reel</div>
<div class="type-pill post active" data-v="post" onclick="selectType('post')">Post</div>
<div class="type-pill story" data-v="story" onclick="selectType('story')">Story</div>
<div class="type-pill carousel" data-v="carousel" onclick="selectType('carousel')">Carousel</div>
</div>
<div class="input-group"><label>Title / Topic</label><input type="text" id="contentTitle" placeholder="e.g. Morning routine tips"></div>
<div class="input-group"><label>Caption / Notes</label><textarea id="contentNotes" placeholder="Brief description or caption draft..."></textarea></div>
<div class="input-group"><label>Time to Post</label><input type="time" id="contentTime" value="10:00"></div>
<div class="input-group"><label>Hashtag Group (optional)</label><input type="text" id="contentHashtags" placeholder="e.g. fitness, wellness"></div>
<div class="modal-actions">
<button class="btn btn-primary" onclick="saveContent()">Save</button>
<button class="btn btn-sm btn-danger" id="deleteBtn" style="display:none" onclick="deleteContent()">Delete</button>
<button class="btn btn-sm" onclick="closeModal()">Cancel</button>
</div>
</div>
</div>

<div class="toast" id="toast"></div>
<script>
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='u'))e.preventDefault();});

let currentDate=new Date();
let currentMonth=currentDate.getMonth();
let currentYear=currentDate.getFullYear();
let calendarData=JSON.parse(localStorage.getItem('ig_calendar')||'{}');
let editingKey=null;
let editingIdx=null;
let selectedType='post';

function getKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

function renderCalendar(){
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('monthTitle').textContent=`${months[currentMonth]} ${currentYear}`;
const firstDay=new Date(currentYear,currentMonth,1).getDay();
const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
const today=new Date();
let html='';
['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{html+=`<div class="day-header">${d}</div>`;});
for(let i=0;i<firstDay;i++)html+=`<div class="day-cell empty"></div>`;
for(let d=1;d<=daysInMonth;d++){
const key=getKey(currentYear,currentMonth,d);
const isToday=today.getDate()===d&&today.getMonth()===currentMonth&&today.getFullYear()===currentYear;
const items=calendarData[key]||[];
html+=`<div class="day-cell${isToday?' today':''}" onclick="openModal('${key}',${d})"><div class="day-num">${d}</div>`;
items.forEach((item,idx)=>{html+=`<div class="content-tag ${item.type}" onclick="event.stopPropagation();editItem('${key}',${idx})">${item.title||item.type}</div>`;});
html+=`</div>`;
}
document.getElementById('calendarGrid').innerHTML=html;
updateStats();
}

function updateStats(){
let total=0,reels=0,posts=0,stories=0,carousels=0;
const prefix=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
Object.keys(calendarData).forEach(k=>{
if(!k.startsWith(prefix))return;
(calendarData[k]||[]).forEach(item=>{
total++;
if(item.type==='reel')reels++;
else if(item.type==='post')posts++;
else if(item.type==='story')stories++;
else if(item.type==='carousel')carousels++;
});
});
document.getElementById('totalPosts').textContent=total;
document.getElementById('reelCount').textContent=reels;
document.getElementById('postCount').textContent=posts;
document.getElementById('storyCount').textContent=stories;
document.getElementById('carouselCount').textContent=carousels;
}

function changeMonth(d){currentMonth+=d;if(currentMonth>11){currentMonth=0;currentYear++;}if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();}

function openModal(key,day){
editingKey=key;editingIdx=null;selectedType='post';
document.getElementById('modalTitle').textContent=`Add Content - Day ${day}`;
document.getElementById('contentTitle').value='';
document.getElementById('contentNotes').value='';
document.getElementById('contentTime').value='10:00';
document.getElementById('contentHashtags').value='';
document.getElementById('deleteBtn').style.display='none';
selectType('post');
document.getElementById('modal').classList.add('show');
}

function editItem(key,idx){
const item=(calendarData[key]||[])[idx];if(!item)return;
editingKey=key;editingIdx=idx;selectedType=item.type;
document.getElementById('modalTitle').textContent='Edit Content';
document.getElementById('contentTitle').value=item.title||'';
document.getElementById('contentNotes').value=item.notes||'';
document.getElementById('contentTime').value=item.time||'10:00';
document.getElementById('contentHashtags').value=item.hashtags||'';
document.getElementById('deleteBtn').style.display='inline-block';
selectType(item.type);
document.getElementById('modal').classList.add('show');
}

function selectType(t){
selectedType=t;
document.querySelectorAll('.type-pill').forEach(p=>{p.classList.toggle('active',p.dataset.v===t);});
}

function saveContent(){
const title=document.getElementById('contentTitle').value.trim();
if(!title)return showToast('Enter a title');
const item={type:selectedType,title,notes:document.getElementById('contentNotes').value,time:document.getElementById('contentTime').value,hashtags:document.getElementById('contentHashtags').value};
if(!calendarData[editingKey])calendarData[editingKey]=[];
if(editingIdx!==null)calendarData[editingKey][editingIdx]=item;
else calendarData[editingKey].push(item);
save();closeModal();renderCalendar();showToast('Content saved!');
}

function deleteContent(){
if(editingIdx!==null&&calendarData[editingKey]){calendarData[editingKey].splice(editingIdx,1);if(!calendarData[editingKey].length)delete calendarData[editingKey];save();closeModal();renderCalendar();showToast('Deleted');}
}

function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function clearMonth(){
if(!confirm('Clear all content for this month?'))return;
const prefix=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
Object.keys(calendarData).forEach(k=>{if(k.startsWith(prefix))delete calendarData[k];});
save();renderCalendar();showToast('Month cleared');
}

function exportCalendar(){
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const prefix=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
let text=`Instagram Content Calendar - ${months[currentMonth]} ${currentYear}\n${'='.repeat(50)}\n\n`;
const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
for(let d=1;d<=daysInMonth;d++){
const key=getKey(currentYear,currentMonth,d);
const items=calendarData[key]||[];
if(!items.length)continue;
text+=`Day ${d}:\n`;
items.forEach(item=>{text+=`  [${item.type.toUpperCase()}] ${item.title} @ ${item.time}\n`;if(item.notes)text+=`    Notes: ${item.notes}\n`;});
text+='\n';
}
navigator.clipboard.writeText(text).then(()=>showToast('Calendar exported to clipboard!'));
}

function save(){localStorage.setItem('ig_calendar',JSON.stringify(calendarData));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
renderCalendar();
</script>
