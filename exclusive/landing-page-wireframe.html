<style>

.section-palette .add-btn:hover{border-color:#ff5f1f;color:#ff5f1f}

.wire-section.drag-over{border-color:#4caf50;box-shadow:0 0 10px rgba(76,175,80,.3)}

.wire-body .field input,.wire-body .field textarea{width:100%}

.preview-content.light{background:#ffffff;color:#222}

.preview-section{padding:40px 24px;text-align:center;border-bottom:1px solid rgba(128,128,128,.2)}
.preview-section:last-child{border-bottom:none}
.preview-section h2{font-size:1.4rem;margin-bottom:8px}
.preview-section h3{font-size:1.1rem;margin-bottom:6px}
.preview-section p{font-size:.95rem;opacity:.8;max-width:600px;margin:0 auto;line-height:1.5}
.preview-section .btn-mock{display:inline-block;padding:10px 24px;border-radius:6px;font-weight:600;margin-top:12px}
.light .preview-section .btn-mock{background:#ff5f1f;color:#fff}
.dark .preview-section .btn-mock{background:#ff5f1f;color:#fff}
.preview-section .feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;text-align:center}

.preview-section .faq-item strong{color:#ff5f1f}

.empty{text-align:center;color:#555;padding:40px 20px;font-size:.95rem}

@media(max-width:700px){
.section-palette{gap:6px}
.section-palette .add-btn{padding:6px 10px;font-size:.8rem}
header h1{font-size:1.1rem}
.preview-section .feature-grid,.preview-section .pricing-grid{grid-template-columns:1fr}
}

<script>
const LS_KEY='spunkcodes_landingwireframe';
let wireframes=[];
let activeIdx=0;
let previewTheme='dark';
let dragIdx=null;

const DEFAULTS={
hero:{heading:'Your Amazing Product',subheading:'The best solution for your needs. Start today and see results.',buttonText:'Get Started'},
features:{heading:'Features',feature1:'Fast Performance',feature2:'Easy to Use',feature3:'Reliable Support',desc1:'Lightning fast speeds.', desc2:'Intuitive interface.',desc3:'24/7 expert help.'},
testimonials:{heading:'What People Say',quote:'"This product changed everything for us. Highly recommended."',author:'- Jane D., CEO'},
pricing:{heading:'Pricing',plan1:'Starter',price1:'$9/mo',plan2:'Pro',price2:'$29/mo',plan3:'Enterprise',price3:'$99/mo'},
cta:{heading:'Ready to Get Started?',subheading:'Join thousands of happy customers today.',buttonText:'Start Free Trial'},
faq:{heading:'FAQ',q1:'How does it work?',a1:'Simply sign up and follow the setup wizard.',q2:'Is there a free trial?',a2:'Yes, we offer a 14-day free trial with full access.'},
footer:{text:'Copyright 2026. All rights reserved.',links:'Privacy Policy | Terms of Service | Contact'}
};

function load(){try{wireframes=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){wireframes=[]}if(!wireframes.length){wireframes=[{name:'My Landing Page',sections:[]}];save()}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(wireframes))}
function getWf(){return wireframes[activeIdx]||{name:'',sections:[]}}

function renderList(){
const el=document.getElementById('wireframesList');
el.innerHTML='';
wireframes.forEach((w,i)=>{
const b=document.createElement('button');
b.className='w-btn'+(i===activeIdx?' active':'');
b.textContent=w.name;
b.onclick=()=>{activeIdx=i;render()};
el.appendChild(b);
});
}

function createWireframe(){
const name=document.getElementById('newWireName').value.trim();
if(!name)return;
wireframes.push({name,sections:[]});
activeIdx=wireframes.length-1;
document.getElementById('newWireName').value='';
save();render();
}

function deleteWireframe(){
if(wireframes.length<=1){alert('Cannot delete the only wireframe.');return}
if(!confirm('Delete "'+getWf().name+'"?'))return;
wireframes.splice(activeIdx,1);
activeIdx=Math.min(activeIdx,wireframes.length-1);
save();render();
}

function addSection(type){
const data=JSON.parse(JSON.stringify(DEFAULTS[type]||{}));
getWf().sections.push({type,data});
save();renderBuilder();renderPreview();
}

function removeSection(idx){
getWf().sections.splice(idx,1);
save();renderBuilder();renderPreview();
}

function moveSection(idx,dir){
const s=getWf().sections;const ni=idx+dir;
if(ni<0||ni>=s.length)return;
[s[idx],s[ni]]=[s[ni],s[idx]];
save();renderBuilder();renderPreview();
}

function updateField(idx,field,value){
getWf().sections[idx].data[field]=value;
save();renderPreview();
}

function renderBuilder(){
const area=document.getElementById('builderArea');
const sections=getWf().sections;
if(!sections.length){area.innerHTML='<div class="empty">Click buttons above to add sections to your wireframe.</div>';return}
let html='';
sections.forEach((s,i)=>{
html+='<div class="wire-section" draggable="true" data-idx="'+i+'" ondragstart="onDragStart(event,'+i+')" ondragover="onDragOver(event)" ondragenter="onDragEnter(event,this)" ondragleave="onDragLeave(this)" ondrop="onDrop(event,'+i+')" ondragend="onDragEnd()">'+
'<div class="wire-header"><span class="type-label">'+esc(s.type)+'</span>'+
'<div class="actions">'+
'<button class="secondary" onclick="moveSection('+i+',-1)">&uarr;</button>'+
'<button class="secondary" onclick="moveSection('+i+',1)">&darr;</button>'+
'<button class="danger" onclick="removeSection('+i+')">&times;</button>'+
'</div></div><div class="wire-body">';
html+=buildFields(s,i);
html+='</div></div>';
});
area.innerHTML=html;
}

function buildFields(section,idx){
const d=section.data;
const t=section.type;
let f='';
if(t==='hero'){
f+=field(idx,'heading',d.heading,'Heading');
f+=field(idx,'subheading',d.subheading,'Subheading','textarea');
f+=field(idx,'buttonText',d.buttonText,'Button Text');
}else if(t==='features'){
f+=field(idx,'heading',d.heading,'Section Heading');
f+=field(idx,'feature1',d.feature1,'Feature 1 Title');
f+=field(idx,'desc1',d.desc1,'Feature 1 Desc');
f+=field(idx,'feature2',d.feature2,'Feature 2 Title');
f+=field(idx,'desc2',d.desc2,'Feature 2 Desc');
f+=field(idx,'feature3',d.feature3,'Feature 3 Title');
f+=field(idx,'desc3',d.desc3,'Feature 3 Desc');
}else if(t==='testimonials'){
f+=field(idx,'heading',d.heading,'Section Heading');
f+=field(idx,'quote',d.quote,'Quote','textarea');
f+=field(idx,'author',d.author,'Author');
}else if(t==='pricing'){
f+=field(idx,'heading',d.heading,'Section Heading');
f+=field(idx,'plan1',d.plan1,'Plan 1 Name');
f+=field(idx,'price1',d.price1,'Plan 1 Price');
f+=field(idx,'plan2',d.plan2,'Plan 2 Name');
f+=field(idx,'price2',d.price2,'Plan 2 Price');
f+=field(idx,'plan3',d.plan3,'Plan 3 Name');
f+=field(idx,'price3',d.price3,'Plan 3 Price');
}else if(t==='cta'){
f+=field(idx,'heading',d.heading,'Heading');
f+=field(idx,'subheading',d.subheading,'Subheading');
f+=field(idx,'buttonText',d.buttonText,'Button Text');
}else if(t==='faq'){
f+=field(idx,'heading',d.heading,'Section Heading');
f+=field(idx,'q1',d.q1,'Question 1');
f+=field(idx,'a1',d.a1,'Answer 1');
f+=field(idx,'q2',d.q2,'Question 2');
f+=field(idx,'a2',d.a2,'Answer 2');
}else if(t==='footer'){
f+=field(idx,'text',d.text,'Footer Text');
f+=field(idx,'links',d.links,'Footer Links');
}
return f;
}

function field(idx,key,val,label,type){
const v=esc(String(val||'')).replace(/"/g,'&quot;');
if(type==='textarea')return '<div class="field"><label>'+esc(label)+'</label><textarea onchange="updateField('+idx+',\''+key+'\',this.value)">'+v+'</textarea></div>';
return '<div class="field"><label>'+esc(label)+'</label><input type="text" value="'+v+'" onchange="updateField('+idx+',\''+key+'\',this.value)"></div>';
}

function toggleTheme(){
previewTheme=previewTheme==='dark'?'light':'dark';
document.getElementById('themeToggle').textContent='Switch to '+(previewTheme==='dark'?'Light':'Dark')+' Mode';
renderPreview();
}

function renderPreview(){
const pc=document.getElementById('previewContent');
pc.className='preview-content '+previewTheme;
const sections=getWf().sections;
if(!sections.length){pc.innerHTML='<div class="empty">Add sections and fill in content to see a preview.</div>';return}
let html='';
sections.forEach(s=>{
const d=s.data;
if(s.type==='hero'){
html+='<div class="preview-section"><h2>'+esc(d.heading)+'</h2><p>'+esc(d.subheading)+'</p><div class="btn-mock">'+esc(d.buttonText)+'</div></div>';
}else if(s.type==='features'){
html+='<div class="preview-section"><h2>'+esc(d.heading)+'</h2><div class="feature-grid">'+
'<div class="feature-item"><h3>'+esc(d.feature1)+'</h3><p>'+esc(d.desc1)+'</p></div>'+
'<div class="feature-item"><h3>'+esc(d.feature2)+'</h3><p>'+esc(d.desc2)+'</p></div>'+
'<div class="feature-item"><h3>'+esc(d.feature3)+'</h3><p>'+esc(d.desc3)+'</p></div>'+
'</div></div>';
}else if(s.type==='testimonials'){
html+='<div class="preview-section"><h2>'+esc(d.heading)+'</h2><div class="testimonial"><p>'+esc(d.quote)+'</p><p style="margin-top:8px;font-weight:600">'+esc(d.author)+'</p></div></div>';
}else if(s.type==='pricing'){
html+='<div class="preview-section"><h2>'+esc(d.heading)+'</h2><div class="pricing-grid">'+
'<div class="pricing-card"><h3>'+esc(d.plan1)+'</h3><div class="price">'+esc(d.price1)+'</div><div class="btn-mock" style="font-size:.85rem">Choose Plan</div></div>'+
'<div class="pricing-card"><h3>'+esc(d.plan2)+'</h3><div class="price">'+esc(d.price2)+'</div><div class="btn-mock" style="font-size:.85rem">Choose Plan</div></div>'+
'<div class="pricing-card"><h3>'+esc(d.plan3)+'</h3><div class="price">'+esc(d.price3)+'</div><div class="btn-mock" style="font-size:.85rem">Choose Plan</div></div>'+
'</div></div>';
}else if(s.type==='cta'){
html+='<div class="preview-section" style="background:rgba(255,95,31,.1)"><h2>'+esc(d.heading)+'</h2><p>'+esc(d.subheading)+'</p><div class="btn-mock">'+esc(d.buttonText)+'</div></div>';
}else if(s.type==='faq'){
html+='<div class="preview-section"><h2>'+esc(d.heading)+'</h2>'+
'<div class="faq-item"><strong>'+esc(d.q1)+'</strong><p>'+esc(d.a1)+'</p></div>'+
'<div class="faq-item"><strong>'+esc(d.q2)+'</strong><p>'+esc(d.a2)+'</p></div>'+
'</div>';
}else if(s.type==='footer'){
html+='<div class="preview-section" style="opacity:.7;font-size:.85rem"><p>'+esc(d.text)+'</p><p style="margin-top:6px">'+esc(d.links)+'</p></div>';
}
});
pc.innerHTML=html;
}

function onDragStart(e,idx){dragIdx=idx;e.target.classList.add('dragging')}
function onDragOver(e){e.preventDefault()}
function onDragEnter(e,el){e.preventDefault();el.classList.add('drag-over')}
function onDragLeave(el){el.classList.remove('drag-over')}
function onDragEnd(){dragIdx=null;document.querySelectorAll('.wire-section').forEach(s=>{s.classList.remove('dragging','drag-over')})}
function onDrop(e,targetIdx){
e.preventDefault();
if(dragIdx===null||dragIdx===targetIdx)return;
const sections=getWf().sections;
const [moved]=sections.splice(dragIdx,1);
sections.splice(targetIdx,0,moved);
dragIdx=null;
save();renderBuilder();renderPreview();
}

function exportHTML(){
const sections=getWf().sections;
const theme=previewTheme;
let html='<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>Landing Page</title>\n<style>\n';
html+='*{margin:0;padding:0;box-sizing:border-box}\n';
html+='body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;'+(theme==='dark'?'background:#111;color:#eee':'background:#fff;color:#222')+'}\n';
html+='section{padding:60px 24px;text-align:center;max-width:960px;margin:0 auto}\n';
html+='h2{font-size:2rem;margin-bottom:12px}\nh3{font-size:1.2rem;margin-bottom:8px}\np{line-height:1.6;opacity:.85}\n';
html+='.btn{display:inline-block;padding:12px 28px;background:#ff5f1f;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;margin-top:16px}\n';
html+='.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:20px}\n';
html+='.card{padding:24px;border-radius:8px;'+(theme==='dark'?'background:#1a1a2a':'background:#f5f5f5')+'}\n';
html+='@media(max-width:700px){.grid3{grid-template-columns:1fr}}\n';
html+='</style>\n</head>\n<body>\n';
sections.forEach(s=>{
const d=s.data;
if(s.type==='hero')html+='<section>\n  <h2>'+esc(d.heading)+'</h2>\n  <p>'+esc(d.subheading)+'</p>\n  <a href="#" class="btn">'+esc(d.buttonText)+'</a>\n</section>\n';
else if(s.type==='features')html+='<section>\n  <h2>'+esc(d.heading)+'</h2>\n  <div class="grid3">\n    <div class="card"><h3>'+esc(d.feature1)+'</h3><p>'+esc(d.desc1)+'</p></div>\n    <div class="card"><h3>'+esc(d.feature2)+'</h3><p>'+esc(d.desc2)+'</p></div>\n    <div class="card"><h3>'+esc(d.feature3)+'</h3><p>'+esc(d.desc3)+'</p></div>\n  </div>\n</section>\n';
else if(s.type==='testimonials')html+='<section>\n  <h2>'+esc(d.heading)+'</h2>\n  <div class="card" style="max-width:600px;margin:20px auto"><p><em>'+esc(d.quote)+'</em></p><p style="margin-top:8px;font-weight:600">'+esc(d.author)+'</p></div>\n</section>\n';
else if(s.type==='pricing')html+='<section>\n  <h2>'+esc(d.heading)+'</h2>\n  <div class="grid3">\n    <div class="card"><h3>'+esc(d.plan1)+'</h3><p style="font-size:2rem;font-weight:700;color:#ff5f1f">'+esc(d.price1)+'</p><a href="#" class="btn">Choose</a></div>\n    <div class="card"><h3>'+esc(d.plan2)+'</h3><p style="font-size:2rem;font-weight:700;color:#ff5f1f">'+esc(d.price2)+'</p><a href="#" class="btn">Choose</a></div>\n    <div class="card"><h3>'+esc(d.plan3)+'</h3><p style="font-size:2rem;font-weight:700;color:#ff5f1f">'+esc(d.price3)+'</p><a href="#" class="btn">Choose</a></div>\n  </div>\n</section>\n';
else if(s.type==='cta')html+='<section style="background:rgba(255,95,31,.1);border-radius:12px;margin:20px auto;max-width:960px">\n  <h2>'+esc(d.heading)+'</h2>\n  <p>'+esc(d.subheading)+'</p>\n  <a href="#" class="btn">'+esc(d.buttonText)+'</a>\n</section>\n';
else if(s.type==='faq')html+='<section style="text-align:left">\n  <h2 style="text-align:center">'+esc(d.heading)+'</h2>\n  <div style="max-width:700px;margin:20px auto">\n    <p><strong>'+esc(d.q1)+'</strong></p><p>'+esc(d.a1)+'</p><br>\n    <p><strong>'+esc(d.q2)+'</strong></p><p>'+esc(d.a2)+'</p>\n  </div>\n</section>\n';
else if(s.type==='footer')html+='<footer style="text-align:center;padding:30px;opacity:.6;font-size:.85rem">\n  <p>'+esc(d.text)+'</p>\n  <p>'+esc(d.links)+'</p>\n</footer>\n';
});
html+='</body>\n</html>';
document.getElementById('exportArea').textContent=html;
}

function exportJSON(){
document.getElementById('exportArea').textContent=JSON.stringify(getWf(),null,2);
}

function copyExport(){
const text=document.getElementById('exportArea').textContent;
navigator.clipboard.writeText(text).then(()=>alert('Copied!')).catch(()=>{});
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(){renderList();renderBuilder();renderPreview()}
load();render();
