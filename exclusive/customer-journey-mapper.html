<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6264503059486804" crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Customer Journey Mapper — Visual Touchpoint Mapping | SPUNK.CODES</title>
<meta name="description" content="Map customer journeys visually. Define stages, add touchpoints, track emotions and pain points. Export as a visual map. Free browser-based tool.">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e8e8f0;font-size:.9rem}
main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e8e8f0}button.secondary:hover{background:#3a3a4a}
button.danger{background:#cc2233}button.danger:hover{background:#aa1a28}
select,input,textarea{background:#16161e;border:1px solid #2a2a3a;color:#e8e8f0;padding:8px 12px;border-radius:6px;font-size:.9rem;font-family:inherit;width:100%}
textarea{resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.tri{grid-template-columns:1fr 1fr 1fr}
.form-row label{font-size:.8rem;color:#888;margin-bottom:4px;display:block}
.form-row .field{display:flex;flex-direction:column}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.journey-map{overflow-x:auto;padding:10px 0}
.journey-stages{display:flex;gap:0;min-width:max-content}
.stage-col{min-width:200px;flex:1;border-right:1px dashed #2a2a3a;position:relative}
.stage-col:last-child{border-right:none}
.stage-header{background:#1a1a2e;padding:10px 12px;text-align:center;border-radius:8px 8px 0 0;margin:0 4px;position:relative}
.stage-header h3{font-size:.9rem;color:#ff5f1f;margin-bottom:2px}
.stage-header .stage-desc{font-size:.7rem;color:#888}
.stage-header .remove-stage{position:absolute;top:4px;right:8px;background:none;color:#cc2233;border:none;font-size:.8rem;cursor:pointer;padding:2px 4px}
.emotion-track{padding:8px;margin:0 4px;background:#16161e;min-height:40px;display:flex;align-items:center;justify-content:center}
.emotion-icon{font-size:1.4rem}
.touchpoints-area{padding:8px 4px;min-height:80px}
.tp-card{background:#16161e;border:1px solid #2a2a3a;border-radius:6px;padding:8px 10px;margin:0 4px 6px;position:relative}
.tp-card .tp-name{font-size:.85rem;color:#e8e8f0;font-weight:600;margin-bottom:2px}
.tp-card .tp-channel{font-size:.7rem;color:#ff5f1f;margin-bottom:2px}
.tp-card .tp-desc{font-size:.75rem;color:#888}
.tp-card .tp-pain{font-size:.7rem;color:#cc2233;margin-top:4px;padding:3px 6px;background:#1a0a0e;border-radius:3px}
.tp-card .tp-remove{position:absolute;top:4px;right:6px;background:none;color:#cc2233;border:none;font-size:.7rem;cursor:pointer;padding:2px}
.emotion-happy{color:#22cc66}
.emotion-neutral{color:#ffaa00}
.emotion-frustrated{color:#cc2233}
.pain-row{background:#1a0a0e;padding:8px;margin:0 4px;border-radius:0 0 8px 8px;min-height:30px}
.pain-item{font-size:.7rem;color:#cc2233;padding:2px 6px;background:#2a0a10;border-radius:3px;display:inline-block;margin:2px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:10px;text-align:center}
.stat-card .num{font-size:1.3rem;color:#ff5f1f;font-weight:700}
.stat-card .lbl{font-size:.7rem;color:#888;margin-top:2px}
.saved-list{display:flex;flex-direction:column;gap:6px}
.saved-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#16161e;border-radius:6px;font-size:.85rem}
.empty{color:#555;text-align:center;padding:30px}
.persona-info{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:12px;margin-bottom:16px}
.persona-info .name{font-size:1rem;color:#ff5f1f;font-weight:700}
.persona-info .desc{font-size:.8rem;color:#888;margin-top:4px}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2a;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:700px){
.form-row,.form-row.tri{grid-template-columns:1fr}
header h1{font-size:1.1rem}
.stage-col{min-width:160px}
.stats-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<header>
<h1>Customer Journey Mapper</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>
<div class="panel">
<h2>Journey Setup</h2>
<div class="form-row">
<div class="field"><label>Journey Name</label><input type="text" id="journeyName" placeholder="e.g. New Customer Onboarding"></div>
<div class="field"><label>Customer Persona</label><input type="text" id="personaName" placeholder="e.g. Small Business Owner"></div>
</div>
<div class="form-row" style="grid-template-columns:1fr">
<div class="field"><label>Persona Description</label><input type="text" id="personaDesc" placeholder="e.g. Tech-savvy, budget-conscious, values time savings"></div>
</div>
</div>

<div class="panel">
<h2>Add Stage</h2>
<div class="form-row tri">
<div class="field"><label>Stage Name</label>
<select id="stageName">
<option value="Awareness">Awareness</option>
<option value="Consideration">Consideration</option>
<option value="Purchase">Purchase</option>
<option value="Retention">Retention</option>
<option value="Advocacy">Advocacy</option>
<option value="custom">Custom...</option>
</select>
</div>
<div class="field"><label>Custom Name (if custom)</label><input type="text" id="stageCustom" placeholder="Custom stage name"></div>
<div class="field"><label>Overall Emotion</label>
<select id="stageEmotion">
<option value="happy">Happy</option>
<option value="neutral">Neutral</option>
<option value="frustrated">Frustrated</option>
</select>
</div>
</div>
<div class="btn-row">
<button onclick="addStage()">Add Stage</button>
<button class="secondary" onclick="addDefaultStages()">Add All Default Stages</button>
</div>
</div>

<div class="panel">
<h2>Add Touchpoint</h2>
<div class="form-row">
<div class="field"><label>Stage</label><select id="tpStage"></select></div>
<div class="field"><label>Channel</label>
<select id="tpChannel">
<option value="Website">Website</option>
<option value="Email">Email</option>
<option value="Social Media">Social Media</option>
<option value="Ads">Ads</option>
<option value="Phone">Phone</option>
<option value="In-Store">In-Store</option>
<option value="Chat">Live Chat</option>
<option value="App">Mobile App</option>
<option value="Other">Other</option>
</select>
</div>
</div>
<div class="form-row">
<div class="field"><label>Touchpoint Name</label><input type="text" id="tpName" placeholder="e.g. Sees social ad"></div>
<div class="field"><label>Emotion at this point</label>
<select id="tpEmotion">
<option value="happy">Happy</option>
<option value="neutral">Neutral</option>
<option value="frustrated">Frustrated</option>
</select>
</div>
</div>
<div class="form-row">
<div class="field"><label>Description</label><input type="text" id="tpDesc" placeholder="What happens at this touchpoint?"></div>
<div class="field"><label>Pain Point (optional)</label><input type="text" id="tpPain" placeholder="e.g. Confusing pricing page"></div>
</div>
<div class="btn-row">
<button onclick="addTouchpoint()">Add Touchpoint</button>
</div>
</div>

<div class="panel">
<h2>Overview</h2>
<div class="stats-row">
<div class="stat-card"><div class="num" id="statStages">0</div><div class="lbl">Stages</div></div>
<div class="stat-card"><div class="num" id="statTps">0</div><div class="lbl">Touchpoints</div></div>
<div class="stat-card"><div class="num" id="statPains">0</div><div class="lbl">Pain Points</div></div>
<div class="stat-card"><div class="num" id="statChannels">0</div><div class="lbl">Channels</div></div>
</div>
</div>

<div class="panel">
<h2>Journey Map</h2>
<div id="personaDisplay"></div>
<div class="journey-map" id="journeyMap"></div>
</div>

<div class="panel">
<h2>Actions</h2>
<div class="btn-row">
<button onclick="exportJSON()">Export as JSON</button>
<button class="secondary" onclick="saveJourney()">Save Journey</button>
<button class="secondary" onclick="clearJourney()">Clear All</button>
</div>
</div>

<div class="panel">
<h2>Saved Journeys</h2>
<div id="savedList"></div>
</div>
</main>

<footer>
<a href="https://spunk.codes">spunk.codes</a> &middot;
<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
const LS_KEY='spunkcodes_journey_mapper';
let stages=[];
let savedJourneys=[];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function emotionIcon(e){
var icons={happy:'\u263A',neutral:'\u2014',frustrated:'\u2639'};
return icons[e]||'\u2014';
}
function emotionClass(e){return'emotion-'+e}

function addStage(){
let name=document.getElementById('stageName').value;
if(name==='custom'){
name=document.getElementById('stageCustom').value.trim();
if(!name){alert('Enter a custom stage name.');return}
}
const emotion=document.getElementById('stageEmotion').value;
stages.push({name,emotion,touchpoints:[]});
saveCurrent();render();
}

function addDefaultStages(){
if(stages.length&&!confirm('This will add default stages. Continue?'))return;
const defaults=[
{name:'Awareness',emotion:'neutral',touchpoints:[]},
{name:'Consideration',emotion:'neutral',touchpoints:[]},
{name:'Purchase',emotion:'happy',touchpoints:[]},
{name:'Retention',emotion:'happy',touchpoints:[]},
{name:'Advocacy',emotion:'happy',touchpoints:[]}
];
defaults.forEach(function(d){
if(!stages.find(function(s){return s.name===d.name}))stages.push(d);
});
saveCurrent();render();
}

function removeStage(i){
if(!confirm('Remove stage "'+stages[i].name+'" and all its touchpoints?'))return;
stages.splice(i,1);saveCurrent();render();
}

function updateStageSelect(){
const sel=document.getElementById('tpStage');
sel.innerHTML='';
stages.forEach(function(s,i){
const o=document.createElement('option');o.value=i;o.textContent=s.name;sel.appendChild(o);
});
}

function addTouchpoint(){
const si=parseInt(document.getElementById('tpStage').value);
if(isNaN(si)||!stages[si]){alert('Please add a stage first.');return}
const name=document.getElementById('tpName').value.trim();
if(!name){alert('Enter a touchpoint name.');return}
const channel=document.getElementById('tpChannel').value;
const emotion=document.getElementById('tpEmotion').value;
const desc=document.getElementById('tpDesc').value.trim();
const pain=document.getElementById('tpPain').value.trim();
stages[si].touchpoints.push({name:name,channel:channel,emotion:emotion,desc:desc,pain:pain});
document.getElementById('tpName').value='';
document.getElementById('tpDesc').value='';
document.getElementById('tpPain').value='';
saveCurrent();render();
}

function removeTouchpoint(si,ti){
stages[si].touchpoints.splice(ti,1);saveCurrent();render();
}

function render(){
updateStageSelect();renderMap();updateStats();
}

function renderMap(){
const el=document.getElementById('journeyMap');
const pd=document.getElementById('personaDisplay');
const pName=document.getElementById('personaName').value.trim();
const pDesc=document.getElementById('personaDesc').value.trim();
if(pName){
pd.innerHTML='<div class="persona-info"><div class="name">'+esc(pName)+'</div>'+(pDesc?'<div class="desc">'+esc(pDesc)+'</div>':'')+'</div>';
}else{pd.innerHTML=''}

if(!stages.length){el.innerHTML='<div class="empty">No stages yet. Add stages above to start mapping.</div>';return}

var html='<div class="journey-stages">';
stages.forEach(function(s,si){
html+='<div class="stage-col">';
html+='<div class="stage-header"><h3>'+esc(s.name)+'</h3><button class="remove-stage" onclick="removeStage('+si+')" title="Remove stage">&times;</button></div>';
html+='<div class="emotion-track"><span class="emotion-icon '+emotionClass(s.emotion)+'">'+emotionIcon(s.emotion)+'</span></div>';
html+='<div class="touchpoints-area">';
if(!s.touchpoints.length){
html+='<div style="text-align:center;font-size:.7rem;color:#555;padding:10px">No touchpoints</div>';
}
s.touchpoints.forEach(function(tp,ti){
html+='<div class="tp-card">';
html+='<button class="tp-remove" onclick="removeTouchpoint('+si+','+ti+')">&times;</button>';
html+='<div class="tp-name"><span class="'+emotionClass(tp.emotion)+'">'+emotionIcon(tp.emotion)+'</span> '+esc(tp.name)+'</div>';
html+='<div class="tp-channel">'+esc(tp.channel)+'</div>';
if(tp.desc)html+='<div class="tp-desc">'+esc(tp.desc)+'</div>';
if(tp.pain)html+='<div class="tp-pain">Pain: '+esc(tp.pain)+'</div>';
html+='</div>';
});
html+='</div>';
var pains=s.touchpoints.filter(function(t){return t.pain}).map(function(t){return t.pain});
html+='<div class="pain-row">';
if(pains.length){pains.forEach(function(p){html+='<span class="pain-item">'+esc(p)+'</span>'})}
else{html+='<span style="font-size:.65rem;color:#333">No pain points</span>'}
html+='</div>';
html+='</div>';
});
html+='</div>';
el.innerHTML=html;
}

function updateStats(){
var allTps=[];
stages.forEach(function(s){allTps=allTps.concat(s.touchpoints)});
document.getElementById('statStages').textContent=stages.length;
document.getElementById('statTps').textContent=allTps.length;
document.getElementById('statPains').textContent=allTps.filter(function(t){return t.pain}).length;
var channels={};allTps.forEach(function(t){channels[t.channel]=1});
document.getElementById('statChannels').textContent=Object.keys(channels).length;
}

function getJourneyData(){
return{
name:document.getElementById('journeyName').value.trim()||'Untitled Journey',
persona:{name:document.getElementById('personaName').value.trim(),description:document.getElementById('personaDesc').value.trim()},
stages:stages,
createdAt:new Date().toISOString()
};
}

function exportJSON(){
var data=getJourneyData();
var json=JSON.stringify(data,null,2);
var blob=new Blob([json],{type:'application/json'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');
a.href=url;a.download=(data.name.replace(/\s+/g,'-').toLowerCase()||'journey')+'.json';
a.click();URL.revokeObjectURL(url);
}

function saveJourney(){
var data=getJourneyData();
if(!data.name||data.name==='Untitled Journey'){
var n=prompt('Journey name:','My Journey');
if(!n)return;data.name=n;
document.getElementById('journeyName').value=n;
}
var idx=-1;
for(var i=0;i<savedJourneys.length;i++){if(savedJourneys[i].name===data.name){idx=i;break}}
if(idx>=0)savedJourneys[idx]=data;
else savedJourneys.unshift(data);
if(savedJourneys.length>20)savedJourneys.pop();
localStorage.setItem(LS_KEY,JSON.stringify(savedJourneys));
renderSaved();
alert('Journey saved!');
}

function loadJourney(i){
var j=savedJourneys[i];if(!j)return;
document.getElementById('journeyName').value=j.name||'';
document.getElementById('personaName').value=j.persona?j.persona.name:'';
document.getElementById('personaDesc').value=j.persona?j.persona.description:'';
stages=j.stages?JSON.parse(JSON.stringify(j.stages)):[];
saveCurrent();render();
}

function deleteSaved(i){savedJourneys.splice(i,1);localStorage.setItem(LS_KEY,JSON.stringify(savedJourneys));renderSaved()}

function renderSaved(){
var el=document.getElementById('savedList');
if(!savedJourneys.length){el.innerHTML='<div class="empty">No saved journeys yet.</div>';return}
var html='<div class="saved-list">';
savedJourneys.forEach(function(j,i){
html+='<div class="saved-item"><div><span style="color:#e8e8f0">'+esc(j.name)+'</span> <span style="font-size:.75rem;color:#555">('+((j.stages&&j.stages.length)||0)+' stages)</span></div><div class="btn-row"><button onclick="loadJourney('+i+')" style="padding:4px 10px;font-size:.75rem">Load</button><button class="danger" onclick="deleteSaved('+i+')" style="padding:4px 10px;font-size:.75rem">&times;</button></div></div>';
});
html+='</div>';
el.innerHTML=html;
}

function clearJourney(){
if(stages.length&&!confirm('Clear all stages and touchpoints?'))return;
stages=[];saveCurrent();render();
}

function saveCurrent(){localStorage.setItem(LS_KEY+'_current',JSON.stringify(stages))}
function loadCurrent(){try{stages=JSON.parse(localStorage.getItem(LS_KEY+'_current'))||[]}catch(e){stages=[]}}
function loadSavedList(){try{savedJourneys=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){savedJourneys=[]}}

function init(){
loadCurrent();loadSavedList();render();renderSaved();
}
init();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
