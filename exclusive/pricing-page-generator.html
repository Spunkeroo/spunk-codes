<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e8e8f0;font-size:.9rem}
main{flex:1;max-width:960px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e8e8f0}button.secondary:hover{background:#3a3a4a}
button.danger{background:#cc2233}button.danger:hover{background:#aa1a28}
select,input,textarea{background:#16161e;border:1px solid #2a2a3a;color:#e8e8f0;padding:8px 12px;border-radius:6px;font-size:.9rem;font-family:inherit;width:100%}
textarea{resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.tri{grid-template-columns:1fr 1fr 1fr}
.form-row.quad{grid-template-columns:1fr 1fr 1fr 1fr}
.form-row label{font-size:.8rem;color:#888;margin-bottom:4px;display:block}
.form-row .field{display:flex;flex-direction:column}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.tier-card{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:14px;margin-bottom:10px;position:relative}
.tier-card.popular{border-color:#ff5f1f}
.tier-card .pop-badge{position:absolute;top:-8px;right:12px;background:#ff5f1f;color:#fff;font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:700}
.tier-card h3{font-size:1rem;color:#ff5f1f;margin-bottom:4px}
.tier-card .price{font-size:1.4rem;font-weight:700;color:#e8e8f0}
.tier-card .period{font-size:.75rem;color:#888}
.tier-card .features{margin:8px 0;font-size:.8rem;color:#ccc}
.tier-card .features li{padding:3px 0;list-style:none}
.tier-card .features li::before{content:'\2713 ';color:#22cc66}
.tier-card .cta-text{font-size:.8rem;color:#ff5f1f;font-weight:600}
.tier-card .tier-actions{display:flex;gap:6px;margin-top:8px}
.tier-card .tier-actions button{font-size:.75rem;padding:4px 10px}
.style-toggle{display:flex;gap:4px;margin-bottom:16px}
.style-toggle button{padding:6px 12px;font-size:.8rem}
.style-toggle button.active{background:#ff5f1f}
.style-toggle button:not(.active){background:#2a2a3a;color:#e8e8f0}
.preview-area{background:#16161e;border:1px solid #2a2a3a;border-radius:10px;padding:24px;overflow-x:auto}
.preview-cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.pv-card{background:#1a1a2e;border:1px solid #2a2a3a;border-radius:12px;padding:24px 20px;min-width:180px;max-width:240px;flex:1;text-align:center;position:relative;transition:transform .2s}
.pv-card.popular{border-color:#ff5f1f;transform:scale(1.05)}
.pv-card .pop-label{background:#ff5f1f;color:#fff;font-size:.7rem;padding:3px 12px;border-radius:12px;position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-weight:700}
.pv-card h3{font-size:1.1rem;color:#e8e8f0;margin-bottom:8px}
.pv-card .price{font-size:2rem;font-weight:800;color:#ff5f1f}
.pv-card .period{font-size:.8rem;color:#888;margin-bottom:12px}
.pv-card ul{list-style:none;text-align:left;margin-bottom:16px}
.pv-card ul li{padding:5px 0;font-size:.85rem;color:#ccc;border-bottom:1px solid #2a2a3a}
.pv-card ul li:last-child{border:none}
.pv-card ul li::before{content:'\2713 ';color:#22cc66}
.pv-card .cta-btn{display:inline-block;background:#ff5f1f;color:#fff;padding:10px 24px;border-radius:8px;font-weight:700;font-size:.9rem}
.pv-card.popular .cta-btn{background:#e8520e}
.preview-table{width:100%;border-collapse:collapse}
.preview-table th,.preview-table td{padding:10px 12px;border:1px solid #2a2a3a;text-align:center;font-size:.85rem}
.preview-table th{background:#1a1a2e;color:#ff5f1f;font-weight:700}
.preview-table th.popular{background:#ff5f1f;color:#fff}
.preview-table td{color:#ccc}
.preview-table .feat-name{text-align:left;color:#e8e8f0;font-weight:600}
.preview-minimal{display:flex;flex-direction:column;gap:12px}
.pv-mini{display:flex;justify-content:space-between;align-items:center;padding:16px;background:#1a1a2e;border-radius:8px;border-left:3px solid #2a2a3a}
.pv-mini.popular{border-left-color:#ff5f1f}
.pv-mini .left h3{font-size:1rem;color:#e8e8f0;margin-bottom:2px}
.pv-mini .left .features-inline{font-size:.75rem;color:#888}
.pv-mini .right{text-align:right}
.pv-mini .right .price{font-size:1.3rem;font-weight:700;color:#ff5f1f}
.pv-mini .right .period{font-size:.7rem;color:#888}
.code-area{background:#0a0a0f;border:1px solid #2a2a3a;border-radius:8px;padding:16px;font-family:monospace;font-size:.8rem;color:#ccc;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow:auto;margin-top:10px}
.saved-list{display:flex;flex-direction:column;gap:6px}
.saved-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#16161e;border-radius:6px;font-size:.85rem}
.empty{color:#555;text-align:center;padding:30px}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2a;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:700px){
.form-row,.form-row.tri,.form-row.quad{grid-template-columns:1fr}
header h1{font-size:1.1rem}
.preview-cards{flex-direction:column;align-items:center}
.pv-card{max-width:100%;min-width:auto}
.pv-card.popular{transform:none}
}
</style>
</head>
<body>
<header>
<h1>Pricing Page Generator</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>
<div class="panel">
<h2>Add Pricing Tier</h2>
<div class="form-row tri">
<div class="field"><label>Tier Name</label><input type="text" id="tierName" placeholder="e.g. Pro"></div>
<div class="field"><label>Price</label><input type="text" id="tierPrice" placeholder="e.g. 29"></div>
<div class="field"><label>Currency Symbol</label><input type="text" id="tierCurrency" value="$" style="max-width:60px"></div>
</div>
<div class="form-row tri">
<div class="field"><label>Billing Period</label>
<select id="tierPeriod">
<option value="/mo">/month</option>
<option value="/yr">/year</option>
<option value="one-time">one-time</option>
<option value="/wk">/week</option>
<option value="custom">custom</option>
</select>
</div>
<div class="field"><label>CTA Text</label><input type="text" id="tierCta" placeholder="e.g. Get Started" value="Get Started"></div>
<div class="field"><label>Mark as Popular?</label>
<select id="tierPopular">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>
</div>
</div>
<div class="form-row" style="grid-template-columns:1fr">
<div class="field"><label>Features (one per line)</label><textarea id="tierFeatures" rows="4" placeholder="10 projects&#10;Unlimited users&#10;Priority support&#10;API access"></textarea></div>
</div>
<div class="btn-row">
<button onclick="addTier()">Add Tier</button>
</div>
</div>

<div class="panel">
<h2>Your Tiers (<span id="tierCount">0</span>/4)</h2>
<div id="tierList"></div>
</div>

<div class="panel">
<h2>Preview</h2>
<div class="style-toggle">
<button class="active" id="btnCards" onclick="setStyle('cards')">Cards</button>
<button id="btnTable" onclick="setStyle('table')">Table</button>
<button id="btnMinimal" onclick="setStyle('minimal')">Minimal</button>
</div>
<div class="preview-area" id="previewArea"></div>
</div>

<div class="panel">
<h2>Export HTML</h2>
<div class="btn-row">
<button onclick="copyHTML()">Copy HTML to Clipboard</button>
<button class="secondary" onclick="downloadHTML()">Download HTML File</button>
</div>
<div class="code-area" id="codeOutput"></div>
</div>

<div class="panel">
<h2>Actions</h2>
<div class="btn-row">
<button onclick="exportJSON()">Export as JSON</button>
<button class="secondary" onclick="savePricing()">Save Pricing</button>
<button class="secondary" onclick="clearAll()">Clear All</button>
</div>
</div>

<div class="panel">
<h2>Saved Pricing Pages</h2>
<div id="savedList"></div>
</div>
</main>

<footer>
<a href="https://spunk.codes">spunk.codes</a> &middot;
<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
var LS_KEY='spunkcodes_pricing_generator';
var tiers=[];
var savedPricings=[];
var currentStyle='cards';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function addTier(){
if(tiers.length>=4){alert('Maximum 4 tiers allowed.');return}
var name=document.getElementById('tierName').value.trim();
var price=document.getElementById('tierPrice').value.trim();
var currency=document.getElementById('tierCurrency').value.trim()||'$';
var period=document.getElementById('tierPeriod').value;
var cta=document.getElementById('tierCta').value.trim()||'Get Started';
var popular=document.getElementById('tierPopular').value==='yes';
var featText=document.getElementById('tierFeatures').value.trim();
var features=featText?featText.split('\n').map(function(f){return f.trim()}).filter(function(f){return f}):[];
if(!name){alert('Enter a tier name.');return}
if(!price){alert('Enter a price.');return}
if(popular){tiers.forEach(function(t){t.popular=false})}
tiers.push({name:name,price:price,currency:currency,period:period,cta:cta,popular:popular,features:features});
document.getElementById('tierName').value='';
document.getElementById('tierPrice').value='';
document.getElementById('tierFeatures').value='';
document.getElementById('tierPopular').value='no';
saveCurrent();renderAll();
}

function removeTier(i){tiers.splice(i,1);saveCurrent();renderAll()}

function togglePopular(i){
tiers.forEach(function(t,j){t.popular=(j===i)?!t.popular:false});
saveCurrent();renderAll();
}

function moveTier(i,dir){
var ni=i+dir;
if(ni<0||ni>=tiers.length)return;
var tmp=tiers[i];tiers[i]=tiers[ni];tiers[ni]=tmp;
saveCurrent();renderAll();
}

function renderTierList(){
var el=document.getElementById('tierList');
document.getElementById('tierCount').textContent=tiers.length;
if(!tiers.length){el.innerHTML='<div class="empty">No tiers yet. Add your first pricing tier above.</div>';return}
var html='';
tiers.forEach(function(t,i){
html+='<div class="tier-card'+(t.popular?' popular':'')+'">';
if(t.popular)html+='<span class="pop-badge">POPULAR</span>';
html+='<h3>'+esc(t.name)+'</h3>';
html+='<span class="price">'+esc(t.currency)+esc(t.price)+'</span> <span class="period">'+esc(t.period)+'</span>';
if(t.features.length){
html+='<ul class="features">';
t.features.forEach(function(f){html+='<li>'+esc(f)+'</li>'});
html+='</ul>';
}
html+='<div class="cta-text">CTA: '+esc(t.cta)+'</div>';
html+='<div class="tier-actions">';
if(i>0)html+='<button class="secondary" onclick="moveTier('+i+',-1)">&larr;</button>';
if(i<tiers.length-1)html+='<button class="secondary" onclick="moveTier('+i+',1)">&rarr;</button>';
html+='<button class="secondary" onclick="togglePopular('+i+')">'+(t.popular?'Unmark':'Mark Popular')+'</button>';
html+='<button class="danger" onclick="removeTier('+i+')">&times;</button>';
html+='</div></div>';
});
el.innerHTML=html;
}

function setStyle(s){
currentStyle=s;
document.getElementById('btnCards').className=s==='cards'?'active':'secondary';
document.getElementById('btnTable').className=s==='table'?'active':'secondary';
document.getElementById('btnMinimal').className=s==='minimal'?'active':'secondary';
renderPreview();renderCode();
}

function renderPreview(){
var el=document.getElementById('previewArea');
if(!tiers.length){el.innerHTML='<div class="empty">Add tiers to see preview.</div>';return}
if(currentStyle==='cards')renderPreviewCards(el);
else if(currentStyle==='table')renderPreviewTable(el);
else renderPreviewMinimal(el);
}

function renderPreviewCards(el){
var html='<div class="preview-cards">';
tiers.forEach(function(t){
html+='<div class="pv-card'+(t.popular?' popular':'')+'">';
if(t.popular)html+='<div class="pop-label">Most Popular</div>';
html+='<h3>'+esc(t.name)+'</h3>';
html+='<div class="price">'+esc(t.currency)+esc(t.price)+'</div>';
html+='<div class="period">'+esc(t.period)+'</div>';
if(t.features.length){
html+='<ul>';
t.features.forEach(function(f){html+='<li>'+esc(f)+'</li>'});
html+='</ul>';
}
html+='<div class="cta-btn">'+esc(t.cta)+'</div>';
html+='</div>';
});
html+='</div>';
el.innerHTML=html;
}

function renderPreviewTable(el){
if(!tiers.length){el.innerHTML='';return}
var allFeats=[];
tiers.forEach(function(t){
t.features.forEach(function(f){
if(allFeats.indexOf(f)===-1)allFeats.push(f);
});
});
var html='<table class="preview-table"><thead><tr><th>Feature</th>';
tiers.forEach(function(t){
html+='<th'+(t.popular?' class="popular"':'')+'>'+esc(t.name)+'<br><span style="font-size:1.1rem">'+esc(t.currency)+esc(t.price)+'</span><br><span style="font-weight:400;font-size:.7rem">'+esc(t.period)+'</span></th>';
});
html+='</tr></thead><tbody>';
allFeats.forEach(function(feat){
html+='<tr><td class="feat-name">'+esc(feat)+'</td>';
tiers.forEach(function(t){
var has=t.features.indexOf(feat)>=0;
html+='<td style="color:'+(has?'#22cc66':'#555')+';">'+(has?'\u2713':'\u2014')+'</td>';
});
html+='</tr>';
});
html+='<tr><td></td>';
tiers.forEach(function(t){html+='<td><span style="background:#ff5f1f;color:#fff;padding:6px 16px;border-radius:6px;font-weight:700;font-size:.8rem;display:inline-block">'+esc(t.cta)+'</span></td>'});
html+='</tr></tbody></table>';
el.innerHTML=html;
}

function renderPreviewMinimal(el){
var html='<div class="preview-minimal">';
tiers.forEach(function(t){
html+='<div class="pv-mini'+(t.popular?' popular':'')+'">';
html+='<div class="left"><h3>'+esc(t.name)+(t.popular?' <span style="color:#ff5f1f;font-size:.7rem">POPULAR</span>':'')+'</h3>';
html+='<div class="features-inline">'+t.features.map(function(f){return esc(f)}).join(' &middot; ')+'</div></div>';
html+='<div class="right"><div class="price">'+esc(t.currency)+esc(t.price)+'</div><div class="period">'+esc(t.period)+'</div></div>';
html+='</div>';
});
html+='</div>';
el.innerHTML=html;
}

function generateExportHTML(){
var css='<style>\n.pricing-container{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;font-family:-apple-system,sans-serif;padding:40px 20px}\n.pricing-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:32px 24px;min-width:200px;max-width:260px;flex:1;text-align:center;position:relative}\n.pricing-card.popular{border:2px solid #ff5f1f;transform:scale(1.05)}\n.pricing-card .pop-label{background:#ff5f1f;color:#fff;font-size:.75rem;padding:4px 12px;border-radius:12px;position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-weight:700}\n.pricing-card h3{font-size:1.2rem;margin-bottom:8px}\n.pricing-card .price{font-size:2.2rem;font-weight:800;color:#ff5f1f}\n.pricing-card .period{font-size:.85rem;color:#666;margin-bottom:16px}\n.pricing-card ul{list-style:none;padding:0;text-align:left;margin-bottom:20px}\n.pricing-card ul li{padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:.9rem}\n.pricing-card ul li::before{content:"\\2713 ";color:#22cc66}\n.pricing-card .cta-btn{display:inline-block;background:#ff5f1f;color:#fff;padding:12px 28px;border-radius:8px;font-weight:700;text-decoration:none;font-size:.95rem}\n.pricing-card.popular .cta-btn{background:#e8520e}\n</style>';
var html='<div class="pricing-container">\n';
tiers.forEach(function(t){
html+='  <div class="pricing-card'+(t.popular?' popular':'')+'">\n';
if(t.popular)html+='    <div class="pop-label">Most Popular</div>\n';
html+='    <h3>'+esc(t.name)+'</h3>\n';
html+='    <div class="price">'+esc(t.currency)+esc(t.price)+'</div>\n';
html+='    <div class="period">'+esc(t.period)+'</div>\n';
if(t.features.length){
html+='    <ul>\n';
t.features.forEach(function(f){html+='      <li>'+esc(f)+'</li>\n'});
html+='    </ul>\n';
}
html+='    <a href="#" class="cta-btn">'+esc(t.cta)+'</a>\n';
html+='  </div>\n';
});
html+='</div>';
return css+'\n'+html;
}

function renderCode(){
var el=document.getElementById('codeOutput');
if(!tiers.length){el.textContent='Add tiers to generate HTML.';return}
el.textContent=generateExportHTML();
}

function copyHTML(){
var html=generateExportHTML();
navigator.clipboard.writeText(html).then(function(){alert('HTML copied to clipboard!')});
}

function downloadHTML(){
var html='<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pricing</title></head>\n<body>\n'+generateExportHTML()+'\n</body>\n</html>';
var blob=new Blob([html],{type:'text/html'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');
a.href=url;a.download='pricing-page.html';a.click();URL.revokeObjectURL(url);
}

function exportJSON(){
var json=JSON.stringify({tiers:tiers,style:currentStyle},null,2);
var blob=new Blob([json],{type:'application/json'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');
a.href=url;a.download='pricing-config.json';a.click();URL.revokeObjectURL(url);
}

function savePricing(){
var name=prompt('Save as:','My Pricing Page');
if(!name)return;
var data={name:name,tiers:JSON.parse(JSON.stringify(tiers)),style:currentStyle,createdAt:new Date().toISOString()};
var idx=-1;
for(var i=0;i<savedPricings.length;i++){if(savedPricings[i].name===name){idx=i;break}}
if(idx>=0)savedPricings[idx]=data;
else savedPricings.unshift(data);
if(savedPricings.length>20)savedPricings.pop();
localStorage.setItem(LS_KEY,JSON.stringify(savedPricings));
renderSaved();
alert('Saved!');
}

function loadPricing(i){
var p=savedPricings[i];if(!p)return;
tiers=JSON.parse(JSON.stringify(p.tiers||[]));
if(p.style)setStyle(p.style);
saveCurrent();renderAll();
}

function deleteSaved(i){savedPricings.splice(i,1);localStorage.setItem(LS_KEY,JSON.stringify(savedPricings));renderSaved()}

function renderSaved(){
var el=document.getElementById('savedList');
if(!savedPricings.length){el.innerHTML='<div class="empty">No saved pricing pages yet.</div>';return}
var html='<div class="saved-list">';
savedPricings.forEach(function(p,i){
html+='<div class="saved-item"><div><span style="color:#e8e8f0">'+esc(p.name)+'</span> <span style="font-size:.75rem;color:#555">('+((p.tiers&&p.tiers.length)||0)+' tiers)</span></div><div class="btn-row"><button onclick="loadPricing('+i+')" style="padding:4px 10px;font-size:.75rem">Load</button><button class="danger" onclick="deleteSaved('+i+')" style="padding:4px 10px;font-size:.75rem">&times;</button></div></div>';
});
html+='</div>';
el.innerHTML=html;
}

function clearAll(){
if(tiers.length&&!confirm('Clear all tiers?'))return;
tiers=[];saveCurrent();renderAll();
}

function renderAll(){renderTierList();renderPreview();renderCode()}

function saveCurrent(){localStorage.setItem(LS_KEY+'_current',JSON.stringify(tiers))}
function loadCurrent(){try{tiers=JSON.parse(localStorage.getItem(LS_KEY+'_current'))||[]}catch(e){tiers=[]}}
function loadSavedList(){try{savedPricings=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){savedPricings=[]}}

function init(){
loadCurrent();loadSavedList();renderAll();renderSaved();
}
init();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
