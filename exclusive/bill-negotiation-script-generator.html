let state={activeBill:null,logs:[]};
function loadState(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s){state.logs=s.logs||[]}}catch(e){}}
function saveState(){localStorage.setItem(LS_KEY,JSON.stringify({logs:state.logs}))}

function renderBillGrid(){
const grid=document.getElementById('billGrid');
grid.innerHTML='';
BILL_TYPES.forEach(b=>{
const d=document.createElement('div');
d.className='bill-btn'+(state.activeBill===b.id?' active':'');
d.innerHTML='<span class="icon">'+b.icon+'</span>'+esc(b.name);
d.onclick=()=>{state.activeBill=b.id;render()};
grid.appendChild(d);
});
}

function renderForm(){
const panel=document.getElementById('formPanel');
if(!state.activeBill){panel.style.display='none';return}
panel.style.display='block';
const bt=BILL_TYPES.find(b=>b.id===state.activeBill);
document.getElementById('formTitle').textContent=bt.icon+' '+bt.name+' Details';
}

function generateScript(){
const provider=document.getElementById('provider').value.trim()||'your provider';
const cost=document.getElementById('currentCost').value||'XX';
const tenure=document.getElementById('tenure').value;
const tenureText={less1:'less than a year','1-3':'1-3 years','3-5':'3-5 years','5+':'over 5 years'}[tenure];
const costNum=parseFloat(cost)||0;
const target=(costNum*0.7).toFixed(2);
const script=SCRIPTS[state.activeBill];
if(!script){alert('Select a bill type first.');return}

function fill(text){
return text.replace(/\[PROVIDER\]/g,esc(provider)).replace(/\[COST\]/g,esc(cost)).replace(/\[TENURE\]/g,esc(tenureText)).replace(/\[TARGET\]/g,esc(target)).replace(/\[TYPE\]/g,esc(BILL_TYPES.find(b=>b.id===state.activeBill).name)).replace(/\[RATE\]/g,esc(cost));
}

// Key Phrases
html+='<div class="script-section"><h3><span class="step-num">2</span>Key Phrases to Use</h3>';
html+='<div class="script-box">';
script.keyPhrases.forEach(p=>{
html+='<span class="say">SAY:</span> "'+fill(p)+'"\n\n';

html+='</div><button class="secondary" style="font-size:.8rem;padding:5px 12px" onclick="copySection(this)">Copy</button></div>';

// When They Say No
html+='<div class="script-section"><h3><span class="step-num">3</span>When They Say No</h3>';
html+='<div class="tip-box">Do not accept the first "no." Most reps need to be asked 2-3 times before accessing retention offers.</div>';
html+='<div class="script-box">';
script.whenNo.forEach(p=>{
html+='<span class="say">SAY:</span> "'+fill(p)+'"\n\n';
});
html+='</div><button class="secondary" style="font-size:.8rem;padding:5px 12px" onclick="copySection(this)">Copy</button></div>';

// Escalation Steps
html+='<div class="script-section"><h3><span class="step-num">4</span>Escalation Steps</h3>';
html+='<div class="script-box">';
script.escalation.forEach(s=>{
html+='<span class="key">'+esc(s)+'</span>\n\n';
});
html+='</div><button class="secondary" style="font-size:.8rem;padding:5px 12px" onclick="copySection(this)">Copy</button></div>';

// Retention Tips
html+='<div class="script-section"><h3><span class="step-num">5</span>Retention Department Tips</h3>';
html+='<div class="script-box">';
script.retentionTips.forEach(t=>{
html+='<span class="warn">'+fill(t)+'</span>\n\n';
});
html+='</div><button class="secondary" style="font-size:.8rem;padding:5px 12px" onclick="copySection(this)">Copy</button></div>';

// Copy All
html+='<button class="copy-all-btn" onclick="copyAll()">Copy Entire Script</button>';

area.innerHTML=html;
area.scrollIntoView({behavior:'smooth'});
}

function copySection(btn){
const box=btn.previousElementSibling;
const text=box.textContent;
navigator.clipboard.writeText(text).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500)});
}

function copyAll(){
const area=document.getElementById('scriptArea');
const boxes=area.querySelectorAll('.script-box');
let text='BILL NEGOTIATION SCRIPT\n'+'='.repeat(40)+'\n\n';
const titles=['OPENING LINE','KEY PHRASES','WHEN THEY SAY NO','ESCALATION STEPS','RETENTION TIPS'];
boxes.forEach((box,i)=>{
text+=titles[i]+'\n'+'-'.repeat(30)+'\n'+box.textContent+'\n\n';
});
text+='Generated by spunk.codes/exclusive/bill-negotiation-script-generator';
navigator.clipboard.writeText(text).then(()=>alert('Full script copied to clipboard!'));
}

function addLog(){
const name=document.getElementById('logName').value.trim();
const old=parseFloat(document.getElementById('logOld').value);
const now=parseFloat(document.getElementById('logNew').value);
const status=document.getElementById('logStatus').value;
if(!name){alert('Enter a bill name.');return}
if(isNaN(old)||old<=0){alert('Enter the original cost.');return}
state.logs.push({name,oldCost:old,newCost:isNaN(now)?old:now,status,date:new Date().toISOString().slice(0,10)});
document.getElementById('logName').value='';
document.getElementById('logOld').value='';
document.getElementById('logNew').value='';
saveState();renderDashboard();renderLog();
}

function removeLog(idx){state.logs.splice(idx,1);saveState();renderDashboard();renderLog()}

function renderDashboard(){
const totalMonthly=state.logs.reduce((s,l)=>s+l.oldCost,0);
const totalSaved=state.logs.filter(l=>l.status==='saved').reduce((s,l)=>s+(l.oldCost-l.newCost),0);
document.getElementById('billsTracked').textContent=state.logs.length;
document.getElementById('totalBills').textContent='$'+totalMonthly.toFixed(2);
document.getElementById('totalSaved').textContent='$'+totalSaved.toFixed(2);
document.getElementById('yearlySaved').textContent='$'+(totalSaved*12).toFixed(2);
}

function renderLog(){
const el=document.getElementById('billLog');
if(!state.logs.length){el.innerHTML='<div class="empty">No bills logged yet. Track your negotiation results above.</div>';return}
el.innerHTML='';
state.logs.forEach((l,i)=>{
const saved=l.oldCost-l.newCost;
const statusColors={saved:'#2ecc40',pending:'#ffc107',denied:'#e74c3c'};
const d=document.createElement('div');
d.className='bill-log-item';
d.innerHTML='<div class="bill-info"><div class="bill-name">'+esc(l.name)+'</div><div class="bill-detail">Was $'+l.oldCost.toFixed(2)+'/mo'+(l.status==='saved'?' &rarr; Now $'+l.newCost.toFixed(2)+'/mo':'')+' | '+esc(l.date)+'</div></div><span style="color:'+statusColors[l.status]+';font-weight:600;font-size:.85rem;text-transform:uppercase">'+esc(l.status)+'</span>'+(l.status==='saved'?'<span class="bill-savings">-$'+saved.toFixed(2)+'/mo</span>':'')+'<button class="danger" style="padding:4px 10px;font-size:.8rem" onclick="removeLog('+i+')">&times;</button>';
el.appendChild(d);
});
}

function exportLog(){
let t='BILL NEGOTIATION TRACKER\n'+'='.repeat(40)+'\n';
const totalSaved=state.logs.filter(l=>l.status==='saved').reduce((s,l)=>s+(l.oldCost-l.newCost),0);
t+='Total Monthly Savings: $'+totalSaved.toFixed(2)+'\n';
t+='Annual Savings: $'+(totalSaved*12).toFixed(2)+'\n\n';
state.logs.forEach((l,i)=>{
t+=(i+1)+'. '+l.name+' - Was $'+l.oldCost.toFixed(2);
if(l.status==='saved')t+=' > Now $'+l.newCost.toFixed(2)+' (SAVED $'+(l.oldCost-l.newCost).toFixed(2)+'/mo)';
else t+=' ['+l.status.toUpperCase()+']';
t+='\n';
});
navigator.clipboard.writeText(t).then(()=>alert('Summary copied to clipboard!'));
}

function clearLog(){
if(!confirm('Delete all logged bills?'))return;
state.logs=[];saveState();renderDashboard();renderLog();
}

function render(){renderBillGrid();renderForm();renderDashboard();renderLog()}
loadState();render();
</script>
