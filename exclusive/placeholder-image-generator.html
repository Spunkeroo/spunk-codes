<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}

header h1{font-size:1.6rem;color:#ff5f1f}
header p{color:#999;font-size:.9rem;margin-top:.3rem}
.container{max-width:1100px;margin:0 auto;padding:1.5rem;flex:1;width:100%}
.section{background:#111118;border:1px solid #1a1a2e;border-radius:10px;padding:1.5rem;margin-bottom:1.5rem}

label{display:block;color:#bbb;font-size:.85rem;margin-bottom:.3rem}
input,select{background:#0a0a0f;color:#e0e0e0;border:1px solid #1a1a2e;border-radius:6px;padding:.5rem .7rem;font-size:.9rem;width:100%}

<body>
<header>
<h1>Placeholder Image Generator</h1>
<p>Generate custom placeholder images with text overlays. Download as PNG/JPEG. Free tool.</p>
</header>
<div class="container">
  <div class="section">
    <h2>Presets</h2>
    <div class="presets">
      <button class="preset-btn" onclick="applyPreset(1200,630,'OG Image')">OG Image (1200x630)</button>
      <button class="preset-btn" onclick="applyPreset(1200,675,'Twitter')">Twitter (1200x675)</button>
      <button class="preset-btn" onclick="applyPreset(1080,1080,'Instagram')">Instagram (1080x1080)</button>
      <button class="preset-btn" onclick="applyPreset(1080,1920,'IG Story')">IG Story (1080x1920)</button>
      <button class="preset-btn" onclick="applyPreset(1920,1080,'HD')">HD (1920x1080)</button>
      <button class="preset-btn" onclick="applyPreset(1280,720,'720p')">720p (1280x720)</button>
      <button class="preset-btn" onclick="applyPreset(800,600,'4:3')">4:3 (800x600)</button>
      <button class="preset-btn" onclick="applyPreset(300,250,'Ad')">Ad (300x250)</button>
      <button class="preset-btn" onclick="applyPreset(728,90,'Banner')">Banner (728x90)</button>
      <button class="preset-btn" onclick="applyPreset(16,16,'Favicon')">Favicon (16x16)</button>
      <button class="preset-btn" onclick="applyPreset(512,512,'App Icon')">App Icon (512x512)</button>
      <button class="preset-btn" onclick="applyPreset(150,150,'Thumb')">Thumbnail (150x150)</button>
    </div>
  </div>

  <div class="section">
    <h2>Settings</h2>
    <div class="grid">
      <div>
        <label>Width (px)</label>
        <input type="number" id="imgWidth" value="800" min="1" max="4096" oninput="generate()">
      </div>
      <div>
        <label>Height (px)</label>
        <input type="number" id="imgHeight" value="400" min="1" max="4096" oninput="generate()">
      </div>
      <div>
        <label>Background</label>
        <div class="color-row">
          <input type="color" id="bgColor" value="#1a1a2e" oninput="document.getElementById('bgHex').value=this.value;generate()">
          <input type="text" id="bgHex" value="#1a1a2e" oninput="document.getElementById('bgColor').value=this.value;generate()">
        </div>
      </div>
      <div>
        <label>Text Color</label>
        <div class="color-row">
          <input type="color" id="txtColor" value="#ff5f1f" oninput="document.getElementById('txtHex').value=this.value;generate()">
          <input type="text" id="txtHex" value="#ff5f1f" oninput="document.getElementById('txtColor').value=this.value;generate()">
        </div>
      </div>
      <div>
        <label>Text</label>
        <input type="text" id="imgText" placeholder="Custom text (leave empty for dimensions)" oninput="generate()">
      </div>
      <div>
        <label>Font Size (px, 0=auto)</label>
        <input type="number" id="fontSize" value="0" min="0" max="500" oninput="generate()">
      </div>
      <div>
        <label>Font</label>
        <select id="fontFamily" onchange="generate()">
          <option value="Arial, sans-serif">Arial</option>
          <option value="'Courier New', monospace">Courier New</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Times New Roman', serif">Times New Roman</option>
          <option value="Verdana, sans-serif">Verdana</option>
          <option value="Impact, sans-serif">Impact</option>
        </select>
      </div>
      <div>
        <label>Format</label>
        <select id="imgFormat">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:.3rem;cursor:pointer">
        <input type="checkbox" id="showDimensions" checked onchange="generate()"> Show dimensions
      </label>
      <label style="display:flex;align-items:center;gap:.3rem;cursor:pointer">
        <input type="checkbox" id="showBorder" onchange="generate()"> Show border
      </label>
      <label style="display:flex;align-items:center;gap:.3rem;cursor:pointer">
        <input type="checkbox" id="showCross" onchange="generate()"> Show cross lines
      </label>
    </div>
  </div>

  <div class="section">
    <h2>Preview</h2>
    <div class="preview-wrap">
      <canvas id="previewCanvas"></canvas>
    </div>
    <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="btn" onclick="downloadImage()">Download Image</button>
      <button class="btn btn-outline" onclick="copyDataUrl()">Copy Data URL</button>
      <button class="btn btn-outline" onclick="copyImgTag()">Copy &lt;img&gt; Tag</button>
    </div>
  </div>

  <div class="section">
    <h2>History</h2>
    <div class="history-grid" id="historyGrid"></div>
  </div>
</div>

</footer>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

const canvas=document.getElementById('previewCanvas');
const ctx=canvas.getContext('2d');

function applyPreset(w,h,text){
  document.getElementById('imgWidth').value=w;
  document.getElementById('imgHeight').value=h;
  document.getElementById('imgText').value=text;
  generate();
}

function generate(){
  const w=Math.min(4096,Math.max(1,parseInt(document.getElementById('imgWidth').value)||800));
  const h=Math.min(4096,Math.max(1,parseInt(document.getElementById('imgHeight').value)||400));
  const bg=document.getElementById('bgColor').value;
  const fg=document.getElementById('txtColor').value;
  const customText=document.getElementById('imgText').value;
  const customSize=parseInt(document.getElementById('fontSize').value)||0;
  const font=document.getElementById('fontFamily').value;
  const showDim=document.getElementById('showDimensions').checked;
  const showBorder=document.getElementById('showBorder').checked;
  const showCross=document.getElementById('showCross').checked;

  canvas.width=w;
  canvas.height=h;

  // Background
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,w,h);

  // Cross lines
  if(showCross){
    ctx.strokeStyle=fg;
    ctx.globalAlpha=0.15;
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(0,0);ctx.lineTo(w,h);
    ctx.moveTo(w,0);ctx.lineTo(0,h);
    ctx.stroke();
    ctx.globalAlpha=1;
  }

  // Border
  if(showBorder){
    ctx.strokeStyle=fg;
    ctx.globalAlpha=0.3;
    ctx.lineWidth=2;
    ctx.strokeRect(1,1,w-2,h-2);
    ctx.globalAlpha=1;
  }

  // Text
  const mainText=customText||`${w} x ${h}`;
  const fontSize=customSize||Math.max(12,Math.min(w/8,h/4));
  ctx.fillStyle=fg;
  ctx.font=`bold ${fontSize}px ${font}`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(mainText,w/2,h/2);

  // Dimension subtitle
  if(showDim&&customText){
    const subSize=Math.max(10,fontSize*0.4);
    ctx.font=`${subSize}px ${font}`;
    ctx.globalAlpha=0.6;
    ctx.fillText(`${w} x ${h}`,w/2,h/2+fontSize*0.7);
    ctx.globalAlpha=1;
  }

  saveState();
}

function downloadImage(){
  const format=document.getElementById('imgFormat').value;
  const mime=format==='jpeg'?'image/jpeg':format==='webp'?'image/webp':'image/png';
  const dataUrl=canvas.toDataURL(mime,0.92);
  const a=document.createElement('a');
  a.href=dataUrl;
  const w=document.getElementById('imgWidth').value;
  const h=document.getElementById('imgHeight').value;
  a.download=`placeholder-${w}x${h}.${format}`;
  a.click();
  addToHistory(dataUrl,w,h);
  flash('Downloaded!');
}

function copyDataUrl(){
  const format=document.getElementById('imgFormat').value;
  const mime=format==='jpeg'?'image/jpeg':format==='webp'?'image/webp':'image/png';
  const url=canvas.toDataURL(mime,0.92);
  navigator.clipboard.writeText(url).then(()=>flash('Data URL copied!'));
}

function copyImgTag(){
  const w=document.getElementById('imgWidth').value;
  const h=document.getElementById('imgHeight').value;
  const tag=`<img src="placeholder-${w}x${h}.png" width="${w}" height="${h}" alt="Placeholder ${w}x${h}">`;
  navigator.clipboard.writeText(tag).then(()=>flash('IMG tag copied!'));
}

function addToHistory(dataUrl,w,h){
  const hist=JSON.parse(localStorage.getItem('phg_history')||'[]');
  // Store as thumbnail
  const thumb=document.createElement('canvas');
  const tctx=thumb.getContext('2d');
  thumb.width=150;thumb.height=84;
  const img=new Image();
  img.onload=function(){
    tctx.drawImage(img,0,0,150,84);
    hist.unshift({url:thumb.toDataURL('image/jpeg',0.6),w,h,date:new Date().toISOString()});
    if(hist.length>20)hist.pop();
    localStorage.setItem('phg_history',JSON.stringify(hist));
    renderHistory();
  };
  img.src=dataUrl;
}

function renderHistory(){
  const hist=JSON.parse(localStorage.getItem('phg_history')||'[]');
  const c=document.getElementById('historyGrid');
  if(!hist.length){c.innerHTML='<div style="color:#555;font-size:.85rem">No history yet. Download an image to save it.</div>';return;}
  c.innerHTML='';
  hist.forEach((h,i)=>{
    c.innerHTML+=`<div class="history-item" onclick="applyPreset(${h.w},${h.h},'')">
      <img src="${h.url}" alt="${h.w}x${h.h}">
      <div class="info">${h.w}x${h.h}</div>
    </div>`;
  });
}

function saveState(){
  localStorage.setItem('phg_state',JSON.stringify({
    w:document.getElementById('imgWidth').value,
    h:document.getElementById('imgHeight').value,
    bg:document.getElementById('bgColor').value,
    fg:document.getElementById('txtColor').value,
    text:document.getElementById('imgText').value
  }));
}

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem('phg_state'));
    if(s){
      document.getElementById('imgWidth').value=s.w;
      document.getElementById('imgHeight').value=s.h;
      document.getElementById('bgColor').value=s.bg;
      document.getElementById('bgHex').value=s.bg;
      document.getElementById('txtColor').value=s.fg;
      document.getElementById('txtHex').value=s.fg;
      if(s.text)document.getElementById('imgText').value=s.text;
    }
  }catch(e){}
}

function flash(msg){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:20px;right:20px;background:#ff5f1f;color:#fff;padding:.8rem 1.5rem;border-radius:8px;font-weight:600;z-index:9999;animation:fadeOut 2s forwards';
  d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2200);
}
const st=document.createElement('style');
st.textContent='@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}';
document.head.appendChild(st);

loadState();
generate();
renderHistory();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
