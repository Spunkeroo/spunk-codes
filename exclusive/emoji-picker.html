let allEmojis=[];
emojiData.forEach(cat=>{cat.emojis.forEach(em=>{allEmojis.push({...em,category:cat.cat,hasSkin:!!cat.skin})})});

function initSkinTones(){
const c=document.getElementById('skinTones');
skinLabels.forEach((label,i)=>{
const s=document.createElement('span');
s.textContent=label;
if(i===0)s.classList.add('active');
s.onclick=()=>{currentSkin=i;c.querySelectorAll('span').forEach(x=>x.classList.remove('active'));s.classList.add('active');renderGrid()};
c.appendChild(s);
});
}

function initCategories(){
const c=document.getElementById('categories');
const cats=['all',...emojiData.map(d=>d.cat)];
cats.forEach(cat=>{
const b=document.createElement('button');
b.textContent=cat==='all'?'All':cat;
if(cat==='all')b.classList.add('active');
b.onclick=()=>{currentCat=cat;c.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');filterEmojis()};
c.appendChild(b);
});
}

function applySkin(emoji,hasSkin){
if(!hasSkin||currentSkin===0)return emoji;
return emoji+skinMods[currentSkin];
}

function renderGrid(){
const grid=document.getElementById('emojiGrid');
const query=document.getElementById('searchInput').value.toLowerCase().trim();
let filtered=allEmojis;
if(currentCat!=='all')filtered=filtered.filter(e=>e.category===currentCat);
if(query)filtered=filtered.filter(e=>e.n.includes(query)||e.c.includes(query)||e.e.includes(query));

if(!filtered.length){
grid.innerHTML='<div class="no-results">No emojis found. Try a different search.</div>';
return;
}
grid.innerHTML=filtered.map(em=>{
const display=applySkin(em.e,em.hasSkin);
return`<div class="emo" onclick="selectEmoji('${esc(em.e)}','${esc(em.n)}','${esc(em.c)}',${em.hasSkin})" title="${esc(em.n)}">${display}</div>`;
}).join('');
}

function filterEmojis(){renderGrid()}

function selectEmoji(e,n,c,hasSkin){
const display=applySkin(e,hasSkin);
selectedEmoji={e:display,n,c};
document.getElementById('previewEmoji').textContent=display;
document.getElementById('previewName').textContent=n;
document.getElementById('previewCode').textContent=c;
}

function copyEmoji(){
if(!selectedEmoji)return;
navigator.clipboard.writeText(selectedEmoji.e).then(()=>{addRecent(selectedEmoji);showToast('Emoji copied!')}).catch(()=>showToast('Copy failed'));
}

function copyShortcode(){
if(!selectedEmoji)return;
navigator.clipboard.writeText(selectedEmoji.c).then(()=>{addRecent(selectedEmoji);showToast('Shortcode copied!')}).catch(()=>showToast('Copy failed'));
}

function getRecent(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]')}catch(e){return[]}}
function saveRecent(arr){try{localStorage.setItem(LS_KEY,JSON.stringify(arr))}catch(e){}}

function addRecent(em){
let arr=getRecent();
arr=arr.filter(x=>x.e!==em.e);
arr.unshift({e:em.e,n:em.n,c:em.c});
if(arr.length>20)arr=arr.slice(0,20);
saveRecent(arr);
renderRecent();
}

function renderRecent(){
const arr=getRecent();
const panel=document.getElementById('recentPanel');
const grid=document.getElementById('recentGrid');
if(!arr.length){panel.style.display='none';return}
panel.style.display='block';
grid.innerHTML=arr.map(em=>`<div class="emo" onclick="selectEmoji('${esc(em.e)}','${esc(em.n)}','${esc(em.c)}',false)" title="${esc(em.n)}">${em.e}</div>`).join('');
}

function showToast(msg){
const t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),1800);
}

const toolURL='https://spunk.codes/exclusive/emoji-picker.html';
function shareX(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Free Emoji Picker & Search tool! '+toolURL),'_blank')}
function shareReddit(){window.open('https://reddit.com/submit?url='+encodeURIComponent(toolURL)+'&title='+encodeURIComponent('Emoji Picker & Search - Free Tool'),'_blank')}
function copyLink(){navigator.clipboard.writeText(toolURL).then(()=>showToast('Link copied!'))}

initSkinTones();
initCategories();
renderGrid();
renderRecent();
</script>
