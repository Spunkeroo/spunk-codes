<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e8e8f0;font-size:.9rem}
main{flex:1;max-width:800px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e8e8f0}button.secondary:hover{background:#3a3a4a}
input,select{background:#16161e;border:1px solid #2a2a3a;color:#e8e8f0;padding:8px 12px;border-radius:6px;font-size:.9rem;width:100%}
.category-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.category-tabs button{padding:10px 16px;border-radius:8px;font-size:.85rem}
.category-tabs button.active{background:#ff5f1f;box-shadow:0 0 12px rgba(255,95,31,.4)}
.category-tabs button:not(.active){background:#2a2a3a;color:#e8e8f0}
.converter-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:end;margin-bottom:20px}
.converter-row label{font-size:.8rem;color:#888;margin-bottom:4px;display:block}
.converter-row .big-input{font-size:1.6rem;text-align:center;padding:12px;font-weight:700;color:#ff5f1f}
.swap-btn{background:#2a2a3a;color:#ff5f1f;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;padding:0;align-self:center;margin-top:18px}
.swap-btn:hover{background:#3a3a4a}
.all-conversions{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:14px}
.conv-card{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:border-color .2s}
.conv-card:hover{border-color:#ff5f1f}
.conv-card .val{font-size:1.2rem;color:#ff5f1f;font-weight:700}
.conv-card .unit{font-size:.8rem;color:#888;margin-top:2px}
.conv-card .copied{color:#4caf50;font-size:.75rem;margin-top:4px}
.history-item{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:.88rem;display:flex;justify-content:space-between;align-items:center}
.empty{text-align:center;color:#555;padding:30px;font-size:.95rem}
.share-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.share-btns button{font-size:.8rem;padding:6px 12px}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2a;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:700px){
.converter-row{grid-template-columns:1fr}
.swap-btn{margin:0 auto}
.all-conversions{grid-template-columns:1fr 1fr}
header h1{font-size:1.1rem}
.category-tabs button{font-size:.78rem;padding:8px 10px}
}
</style>
</head>
<body>
<header>
<h1>Universal Unit Converter</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>
<div class="panel">
<h2>Category</h2>
<div class="category-tabs" id="catTabs"></div>
</div>

<div class="panel">
<h2>Convert</h2>
<div class="converter-row">
<div>
<label>From</label>
<input type="number" id="fromVal" class="big-input" step="any" placeholder="0" oninput="convert()">
<select id="fromUnit" onchange="convert()" style="margin-top:6px"></select>
</div>
<button class="swap-btn" onclick="swapUnits()" title="Swap">&harr;</button>
<div>
<label>To</label>
<input type="number" id="toVal" class="big-input" step="any" placeholder="0" readonly>
<select id="toUnit" onchange="convert()" style="margin-top:6px"></select>
</div>
</div>
</div>

<div class="panel">
<h2>All Conversions</h2>
<div class="all-conversions" id="allConv"></div>
</div>

<div class="panel">
<h2>Recent Conversions</h2>
<div id="historyList"><div class="empty">No conversions yet.</div></div>
<div style="margin-top:10px"><button class="secondary" onclick="clearHistory()">Clear History</button></div>
</div>

<div class="panel">
<h2>Share</h2>
<div class="share-btns">
<button onclick="shareTwitter()">Share on X</button>
<button class="secondary" onclick="copyLink()">Copy Link</button>
</div>
</div>
</main>

<footer>
<a href="https://spunk.codes">spunk.codes</a> &middot;
<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
const LS_KEY='spunkcodes_unit_converter';
let history=[];
let currentCat='length';

function load(){try{history=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){history=[]}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(history.slice(0,100)))}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

const categories={
length:{name:'Length',units:{in:{name:'Inches',toBase:0.0254},cm:{name:'Centimeters',toBase:0.01},ft:{name:'Feet',toBase:0.3048},m:{name:'Meters',toBase:1},yd:{name:'Yards',toBase:0.9144},mi:{name:'Miles',toBase:1609.344},km:{name:'Kilometers',toBase:1000},mm:{name:'Millimeters',toBase:0.001}}},
weight:{name:'Weight',units:{oz:{name:'Ounces',toBase:28.3495},g:{name:'Grams',toBase:1},lb:{name:'Pounds',toBase:453.592},kg:{name:'Kilograms',toBase:1000},mg:{name:'Milligrams',toBase:0.001},ton:{name:'Metric Tons',toBase:1000000},st:{name:'Stone',toBase:6350.29}}},
temperature:{name:'Temperature',units:{F:{name:'Fahrenheit'},C:{name:'Celsius'},K:{name:'Kelvin'}},special:true},
volume:{name:'Volume',units:{cup:{name:'Cups',toBase:236.588},ml:{name:'Milliliters',toBase:1},L:{name:'Liters',toBase:1000},gal:{name:'Gallons',toBase:3785.41},floz:{name:'Fluid Ounces',toBase:29.5735},tbsp:{name:'Tablespoons',toBase:14.7868},tsp:{name:'Teaspoons',toBase:4.92892},qt:{name:'Quarts',toBase:946.353},pt:{name:'Pints',toBase:473.176}}},
area:{name:'Area',units:{sqft:{name:'Square Feet',toBase:0.092903},sqm:{name:'Square Meters',toBase:1},acre:{name:'Acres',toBase:4046.86},ha:{name:'Hectares',toBase:10000},sqin:{name:'Square Inches',toBase:0.00064516},sqmi:{name:'Square Miles',toBase:2589988.11},sqkm:{name:'Square Kilometers',toBase:1000000}}},
digital:{name:'Digital Storage',units:{B:{name:'Bytes',toBase:1},KB:{name:'Kilobytes',toBase:1024},MB:{name:'Megabytes',toBase:1048576},GB:{name:'Gigabytes',toBase:1073741824},TB:{name:'Terabytes',toBase:1099511627776},PB:{name:'Petabytes',toBase:1125899906842624}}}
};

function convertTemp(val,from,to){
if(from===to)return val;
let c;
if(from==='F')c=(val-32)*5/9;
else if(from==='K')c=val-273.15;
else c=val;
if(to==='F')return c*9/5+32;
if(to==='K')return c+273.15;
return c;
}

function convertValue(val,from,to,cat){
if(cat==='temperature')return convertTemp(val,from,to);
const fromBase=categories[cat].units[from].toBase;
const toBase=categories[cat].units[to].toBase;
return val*fromBase/toBase;
}

function setCategory(cat){
currentCat=cat;
document.querySelectorAll('.category-tabs button').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.category-tabs button').forEach(b=>{if(b.dataset.cat===cat)b.classList.add('active')});
const units=categories[cat].units;
const keys=Object.keys(units);
const fromSel=document.getElementById('fromUnit');
const toSel=document.getElementById('toUnit');
fromSel.innerHTML=keys.map(k=>`<option value="${k}">${esc(units[k].name)} (${esc(k)})</option>`).join('');
toSel.innerHTML=keys.map(k=>`<option value="${k}">${esc(units[k].name)} (${esc(k)})</option>`).join('');
if(keys.length>1)toSel.selectedIndex=1;
document.getElementById('fromVal').value='';
document.getElementById('toVal').value='';
document.getElementById('allConv').innerHTML='';
}

function convert(){
const val=parseFloat(document.getElementById('fromVal').value);
const from=document.getElementById('fromUnit').value;
const to=document.getElementById('toUnit').value;
if(isNaN(val)){document.getElementById('toVal').value='';document.getElementById('allConv').innerHTML='';return}
const result=convertValue(val,from,to,currentCat);
document.getElementById('toVal').value=formatNum(result);

// Show all conversions
const units=categories[currentCat].units;
const keys=Object.keys(units);
document.getElementById('allConv').innerHTML=keys.map(k=>{
const r=convertValue(val,from,k,currentCat);
return`<div class="conv-card" onclick="copyConv(this,'${formatNum(r)} ${esc(k)}')">
<div class="val">${formatNum(r)}</div>
<div class="unit">${esc(units[k].name)} (${esc(k)})</div>
</div>`;
}).join('');

// Save to history
const entry=`${val} ${from} = ${formatNum(result)} ${to}`;
if(!history.length||history[0]!==entry){history.unshift(entry);save();renderHistory()}
}

function formatNum(n){
if(Math.abs(n)>=1e12)return n.toExponential(4);
if(Math.abs(n)<0.0001&&n!==0)return n.toExponential(4);
const s=n.toPrecision(10);
return parseFloat(s).toString();
}

function swapUnits(){
const fromSel=document.getElementById('fromUnit');
const toSel=document.getElementById('toUnit');
const fromVal=document.getElementById('fromVal');
const toVal=document.getElementById('toVal');
const tmpUnit=fromSel.value;
fromSel.value=toSel.value;
toSel.value=tmpUnit;
fromVal.value=toVal.value;
convert();
}

function copyConv(el,text){
navigator.clipboard.writeText(text).then(()=>{
const existing=el.querySelector('.copied');
if(existing)existing.remove();
const d=document.createElement('div');d.className='copied';d.textContent='Copied!';
el.appendChild(d);setTimeout(()=>d.remove(),1500);
});
}

function renderHistory(){
const list=document.getElementById('historyList');
if(!history.length){list.innerHTML='<div class="empty">No conversions yet.</div>';return}
list.innerHTML=history.slice(0,20).map(h=>`<div class="history-item"><span>${esc(h)}</span></div>`).join('');
}

function clearHistory(){history=[];save();renderHistory()}

function shareTwitter(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Check out this free Universal Unit Converter! https://spunk.codes/exclusive/unit-converter.html'),'_blank')}
function copyLink(){navigator.clipboard.writeText('https://spunk.codes/exclusive/unit-converter.html').then(()=>alert('Link copied!'))}

// Init category tabs
document.getElementById('catTabs').innerHTML=Object.keys(categories).map(k=>`<button data-cat="${k}" onclick="setCategory('${k}')">${categories[k].name}</button>`).join('');
load();renderHistory();setCategory('length');
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
