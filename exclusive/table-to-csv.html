<style>

.copied-toast.show{opacity:1}

<body>
<header>
<h1>HTML Table to CSV Converter</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>

<div class="panel">
<h2>Paste HTML Table</h2>
<textarea id="htmlInput" rows="10" placeholder='Paste HTML table markup here, e.g. <table><tr><th>Name</th><th>Age</th></tr><tr><td>John</td><td>30</td></tr></table>'></textarea>
<div class="btn-row">
<button onclick="convertTable()">Convert</button>
<button class="secondary" onclick="loadSample()">Load Sample</button>
<button class="secondary" onclick="clearAll()">Clear</button>
<button class="secondary" onclick="pasteClipboard()">Paste from Clipboard</button>
</div>
<div id="errorMsg"></div>
</div>

<div class="panel" id="resultPanel" style="display:none">
<h2>Parsed Table Preview</h2>
<div class="stats" id="stats"></div>
<div class="table-scroll" id="tablePreview"></div>
</div>

<div class="panel" id="outputPanel" style="display:none">
<h2>Output</h2>
<div class="format-tabs">
<button class="active" onclick="setFormat('csv',this)">CSV</button>
<button onclick="setFormat('tsv',this)">TSV</button>
<button onclick="setFormat('json',this)">JSON</button>
<button onclick="setFormat('markdown',this)">Markdown</button>
</div>
<div class="output-box" id="outputBox"><button class="copy-btn" onclick="copyOutput()">Copy</button></div>
<div class="btn-row">
<button onclick="copyOutput()">Copy to Clipboard</button>
<button class="secondary" onclick="downloadFile()">Download File</button>
</div>
</div>

<div class="panel">
<h2>Share</h2>
<div class="share-btns">
<button onclick="shareX()">Share on X</button>
<button class="secondary" onclick="shareReddit()">Share on Reddit</button>
<button class="secondary" onclick="copyLink()">Copy Link</button>
</div>
</div>
</main>

<footer>
<a href="https://spunk.codes">spunk.codes</a> &middot;
<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<div class="copied-toast" id="toast"></div>

<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

const LS_KEY='spunkcodes_table_csv';
let tableData=[];
let headers=[];
let currentFormat='csv';

function convertTable(){
const html=document.getElementById('htmlInput').value.trim();
const errEl=document.getElementById('errorMsg');
if(!html){errEl.innerHTML='<div class="error-msg">Please paste HTML table markup.</div>';return}

const parser=new DOMParser();
const doc=parser.parseFromString('<div>'+html+'</div>','text/html');
const table=doc.querySelector('table');
if(!table){errEl.innerHTML='<div class="error-msg">No &lt;table&gt; element found in the HTML.</div>';return}

errEl.innerHTML='';
headers=[];
tableData=[];

const rows=table.querySelectorAll('tr');
rows.forEach((row,ri)=>{
const cells=row.querySelectorAll('th,td');
const rowData=[];
cells.forEach(cell=>{
rowData.push(cell.textContent.trim());
});
if(row.querySelector('th')&&ri===0){
headers=rowData;
}else{
tableData.push(rowData);
}
});

if(!headers.length&&tableData.length){
headers=tableData.shift();
}

// Normalize column count
const maxCols=Math.max(headers.length,...tableData.map(r=>r.length));
while(headers.length<maxCols)headers.push('Column '+(headers.length+1));
tableData.forEach(r=>{while(r.length<maxCols)r.push('')});

document.getElementById('resultPanel').style.display='block';
document.getElementById('outputPanel').style.display='block';
renderPreview();
renderOutput();
saveState();
}

function renderPreview(){
document.getElementById('stats').innerHTML=`<span>Columns: ${headers.length}</span><span>Rows: ${tableData.length}</span>`;
let html='<table class="preview-table"><thead><tr>';
headers.forEach(h=>{html+=`<th>${esc(h)}</th>`});
html+='</tr></thead><tbody>';
tableData.forEach(row=>{
html+='<tr>';
row.forEach(cell=>{html+=`<td>${esc(cell)}</td>`});
html+='</tr>';
});
html+='</tbody></table>';
document.getElementById('tablePreview').innerHTML=html;
}

function setFormat(fmt,btn){
currentFormat=fmt;
document.querySelectorAll('.format-tabs button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderOutput();
}

function renderOutput(){
const box=document.getElementById('outputBox');
let output='';
if(currentFormat==='csv'){
output=toCSV(',');
}else if(currentFormat==='tsv'){
output=toCSV('\t');
}else if(currentFormat==='json'){
output=toJSON();
}else if(currentFormat==='markdown'){
output=toMarkdown();
}
box.innerHTML='<button class="copy-btn" onclick="copyOutput()">Copy</button>'+esc(output);
}

function csvEscape(val,sep){
val=String(val);
if(val.includes(sep)||val.includes('"')||val.includes('\n')){
return '"'+val.replace(/"/g,'""')+'"';
}
return val;
}

function toCSV(sep){
let lines=[];
lines.push(headers.map(h=>csvEscape(h,sep)).join(sep));
tableData.forEach(row=>{
lines.push(row.map(c=>csvEscape(c,sep)).join(sep));
});
return lines.join('\n');
}

function toJSON(){
const arr=tableData.map(row=>{
const obj={};
headers.forEach((h,i)=>{obj[h]=row[i]||''});
return obj;
});
return JSON.stringify(arr,null,2);
}

function toMarkdown(){
let lines=[];
lines.push('| '+headers.map(h=>esc(h)).join(' | ')+' |');
lines.push('| '+headers.map(()=>'---').join(' | ')+' |');
tableData.forEach(row=>{
lines.push('| '+row.map(c=>esc(c)).join(' | ')+' |');
});
return lines.join('\n');
}

function getOutputText(){
if(currentFormat==='csv')return toCSV(',');
if(currentFormat==='tsv')return toCSV('\t');
if(currentFormat==='json')return toJSON();
if(currentFormat==='markdown')return toMarkdown();
return '';
}

function copyOutput(){
navigator.clipboard.writeText(getOutputText()).then(()=>showToast('Copied!')).catch(()=>showToast('Copy failed'));
}

function downloadFile(){
const text=getOutputText();
const ext={csv:'.csv',tsv:'.tsv',json:'.json',markdown:'.md'}[currentFormat]||'.txt';
const mime={csv:'text/csv',tsv:'text/tab-separated-values',json:'application/json',markdown:'text/markdown'}[currentFormat]||'text/plain';
const blob=new Blob([text],{type:mime});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='table-export'+ext;
a.click();
URL.revokeObjectURL(a.href);
showToast('Downloaded!');
}

function loadSample(){
document.getElementById('htmlInput').value=`<table>
  <tr><th>Product</th><th>Price</th><th>Stock</th><th>Rating</th></tr>
  <tr><td>Widget Pro</td><td>$29.99</td><td>142</td><td>4.8</td></tr>
  <tr><td>Gadget Plus</td><td>$49.99</td><td>87</td><td>4.5</td></tr>
  <tr><td>Doohickey XL</td><td>$14.99</td><td>310</td><td>4.2</td></tr>
  <tr><td>Thingamajig</td><td>$7.99</td><td>520</td><td>3.9</td></tr>
  <tr><td>Whatchamacallit</td><td>$99.99</td><td>23</td><td>4.9</td></tr>
</table>`;
convertTable();
}

function pasteClipboard(){
navigator.clipboard.readText().then(t=>{document.getElementById('htmlInput').value=t;convertTable()}).catch(()=>showToast('Clipboard access denied'));
}

function clearAll(){
document.getElementById('htmlInput').value='';
document.getElementById('resultPanel').style.display='none';
document.getElementById('outputPanel').style.display='none';
document.getElementById('errorMsg').innerHTML='';
tableData=[];headers=[];
}

function saveState(){try{localStorage.setItem(LS_KEY,document.getElementById('htmlInput').value)}catch(e){}}
function loadState(){try{const d=localStorage.getItem(LS_KEY);if(d){document.getElementById('htmlInput').value=d;if(d.trim())convertTable()}}catch(e){}}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

const toolURL='https://spunk.codes/exclusive/table-to-csv.html';
function shareX(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Convert HTML tables to CSV/TSV/JSON instantly! '+toolURL),'_blank')}
function shareReddit(){window.open('https://reddit.com/submit?url='+encodeURIComponent(toolURL)+'&title='+encodeURIComponent('HTML Table to CSV Converter - Free Tool'),'_blank')}
function copyLink(){navigator.clipboard.writeText(toolURL).then(()=>showToast('Link copied!'))}

loadState();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
