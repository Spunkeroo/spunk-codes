const BADGE_CLASSES = {
  'Checklist':'badge-checklist','Template':'badge-template','Guide':'badge-guide',
  'Quiz':'badge-quiz','Calculator':'badge-calculator','Swipe File':'badge-swipefile'
};

let currentBuildIdea = null;
let editingId = null;

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`#panel-${tab}`).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if ((tab === 'generate' && b.textContent.includes('Generate')) ||
        (tab === 'saved' && b.textContent.includes('My Lead'))) {
      b.classList.add('active');
    }
  });
  if (tab === 'saved') renderSaved();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateIdeas() {
  const niche = document.getElementById('nicheSelect').value;
  if (!niche) { showToast('Please select a niche first'); return; }
  const ideas = NICHE_IDEAS[niche];
  if (!ideas) { showToast('No ideas found for this niche'); return; }
  const picked = shuffle(ideas).slice(0, 6);
  const grid = document.getElementById('ideasGrid');
  grid.innerHTML = picked.map((idea, i) => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${idea.title}</div>
        <span class="badge ${BADGE_CLASSES[idea.type] || ''}">${idea.type}</span>
      </div>
      <div class="card-desc">${idea.desc}</div>
      <div class="card-meta">
        <span>&#9200; ${idea.time}</span>
        <span>&#9881; ${idea.difficulty}</span>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm" onclick="openBuilder(${i})">Build This</button>
      </div>
    </div>
  `).join('');
  grid._ideas = picked;
}

function openBuilder(index) {
  const grid = document.getElementById('ideasGrid');
  const idea = grid._ideas[index];
  currentBuildIdea = idea;
  editingId = null;
  document.getElementById('builderTitle').textContent = 'Build: ' + idea.title;
  document.getElementById('buildTitle').value = idea.title;
  document.getElementById('buildIntro').value = '';
  for (let i = 1; i <= 5; i++) document.getElementById('sec' + i).value = '';
  document.getElementById('buildCTA').value = '';
  document.getElementById('previewBox').classList.remove('visible');
  document.getElementById('builderOverlay').classList.add('open');
}

function openBuilderForEdit(id) {
  const saved = getSaved();
  const item = saved.find(s => s.id === id);
  if (!item) return;
  editingId = id;
  currentBuildIdea = { title: item.title, type: item.type };
  document.getElementById('builderTitle').textContent = 'Edit: ' + item.title;
  document.getElementById('buildTitle').value = item.title;
  document.getElementById('buildIntro').value = item.intro || '';
  for (let i = 1; i <= 5; i++) document.getElementById('sec' + i).value = item.sections[i - 1] || '';
  document.getElementById('buildCTA').value = item.cta || '';
  document.getElementById('previewBox').classList.remove('visible');
  document.getElementById('builderOverlay').classList.add('open');
}

function closeBuilder() {
  document.getElementById('builderOverlay').classList.remove('open');
}

function getBuilderData() {
  const title = document.getElementById('buildTitle').value.trim();
  const intro = document.getElementById('buildIntro').value.trim();
  const sections = [];
  for (let i = 1; i <= 5; i++) {
    const v = document.getElementById('sec' + i).value.trim();
    if (v) sections.push(v);
  }
  const cta = document.getElementById('buildCTA').value.trim();
  return { title, intro, sections, cta };
}

function formatMagnet(data) {
  let text = '';
  text += '========================================\n';
  text += data.title.toUpperCase() + '\n';
  text += '========================================\n\n';
  if (data.intro) text += data.intro + '\n\n';
  if (data.sections.length) {
    text += '--- TABLE OF CONTENTS ---\n\n';
    data.sections.forEach((s, i) => {
      text += (i + 1) + '. ' + s + '\n';
    });
    text += '\n';
    data.sections.forEach((s, i) => {
      text += '--- Section ' + (i + 1) + ': ' + s + ' ---\n';
      text += '[Your content here]\n\n';
    });
  }
  if (data.cta) {
    text += '========================================\n';
    text += data.cta + '\n';
    text += '========================================\n';
  }
  return text;
}

function previewMagnet() {
  const data = getBuilderData();
  if (!data.title) { showToast('Please enter a title'); return; }
  const formatted = formatMagnet(data);
  document.getElementById('previewContent').textContent = formatted;
  document.getElementById('previewBox').classList.add('visible');
}

function saveMagnet() {
  const data = getBuilderData();
  if (!data.title) { showToast('Please enter a title'); return; }
  const saved = getSaved();
  if (editingId) {
    const idx = saved.findIndex(s => s.id === editingId);
    if (idx !== -1) {
      saved[idx] = { ...saved[idx], ...data, type: currentBuildIdea.type, updatedAt: Date.now() };
    }
  } else {
    saved.push({
      id: 'lm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      ...data,
      type: currentBuildIdea ? currentBuildIdea.type : 'Guide',
      createdAt: Date.now(),
      updatedAt: Date.now()
    });
  }
  setSaved(saved);
  updateSavedCount();
  showToast('Lead magnet saved!');
  closeBuilder();
}

function exportMagnet() {
  const data = getBuilderData();
  if (!data.title) { showToast('Please enter a title'); return; }
  const formatted = formatMagnet(data);
  navigator.clipboard.writeText(formatted).then(() => {
    showToast('Copied to clipboard!');
  }).catch(() => {
    showToast('Failed to copy — try manually selecting the preview text');
  });
}

function getSaved() {
  try { return JSON.parse(localStorage.getItem('spunk_lead_magnets') || '[]'); }
  catch { return []; }
}

function setSaved(data) {
  localStorage.setItem('spunk_lead_magnets', JSON.stringify(data));
}

function updateSavedCount() {
  const count = getSaved().length;
  document.getElementById('savedCount').textContent = count > 0 ? '(' + count + ')' : '';
}

function renderSaved() {
  const saved = getSaved();
  const grid = document.getElementById('savedGrid');
  const empty = document.getElementById('savedEmpty');
  if (saved.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = saved.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)).map(item => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${escapeHtml(item.title)}</div>
        <span class="badge ${BADGE_CLASSES[item.type] || 'badge-guide'}">${item.type || 'Guide'}</span>
      </div>
      <div class="card-desc">${item.sections && item.sections.length ? item.sections.length + ' sections' : 'No sections yet'}${item.intro ? ' &middot; Has intro' : ''}${item.cta ? ' &middot; Has CTA' : ''}</div>
      <div class="card-meta">
        <span>Created ${formatDate(item.createdAt)}</span>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm" onclick="openBuilderForEdit('${item.id}')">Edit</button>
        <button class="btn btn-sm btn-secondary" onclick="exportSaved('${item.id}')">Export</button>
        <button class="btn btn-sm btn-secondary" onclick="deleteSaved('${item.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function exportSaved(id) {
  const saved = getSaved();
  const item = saved.find(s => s.id === id);
  if (!item) return;
  const formatted = formatMagnet(item);
  navigator.clipboard.writeText(formatted).then(() => {
    showToast('Copied to clipboard!');
  }).catch(() => {
    showToast('Failed to copy');
  });
}

function deleteSaved(id) {
  if (!confirm('Delete this lead magnet?')) return;
  const saved = getSaved().filter(s => s.id !== id);
  setSaved(saved);
  updateSavedCount();
  renderSaved();
  showToast('Deleted');
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close overlay on backdrop click
document.getElementById('builderOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeBuilder();
});

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeBuilder();
});

// Init
updateSavedCount();
</script>
