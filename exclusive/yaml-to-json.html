<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let direction='yaml2json';
let lastOutput='';

function setDir(dir,btn){

btn.classList.add('active');

document.getElementById('outputLabel').textContent='JSON Output';

document.getElementById('inputLabel').textContent='JSON Input';

// Minimal YAML parser (handles common cases)
function parseYAML(text){
const lines=text.split('\n');
return parseYAMLLines(lines,0,0).value;
}

function parseYAMLLines(lines,start,baseIndent){
const result={};
let isArray=false;
let arr=[];
let i=start;
while(i<lines.length){
let line=lines[i];
// Skip empty lines and comments
if(line.trim()===''||line.trim().startsWith('#')){i++;continue}
// Calculate indent
const indent=line.length-line.trimStart().length;
if(indent<baseIndent)break;
if(indent>baseIndent&&i===start){
// Re-adjust base indent
return parseYAMLLines(lines,i,indent);
}
if(indent!==baseIndent)break;
const trimmed=line.trim();
// Array item
if(trimmed.startsWith('- ')){
isArray=true;
const val=trimmed.slice(2).trim();
// Check if it's a nested object in the array item
if(val.includes(': ')){
const obj={};
const kv=parseYAMLValue(val);
if(typeof kv==='string'&&val.includes(': ')){
const colonIdx=val.indexOf(': ');
const k=val.slice(0,colonIdx).trim();
const v=parseYAMLScalar(val.slice(colonIdx+2).trim());
obj[k]=v;
// Check for continuation lines
let j=i+1;
const itemIndent=indent+2;
while(j<lines.length){
const nextLine=lines[j];
if(nextLine.trim()===''||nextLine.trim().startsWith('#')){j++;continue}
const ni=nextLine.length-nextLine.trimStart().length;
if(ni<itemIndent)break;
if(ni>=itemIndent){
const nt=nextLine.trim();
if(nt.includes(': ')){
const ci=nt.indexOf(': ');
const nk=nt.slice(0,ci).trim();
const nv=nt.slice(ci+2).trim();
if(nv===''||nv==='>'){
const sub=parseYAMLLines(lines,j+1,ni+2);
obj[nk]=sub.value;
j=sub.nextIndex;
}else{
obj[nk]=parseYAMLScalar(nv);
j++;
}
}else{j++}
}else break;
}
arr.push(obj);
i=j;
continue;
}
}
if(val===''){
// Nested structure
const sub=parseYAMLLines(lines,i+1,indent+2);
arr.push(sub.value);
i=sub.nextIndex;
}else{
arr.push(parseYAMLScalar(val));
i++;
}
continue;
}
if(trimmed.startsWith('- ')){
isArray=true;
arr.push(parseYAMLScalar(trimmed.slice(2)));
i++;continue;
}
// Key: value
const colonMatch=trimmed.match(/^([^:]+?):\s*(.*)/);
if(colonMatch){
const key=colonMatch[1].trim().replace(/^['"]|['"]$/g,'');
const val=colonMatch[2].trim();
if(val===''||val==='|'||val==='>'){
// Block value or nested object/array
const nextI=i+1;
if(nextI<lines.length){
const nextLine=lines[nextI];
const nextIndent=nextLine.length-nextLine.trimStart().length;
if(nextIndent>indent){
if(val==='|'||val==='>'){
// Block scalar
let block=[];
let j=nextI;
while(j<lines.length){
const bl=lines[j];
if(bl.trim()===''&&j>nextI){
// Check if next non-empty line is still indented
let k=j+1;
while(k<lines.length&&lines[k].trim()==='')k++;
if(k<lines.length&&(lines[k].length-lines[k].trimStart().length)>=nextIndent){
block.push('');j++;continue;
}
break;
}
const bi=bl.length-bl.trimStart().length;
if(bi<nextIndent&&bl.trim()!=='')break;
block.push(bl.slice(nextIndent));
j++;
}
result[key]=val==='|'?block.join('\n'):block.join(' ');
i=j;
}else{
const sub=parseYAMLLines(lines,nextI,nextIndent);
result[key]=sub.value;
i=sub.nextIndex;
}
}else{
result[key]=null;
i++;
}
}else{
result[key]=null;
i++;
}
}else{
// Inline value
result[key]=parseYAMLScalar(val);
i++;
}
}else{
i++;
}
}
if(isArray)return{value:arr,nextIndex:i};
return{value:result,nextIndex:i};
}

function parseYAMLScalar(s){
if(s===''||s==='null'||s==='~')return null;
if(s==='true')return true;
if(s==='false')return false;
if(/^-?\d+$/.test(s))return parseInt(s,10);
if(/^-?\d+\.\d+$/.test(s))return parseFloat(s);
if(/^-?\d+\.?\d*[eE][+-]?\d+$/.test(s))return parseFloat(s);
// Quoted string
if((s.startsWith('"')&&s.endsWith('"'))||(s.startsWith("'")&&s.endsWith("'")))
return s.slice(1,-1);
// Inline array [a, b, c]
if(s.startsWith('[')&&s.endsWith(']')){
try{return JSON.parse(s)}catch(e){
return s.slice(1,-1).split(',').map(v=>parseYAMLScalar(v.trim()));
}
}
// Inline object {a: b, c: d}
if(s.startsWith('{')&&s.endsWith('}')){
try{return JSON.parse(s)}catch(e){
const obj={};
s.slice(1,-1).split(',').forEach(pair=>{
const ci=pair.indexOf(':');
if(ci>0){
obj[pair.slice(0,ci).trim().replace(/^['"]|['"]$/g,'')]=parseYAMLScalar(pair.slice(ci+1).trim());
}
});
return obj;
}
}
return s;
}

function parseYAMLValue(s){
return parseYAMLScalar(s);
}

// JSON to YAML converter
function jsonToYAML(obj,indent){
indent=indent||0;
const pad='  '.repeat(indent);
if(obj===null||obj===undefined)return 'null';
if(typeof obj==='boolean')return obj?'true':'false';
if(typeof obj==='number')return String(obj);
if(typeof obj==='string'){
if(obj.includes('\n'))return '|\n'+obj.split('\n').map(l=>pad+'  '+l).join('\n');
if(obj===''||obj.includes(':')||obj.includes('#')||obj.includes('{')||obj.includes('}')||
obj.includes('[')||obj.includes(']')||obj.includes(',')||obj.includes('&')||
obj.includes('*')||obj.includes('?')||obj.includes('|')||obj.includes('-')||
obj.includes('<')||obj.includes('>')||obj.includes('=')||obj.includes('!')||
obj.includes('%')||obj.includes('@')||obj.includes('\\')||
obj==='true'||obj==='false'||obj==='null'||/^[\d.eE+-]+$/.test(obj))
return "'"+obj.replace(/'/g,"''")+"'";
return obj;
}
if(Array.isArray(obj)){
if(!obj.length)return '[]';
let out='';
obj.forEach(v=>{
if(v!==null&&typeof v==='object'&&!Array.isArray(v)){
const keys=Object.keys(v);
if(keys.length>0){
out+=pad+'- '+keys[0]+': '+jsonToYAML(v[keys[0]],indent+1)+'\n';
for(let ki=1;ki<keys.length;ki++){
out+=pad+'  '+keys[ki]+': '+jsonToYAML(v[keys[ki]],indent+1)+'\n';
}
return;
}
}
out+=pad+'- '+jsonToYAML(v,indent+1)+'\n';
});
return '\n'+out.replace(/\n$/,'');
}
const keys=Object.keys(obj);
if(!keys.length)return '{}';
let out='';
keys.forEach(k=>{
const v=obj[k];
const yamlVal=jsonToYAML(v,indent+1);
if(yamlVal.startsWith('\n')){
out+=pad+k+':'+yamlVal+'\n';
}else{
out+=pad+k+': '+yamlVal+'\n';
}
});
if(indent===0)return out.replace(/\n$/,'');
return '\n'+out.replace(/\n$/,'');
}

function convert(){
const input=document.getElementById('input').value;
const errBox=document.getElementById('errorBox');
const sucBox=document.getElementById('successBox');
errBox.style.display='none';
sucBox.style.display='none';
if(!input.trim()){
errBox.style.display='block';
errBox.textContent='Please paste some input data.';
return;
}
try{
if(direction==='yaml2json'){
const parsed=parseYAML(input);
lastOutput=JSON.stringify(parsed,null,2);
document.getElementById('output').innerHTML=highlightJSON(lastOutput);
}else{
const parsed=JSON.parse(input);
lastOutput=jsonToYAML(parsed);
document.getElementById('output').innerHTML=highlightYAML(esc(lastOutput));
}
sucBox.style.display='block';
sucBox.textContent='Conversion successful!';
document.getElementById('outputSize').textContent='Output: '+lastOutput.length+' chars';
// Save to localStorage
try{localStorage.setItem('yaml2json_last_dir',direction);localStorage.setItem('yaml2json_last_input',input)}catch(e){}
}catch(e){
errBox.style.display='block';
errBox.textContent='Error: '+e.message;
}
}

function highlightJSON(json){
let r=esc(json);
r=r.replace(/"([^"\\]*(\\.[^"\\]*)*)"(\s*:)?/g,function(m,p1,p2,p3){
if(p3)return '<span class="hl-key">"'+p1+'"</span>'+p3;
return '<span class="hl-str">"'+p1+'"</span>';
});
r=r.replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g,'<span class="hl-num">$1</span>');
r=r.replace(/\b(true|false)\b/g,'<span class="hl-bool">$1</span>');
r=r.replace(/\bnull\b/g,'<span class="hl-null">null</span>');
return r;
}

function highlightYAML(text){
let r=text;
r=r.replace(/(#.*)$/gm,'<span class="yaml-comment">$1</span>');
r=r.replace(/^(\s*)([\w][\w\s.-]*)(:)/gm,'$1<span class="yaml-key">$2</span>$3');
r=r.replace(/\b(true|false)\b/g,'<span class="yaml-bool">$1</span>');
r=r.replace(/\bnull\b/g,'<span class="hl-null">null</span>');
return r;
}

function copyOutput(){
if(!lastOutput){return}
navigator.clipboard.writeText(lastOutput).then(()=>{
const el=document.createElement('div');
el.className='copied';
el.textContent='Output copied!';
document.body.appendChild(el);
setTimeout(()=>el.remove(),1600);
});
}

function swapIO(){

document.getElementById('outputLabel').textContent='JSON Output';
}else{
document.getElementById('inputLabel').textContent='JSON Input';
document.getElementById('outputLabel').textContent='YAML Output';
}
convert();
}

function updateInputSize(){
const len=document.getElementById('input').value.length;
document.getElementById('inputSize').textContent='Input: '+len+' chars';
}

if(dir==='json2yaml'){
document.getElementById('inputLabel').textContent='JSON Input';
document.getElementById('outputLabel').textContent='YAML Output';
document.getElementById('input').placeholder='Paste your JSON here...';
}
