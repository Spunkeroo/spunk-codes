<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e8e8f0;font-size:.9rem}
main{flex:1;max-width:700px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e8e8f0}button.secondary:hover{background:#3a3a4a}
button.danger{background:#cc2233}button.danger:hover{background:#aa1122}
input,select{background:#16161e;border:1px solid #2a2a3a;color:#e8e8f0;padding:8px 12px;border-radius:6px;font-size:.9rem;width:100%}
.input-group{margin-bottom:16px}
.input-group label{font-size:.85rem;color:#888;margin-bottom:6px;display:block}
.unit-toggle{display:flex;gap:8px;margin-bottom:16px}
.unit-toggle button{flex:1;padding:10px;border-radius:8px;font-size:.9rem}
.unit-toggle button.active{background:#ff5f1f;box-shadow:0 0 12px rgba(255,95,31,.4)}
.unit-toggle button:not(.active){background:#2a2a3a;color:#e8e8f0}
.height-row{display:flex;gap:10px}
.height-row .input-group{flex:1}
.bmi-result{text-align:center;padding:24px;margin-bottom:16px}
.bmi-result .bmi-value{font-size:3.5rem;font-weight:700;color:#ff5f1f}
.bmi-result .bmi-cat{font-size:1.2rem;margin-top:8px;font-weight:600}
.bmi-scale{position:relative;height:30px;border-radius:15px;margin:20px 0;overflow:hidden;display:flex}
.bmi-scale div{height:100%}
.scale-underweight{background:#3b82f6;flex:18.5}
.scale-normal{background:#22c55e;flex:6.5}
.scale-overweight{background:#f59e0b;flex:5}
.scale-obese{background:#ef4444;flex:10}
.bmi-marker{position:absolute;top:-6px;width:4px;height:42px;background:#fff;border-radius:2px;transform:translateX(-50%);transition:left .5s}
.scale-labels{display:flex;justify-content:space-between;font-size:.7rem;color:#888;margin-top:4px}
.healthy-range{background:#16161e;border:1px solid #22c55e;border-radius:8px;padding:14px;text-align:center;margin-bottom:16px}
.healthy-range .range-val{font-size:1.2rem;font-weight:700;color:#22c55e}
.healthy-range .range-lbl{font-size:.8rem;color:#888;margin-top:4px}
.chart-container{position:relative;width:100%;height:200px;margin-bottom:16px}
.chart-container canvas{width:100%;height:100%}
.history-item{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.history-item .info{font-size:.9rem}
.history-item .date{font-size:.75rem;color:#555}
.empty{text-align:center;color:#555;padding:30px;font-size:.95rem}
.share-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.share-btns button{font-size:.8rem;padding:6px 12px}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2a;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:700px){
.bmi-result .bmi-value{font-size:2.5rem}
header h1{font-size:1.1rem}
.height-row{flex-direction:column}
}
</style>
</head>
<body>
<header>
<h1>BMI Calculator</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>
<div class="panel">
<h2>Units</h2>
<div class="unit-toggle">
<button class="active" onclick="setUnit('imperial')">Imperial (ft/lb)</button>
<button onclick="setUnit('metric')">Metric (cm/kg)</button>
</div>
</div>

<div class="panel">
<h2>Height</h2>
<div id="heightImperial" class="height-row">
<div class="input-group"><label>Feet</label><input type="number" id="hFeet" min="1" max="8" placeholder="5" oninput="calc()"></div>
<div class="input-group"><label>Inches</label><input type="number" id="hInches" min="0" max="11" placeholder="10" oninput="calc()"></div>
</div>
<div id="heightMetric" style="display:none">
<div class="input-group"><label>Centimeters</label><input type="number" id="hCm" min="50" max="300" placeholder="178" oninput="calc()"></div>
</div>
</div>

<div class="panel">
<h2>Weight</h2>
<div id="weightImperial">
<div class="input-group"><label>Pounds</label><input type="number" id="wLbs" min="1" max="1000" placeholder="160" oninput="calc()"></div>
</div>
<div id="weightMetric" style="display:none">
<div class="input-group"><label>Kilograms</label><input type="number" id="wKg" min="1" max="500" placeholder="73" oninput="calc()"></div>
</div>
</div>

<div class="panel" id="resultsPanel" style="display:none">
<h2>Your BMI</h2>
<div class="bmi-result">
<div class="bmi-value" id="bmiValue">0</div>
<div class="bmi-cat" id="bmiCat">-</div>
</div>
<div style="position:relative">
<div class="bmi-scale">
<div class="scale-underweight"></div>
<div class="scale-normal"></div>
<div class="scale-overweight"></div>
<div class="scale-obese"></div>
<div class="bmi-marker" id="bmiMarker" style="left:0%"></div>
</div>
<div class="scale-labels">
<span>Underweight</span><span>Normal</span><span>Overweight</span><span>Obese</span>
</div>
</div>
<div class="healthy-range">
<div class="range-val" id="healthyRange">-</div>
<div class="range-lbl">Healthy weight range for your height</div>
</div>
<button onclick="saveEntry()">Save to History</button>
</div>

<div class="panel">
<h2>BMI History</h2>
<div class="chart-container" id="chartContainer" style="display:none">
<canvas id="bmiChart"></canvas>
</div>
<div id="historyList"><div class="empty">No BMI entries saved yet.</div></div>
<div style="margin-top:10px"><button class="danger" onclick="clearHistory()">Clear History</button></div>
</div>

<div class="panel">
<h2>Share</h2>
<div class="share-btns">
<button onclick="shareTwitter()">Share on X</button>
<button class="secondary" onclick="shareReddit()">Share on Reddit</button>
<button class="secondary" onclick="shareEmail()">Share via Email</button>
<button class="secondary" onclick="copyLink()">Copy Link</button>
</div>
</div>
</main>

<footer>

<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
const LS_KEY='spunkcodes_bmi_calc';
let unit='imperial';
let history=[];
let lastBmi=0;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function load(){try{history=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){history=[]}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(history.slice(0,100)))}

function setUnit(u){
unit=u;
document.querySelectorAll('.unit-toggle button').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.unit-toggle button')[u==='imperial'?0:1].classList.add('active');
document.getElementById('heightImperial').style.display=u==='imperial'?'flex':'none';
document.getElementById('heightMetric').style.display=u==='metric'?'':'none';
document.getElementById('weightImperial').style.display=u==='imperial'?'':'none';
document.getElementById('weightMetric').style.display=u==='metric'?'':'none';
calc();
}

function getHeightCm(){
if(unit==='imperial'){
const ft=parseFloat(document.getElementById('hFeet').value)||0;
const inc=parseFloat(document.getElementById('hInches').value)||0;
return(ft*12+inc)*2.54;
}
return parseFloat(document.getElementById('hCm').value)||0;
}

function getWeightKg(){
if(unit==='imperial'){
const lbs=parseFloat(document.getElementById('wLbs').value)||0;
return lbs*0.453592;
}
return parseFloat(document.getElementById('wKg').value)||0;
}

function calc(){
const hCm=getHeightCm();
const wKg=getWeightKg();
if(hCm<=0||wKg<=0){document.getElementById('resultsPanel').style.display='none';return}
document.getElementById('resultsPanel').style.display='';

const hM=hCm/100;
const bmi=wKg/(hM*hM);
lastBmi=bmi;

document.getElementById('bmiValue').textContent=bmi.toFixed(1);

let cat='',color='';
if(bmi<18.5){cat='Underweight';color='#3b82f6'}
else if(bmi<25){cat='Normal Weight';color='#22c55e'}
else if(bmi<30){cat='Overweight';color='#f59e0b'}
else{cat='Obese';color='#ef4444'}

document.getElementById('bmiCat').textContent=cat;
document.getElementById('bmiCat').style.color=color;
document.getElementById('bmiValue').style.color=color;

// Position marker on scale (10-40 range mapped to 0-100%)
const pct=Math.max(0,Math.min(100,((bmi-10)/30)*100));
document.getElementById('bmiMarker').style.left=pct+'%';

// Healthy range
const lowW=18.5*hM*hM;
const highW=24.9*hM*hM;
if(unit==='imperial'){
document.getElementById('healthyRange').textContent=Math.round(lowW*2.20462)+' - '+Math.round(highW*2.20462)+' lbs';
}else{
document.getElementById('healthyRange').textContent=lowW.toFixed(1)+' - '+highW.toFixed(1)+' kg';
}
}

function saveEntry(){
if(lastBmi<=0)return;
const hCm=getHeightCm();
const wKg=getWeightKg();
history.unshift({id:Date.now(),date:new Date().toLocaleDateString(),bmi:parseFloat(lastBmi.toFixed(1)),weight:unit==='imperial'?Math.round(wKg*2.20462)+'lb':wKg.toFixed(1)+'kg',height:unit==='imperial'?(Math.floor(hCm/2.54/12)+"'"+Math.round(hCm/2.54%12)+'"'):(Math.round(hCm)+'cm')});
save();renderHistory();drawChart();
}

function removeEntry(id){history=history.filter(h=>h.id!==id);save();renderHistory();drawChart()}
function clearHistory(){if(!confirm('Clear all BMI history?'))return;history=[];save();renderHistory();drawChart()}

function renderHistory(){
const list=document.getElementById('historyList');
if(!history.length){list.innerHTML='<div class="empty">No BMI entries saved yet.</div>';return}
list.innerHTML=history.map(h=>{
let color='#22c55e';
if(h.bmi<18.5)color='#3b82f6';else if(h.bmi>=25&&h.bmi<30)color='#f59e0b';else if(h.bmi>=30)color='#ef4444';
return`<div class="history-item">
<div><div class="info"><strong style="color:${color}">${h.bmi}</strong> BMI &middot; ${esc(h.weight)} &middot; ${esc(h.height)}</div>
<div class="date">${esc(h.date)}</div></div>
<button class="danger" onclick="removeEntry(${h.id})" style="font-size:.75rem;padding:4px 8px">&times;</button>
</div>`}).join('');
}

function drawChart(){
const container=document.getElementById('chartContainer');
if(history.length<2){container.style.display='none';return}
container.style.display='';
const canvas=document.getElementById('bmiChart');
const ctx=canvas.getContext('2d');
canvas.width=canvas.offsetWidth*2;canvas.height=canvas.offsetHeight*2;
ctx.scale(2,2);
const w=canvas.offsetWidth,h=canvas.offsetHeight;
ctx.clearRect(0,0,w,h);

const data=[...history].reverse().slice(-20);
const bmis=data.map(d=>d.bmi);
const minB=Math.floor(Math.min(...bmis))-2;
const maxB=Math.ceil(Math.max(...bmis))+2;
const range=maxB-minB||1;

// Grid
ctx.strokeStyle='#2a2a3a';ctx.lineWidth=0.5;
for(let i=0;i<=4;i++){
const y=h-20-(i/4)*(h-40);
ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(w-10,y);ctx.stroke();
ctx.fillStyle='#555';ctx.font='10px sans-serif';
ctx.fillText((minB+(range*i/4)).toFixed(1),2,y+3);
}

// Normal range band
const ny1=h-20-((24.9-minB)/range)*(h-40);
const ny2=h-20-((18.5-minB)/range)*(h-40);
ctx.fillStyle='rgba(34,197,94,.08)';
ctx.fillRect(40,ny1,w-50,ny2-ny1);

// Line
ctx.strokeStyle='#ff5f1f';ctx.lineWidth=2;ctx.beginPath();
data.forEach((d,i)=>{
const x=40+(i/(data.length-1))*(w-50);
const y=h-20-((d.bmi-minB)/range)*(h-40);
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
});
ctx.stroke();

// Dots
data.forEach((d,i)=>{
const x=40+(i/(data.length-1))*(w-50);
const y=h-20-((d.bmi-minB)/range)*(h-40);
ctx.fillStyle='#ff5f1f';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
});
}

function shareTwitter(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Check out this free BMI Calculator with tracking! https://spunk.codes/exclusive/bmi-calculator.html'),'_blank')}
function shareReddit(){window.open('https://reddit.com/submit?url='+encodeURIComponent('https://spunk.codes/exclusive/bmi-calculator.html')+'&title='+encodeURIComponent('Free BMI Calculator with History Tracking'),'_blank')}
function shareEmail(){window.open('mailto:?subject='+encodeURIComponent('BMI Calculator')+'&body='+encodeURIComponent('Track your BMI over time: https://spunk.codes/exclusive/bmi-calculator.html'))}
function copyLink(){navigator.clipboard.writeText('https://spunk.codes/exclusive/bmi-calculator.html').then(()=>alert('Link copied!'))}

load();renderHistory();
setTimeout(drawChart,100);
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
