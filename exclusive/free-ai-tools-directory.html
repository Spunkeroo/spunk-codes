{name:'Notion AI',desc:'AI built into Notion for writing, summarizing, brainstorming, translating, and organizing notes.',category:'productivity',difficulty:'beginner',limits:'Free: limited AI responses, then $10/mo add-on',url:'https://notion.so'},

const CATEGORIES=['all','writing','image','video','music','coding','research','productivity','finance','health','education','shopping'];
const CAT_LABELS={all:'All',writing:'Writing',image:'Image Creation',video:'Video',music:'Music',coding:'Coding',research:'Research',productivity:'Productivity',finance:'Finance',health:'Health',education:'Education',shopping:'Shopping'};

function toggleFav(name){
favorites[name]=!favorites[name];
if(!favorites[name])delete favorites[name];
save();renderTools();
}

function setCat(cat){
catFilter=cat;
document.querySelectorAll('#catFilter button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
renderTools();
}

function setDiff(d,btn){
diffFilter=d;
btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderTools();
}

function toggleFavFilter(){
showFavsOnly=!showFavsOnly;
document.getElementById('favToggle').classList.toggle('active',showFavsOnly);
document.getElementById('favToggle').textContent=showFavsOnly?'Show All':'Show Favorites';
renderTools();
}

function getFiltered(){
let list=TOOLS;
const q=document.getElementById('searchInput').value.toLowerCase().trim();
if(q)list=list.filter(t=>t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||t.category.toLowerCase().includes(q));
if(catFilter!=='all')list=list.filter(t=>t.category===catFilter);
if(diffFilter!=='all')list=list.filter(t=>t.difficulty===diffFilter);
if(showFavsOnly)list=list.filter(t=>favorites[t.name]);
return list;
}

function renderTools(){
const filtered=getFiltered();
const grid=document.getElementById('toolGrid');
const emptyMsg=document.getElementById('emptyMsg');

// Summary
const favCount=Object.keys(favorites).filter(k=>favorites[k]).length;
document.getElementById('summaryCards').innerHTML=`
<div class="summary-card"><div class="value">${TOOLS.length}</div><div class="label">Total Tools</div></div>
<div class="summary-card"><div class="value">${filtered.length}</div><div class="label">Showing</div></div>
<div class="summary-card"><div class="value">${favCount}</div><div class="label">Favorites</div></div>
<div class="summary-card"><div class="value">${CATEGORIES.length-1}</div><div class="label">Categories</div></div>`;

if(!filtered.length){grid.innerHTML='';emptyMsg.style.display='';return}
emptyMsg.style.display='none';

grid.innerHTML=filtered.map(t=>{
const isFav=favorites[t.name];
const diffClass=t.difficulty==='beginner'?'badge-beginner':t.difficulty==='intermediate'?'badge-intermediate':'badge-advanced';
return`<div class="tool-card ${isFav?'fav':''}">
<div class="tool-header">
<div class="tool-name">${esc(t.name)}</div>
<button class="tool-fav ${isFav?'active':''}" onclick="toggleFav('${esc(t.name)}')" title="Toggle favorite">&#9733;</button>
</div>
<div class="tool-desc">${esc(t.desc)}</div>
<div class="tool-meta">
<span class="badge badge-cat">${esc(CAT_LABELS[t.category]||t.category)}</span>
<span class="badge ${diffClass}">${esc(t.difficulty)}</span>
</div>
<div class="tool-limits">${esc(t.limits)}</div>
<a href="${esc(t.url)}" target="_blank" rel="noopener" class="tool-link">${esc(t.url.replace('https://',''))} &rarr;</a>
</div>`;}).join('');
}

function initCatFilter(){
document.getElementById('catFilter').innerHTML=CATEGORIES.map(c=>{
const count=c==='all'?TOOLS.length:TOOLS.filter(t=>t.category===c).length;
return`<button class="${c===catFilter?'active':''}" onclick="setCat('${c}')">${CAT_LABELS[c]}<span class="count-badge">(${count})</span></button>`;
}).join('');
}

load();initCatFilter();renderTools();
</script>
