<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e8e8f0;font-size:.9rem}
main{flex:1;max-width:800px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e8e8f0}button.secondary:hover{background:#3a3a4a}
button.danger{background:#cc2233}button.danger:hover{background:#aa1122}
button.active-tool{background:#ff5f1f;box-shadow:0 0 12px rgba(255,95,31,.4)}
input,select{background:#16161e;border:1px solid #2a2a3a;color:#e8e8f0;padding:8px 12px;border-radius:6px;font-size:.9rem;width:100%}
.input-group{margin-bottom:16px}
.input-group label{font-size:.85rem;color:#888;margin-bottom:6px;display:block}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.toolbar button{padding:8px 14px}
.color-section{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.color-section input[type=color]{width:50px;height:40px;border:2px solid #2a2a3a;border-radius:6px;cursor:pointer;background:none;padding:2px}
.palette{display:flex;gap:4px;flex-wrap:wrap}
.palette .swatch{width:28px;height:28px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:border-color .2s}
.palette .swatch:hover,.palette .swatch.active{border-color:#ff5f1f}
.canvas-wrap{display:flex;justify-content:center;margin-bottom:16px;overflow:auto}
#pixelCanvas{border:2px solid #2a2a3a;cursor:crosshair;image-rendering:pixelated;background:#16161e}
.grid-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.grid-controls label{font-size:.85rem;color:#888}
.grid-controls select{width:auto;min-width:80px}
.share-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.share-btns button{font-size:.8rem;padding:6px 12px}
.empty{text-align:center;color:#555;padding:30px;font-size:.95rem}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2a;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:700px){
header h1{font-size:1.1rem}
.toolbar button{padding:6px 10px;font-size:.8rem}
}
</style>
</head>
<body>
<header>
<h1>Pixel Art Maker</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>
<div class="panel">
<h2>Canvas Settings</h2>
<div class="grid-controls">
<label>Grid Size:</label>
<select id="gridSize" onchange="initCanvas()">
<option value="8">8 x 8</option>
<option value="16" selected>16 x 16</option>
<option value="24">24 x 24</option>
<option value="32">32 x 32</option>
<option value="48">48 x 48</option>
<option value="64">64 x 64</option>
</select>
<label><input type="checkbox" id="showGrid" checked onchange="render()" style="width:auto;accent-color:#ff5f1f"> Show Grid</label>
</div>
</div>

<div class="panel">
<h2>Tools</h2>
<div class="toolbar" id="toolBar">
<button class="active-tool" onclick="setTool('brush')">Brush</button>
<button class="secondary" onclick="setTool('eraser')">Eraser</button>
<button class="secondary" onclick="setTool('fill')">Fill</button>
<button class="secondary" onclick="setTool('eyedropper')">Eyedropper</button>
</div>
<div class="color-section">
<input type="color" id="colorPicker" value="#ff5f1f" oninput="currentColor=this.value;updateSwatches()">
<div class="palette" id="palette"></div>
</div>
</div>

<div class="panel">
<h2>Canvas</h2>
<div class="canvas-wrap">
<canvas id="pixelCanvas" width="512" height="512"></canvas>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button onclick="exportPNG()">Export as PNG</button>
<button class="secondary" onclick="undoAction()">Undo</button>
<button class="danger" onclick="clearCanvas()">Clear Canvas</button>
<button class="secondary" onclick="saveToLocal()">Save Project</button>
<button class="secondary" onclick="loadFromLocal()">Load Project</button>
</div>
</div>

<div class="panel">
<h2>Share</h2>
<div class="share-btns">
<button onclick="shareTwitter()">Share on X</button>
<button class="secondary" onclick="copyLink()">Copy Link</button>
</div>
</div>
</main>

<footer>
<a href="https://spunk.codes">spunk.codes</a> &middot;
<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
const LS_KEY='spunkcodes_pixel_art';
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

const defaultPalette=['#ff5f1f','#ff0000','#ff8800','#ffff00','#00ff00','#00cc88','#0088ff','#0000ff','#8800ff','#ff00ff','#ffffff','#cccccc','#888888','#444444','#222222','#000000'];
let gridSize=16;
let pixels=[];
let currentColor='#ff5f1f';
let tool='brush';
let isDrawing=false;
let undoStack=[];
const canvas=document.getElementById('pixelCanvas');
const ctx=canvas.getContext('2d');

function initCanvas(){
gridSize=parseInt(document.getElementById('gridSize').value);
pixels=[];
for(let y=0;y<gridSize;y++){
pixels[y]=[];
for(let x=0;x<gridSize;x++){
pixels[y][x]=null;
}
}
undoStack=[];
render();
}

function render(){
const size=canvas.width;
const cell=size/gridSize;
ctx.clearRect(0,0,size,size);
ctx.fillStyle='#16161e';
ctx.fillRect(0,0,size,size);

for(let y=0;y<gridSize;y++){
for(let x=0;x<gridSize;x++){
if(pixels[y][x]){
ctx.fillStyle=pixels[y][x];
ctx.fillRect(x*cell,y*cell,cell,cell);
}
}
}

if(document.getElementById('showGrid').checked){
ctx.strokeStyle='rgba(255,255,255,0.1)';
ctx.lineWidth=1;
for(let i=0;i<=gridSize;i++){
ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,size);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(size,i*cell);ctx.stroke();
}
}
}

function getCell(e){
const rect=canvas.getBoundingClientRect();
const scaleX=canvas.width/rect.width;
const scaleY=canvas.height/rect.height;
const x=Math.floor(((e.clientX||e.touches[0].clientX)-rect.left)*scaleX/(canvas.width/gridSize));
const y=Math.floor(((e.clientY||e.touches[0].clientY)-rect.top)*scaleY/(canvas.height/gridSize));
return{x:Math.max(0,Math.min(gridSize-1,x)),y:Math.max(0,Math.min(gridSize-1,y))};
}

function pushUndo(){
undoStack.push(pixels.map(row=>row.slice()));
if(undoStack.length>50)undoStack.shift();
}

function undoAction(){
if(!undoStack.length)return;
pixels=undoStack.pop();
render();
}

function applyTool(x,y){
if(tool==='brush'){pixels[y][x]=currentColor;render()}
else if(tool==='eraser'){pixels[y][x]=null;render()}
else if(tool==='fill'){floodFill(x,y,pixels[y][x],currentColor);render()}
else if(tool==='eyedropper'){
if(pixels[y][x]){currentColor=pixels[y][x];document.getElementById('colorPicker').value=currentColor;updateSwatches()}
}
}

function floodFill(x,y,target,replacement){
if(target===replacement)return;
if(x<0||x>=gridSize||y<0||y>=gridSize)return;
if(pixels[y][x]!==target)return;
pixels[y][x]=replacement;
floodFill(x+1,y,target,replacement);
floodFill(x-1,y,target,replacement);
floodFill(x,y+1,target,replacement);
floodFill(x,y-1,target,replacement);
}

canvas.addEventListener('mousedown',e=>{e.preventDefault();isDrawing=true;pushUndo();const c=getCell(e);applyTool(c.x,c.y)});
canvas.addEventListener('mousemove',e=>{if(!isDrawing)return;const c=getCell(e);if(tool==='brush'||tool==='eraser'){pixels[c.y][c.x]=tool==='brush'?currentColor:null;render()}});
canvas.addEventListener('mouseup',()=>isDrawing=false);
canvas.addEventListener('mouseleave',()=>isDrawing=false);

canvas.addEventListener('touchstart',e=>{e.preventDefault();isDrawing=true;pushUndo();const c=getCell(e);applyTool(c.x,c.y)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrawing)return;const c=getCell(e);if(tool==='brush'||tool==='eraser'){pixels[c.y][c.x]=tool==='brush'?currentColor:null;render()}},{passive:false});
canvas.addEventListener('touchend',()=>isDrawing=false);

function setTool(t){
tool=t;
const btns=document.querySelectorAll('#toolBar button');
btns.forEach(b=>b.className=b.textContent.toLowerCase()===t?'active-tool':'secondary');
}

function updateSwatches(){
const pal=document.getElementById('palette');
pal.innerHTML=defaultPalette.map(c=>`<div class="swatch${c===currentColor?' active':''}" style="background:${c}" onclick="pickSwatch('${c}')"></div>`).join('');
}

function pickSwatch(c){currentColor=c;document.getElementById('colorPicker').value=c;updateSwatches()}

function clearCanvas(){if(!confirm('Clear the entire canvas?'))return;pushUndo();for(let y=0;y<gridSize;y++)for(let x=0;x<gridSize;x++)pixels[y][x]=null;render()}

function exportPNG(){
const expCanvas=document.createElement('canvas');
expCanvas.width=gridSize;
expCanvas.height=gridSize;
const expCtx=expCanvas.getContext('2d');
for(let y=0;y<gridSize;y++){
for(let x=0;x<gridSize;x++){
if(pixels[y][x]){expCtx.fillStyle=pixels[y][x];expCtx.fillRect(x,y,1,1)}
}
}
const link=document.createElement('a');
link.download='pixel-art-'+gridSize+'x'+gridSize+'.png';
link.href=expCanvas.toDataURL('image/png');
link.click();
}

function saveToLocal(){
const data={gridSize:gridSize,pixels:pixels};
localStorage.setItem(LS_KEY,JSON.stringify(data));
alert('Project saved!');
}

function loadFromLocal(){
try{
const data=JSON.parse(localStorage.getItem(LS_KEY));
if(!data||!data.pixels)return alert('No saved project found.');
gridSize=data.gridSize;
document.getElementById('gridSize').value=gridSize;
pixels=data.pixels;
undoStack=[];
render();
alert('Project loaded!');
}catch(e){alert('No saved project found.')}
}

function shareTwitter(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Just made some pixel art with this free Pixel Art Maker! https://spunk.codes/exclusive/pixel-art-maker.html'),'_blank')}
function copyLink(){navigator.clipboard.writeText('https://spunk.codes/exclusive/pixel-art-maker.html').then(()=>alert('Link copied!'))}

initCanvas();
updateSwatches();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
