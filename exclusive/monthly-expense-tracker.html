<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e8e8f0;font-size:.9rem}
main{flex:1;max-width:960px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e8e8f0}button.secondary:hover{background:#3a3a4a}
button.danger{background:#cc2233}button.danger:hover{background:#aa1a28}
select,input{background:#16161e;border:1px solid #2a2a3a;color:#e8e8f0;padding:8px 12px;border-radius:6px;font-size:.9rem}
label{display:block;font-size:.85rem;color:#888;margin-bottom:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;margin-bottom:12px}
.form-row input,.form-row select{width:100%}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:14px;text-align:center}
.stat-box .num{font-size:1.5rem;color:#ff5f1f;font-weight:700}
.stat-box .lbl{font-size:.75rem;color:#888;margin-top:2px}
.stat-box.over .num{color:#cc2233}
.stat-box.under .num{color:#22cc66}
.chart-container{margin:16px 0}
.bar-row{display:flex;align-items:center;margin-bottom:8px;gap:10px}
.bar-label{width:100px;font-size:.8rem;color:#ccc;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#16161e;border-radius:4px;height:24px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .3s;min-width:2px}
.bar-amount{font-size:.8rem;color:#ccc;width:80px;text-align:right;flex-shrink:0}
.bar-budget{position:absolute;top:0;height:100%;width:2px;background:#fff;z-index:2}
.expense-list{max-height:400px;overflow-y:auto}
.expense-item{display:grid;grid-template-columns:90px 1fr 100px 80px auto;gap:8px;align-items:center;padding:8px 10px;background:#16161e;border-radius:6px;margin-bottom:4px;font-size:.85rem}
.expense-item .cat{color:#ff5f1f;font-size:.75rem}
.month-select{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.month-btn{background:#16161e;border:1px solid #2a2a3a;padding:6px 12px;border-radius:6px;font-size:.8rem;cursor:pointer;color:#e8e8f0;transition:all .2s}
.month-btn:hover,.month-btn.active{border-color:#ff5f1f;color:#ff5f1f}
.budget-row{display:grid;grid-template-columns:1fr 120px;gap:8px;align-items:center;margin-bottom:6px}
.budget-row label{margin:0;color:#ccc;font-size:.85rem}
.comparison{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.comp-col{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:14px}
.comp-col h3{font-size:.9rem;color:#ff5f1f;margin-bottom:8px}
.comp-row{display:flex;justify-content:space-between;font-size:.8rem;padding:4px 0;border-bottom:1px solid #1a1a2a}
.alert-bar{background:#331111;border:1px solid #cc2233;border-radius:8px;padding:12px;margin-bottom:16px;font-size:.85rem;color:#ff8888;display:none}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2a;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:700px){
.form-row{grid-template-columns:1fr 1fr}
.stat-row{grid-template-columns:repeat(2,1fr)}
.expense-item{grid-template-columns:70px 1fr 70px auto;font-size:.75rem}
.expense-item .cat{display:none}
.comparison{grid-template-columns:1fr}
header h1{font-size:1.1rem}
.bar-label{width:70px;font-size:.7rem}
}
</style>
</head>
<body>
<header>
<h1>Monthly Expense Tracker</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>
<div class="alert-bar" id="alertBar"></div>

<div class="panel">
<h2>Add Expense</h2>
<div class="form-row">
<div><label>Date</label><input type="date" id="expDate"></div>
<div><label>Amount ($)</label><input type="number" id="expAmount" step="0.01" min="0" placeholder="0.00"></div>
<div><label>Category</label><select id="expCat"><option value="housing">Housing</option><option value="food">Food</option><option value="transport">Transport</option><option value="entertainment">Entertainment</option><option value="health">Health</option><option value="education">Education</option><option value="utilities">Utilities</option><option value="other">Other</option></select></div>
<div><label>&nbsp;</label><button onclick="addExpense()">Add</button></div>
</div>
<div><label>Note (optional)</label><input type="text" id="expNote" placeholder="e.g. Grocery run at Costco" style="width:100%"></div>
</div>

<div class="panel">
<h2>Dashboard</h2>
<div class="month-select" id="monthSelect"></div>
<div class="stat-row" id="statRow">
<div class="stat-box"><div class="num" id="statTotal">$0</div><div class="lbl">Total Spent</div></div>
<div class="stat-box"><div class="num" id="statBudget">$0</div><div class="lbl">Budget</div></div>
<div class="stat-box" id="statRemainBox"><div class="num" id="statRemain">$0</div><div class="lbl">Remaining</div></div>
<div class="stat-box"><div class="num" id="statCount">0</div><div class="lbl">Transactions</div></div>
</div>
<h2 style="margin-top:10px">Spending by Category</h2>
<div class="chart-container" id="chartContainer"></div>
</div>

<div class="panel">
<h2>Set Monthly Budgets</h2>
<div id="budgetForm"></div>
<button onclick="saveBudgets()" style="margin-top:10px">Save Budgets</button>
</div>

<div class="panel">
<h2>Month-over-Month Comparison</h2>
<div class="comparison" id="compContainer"></div>
</div>

<div class="panel">
<h2>Expense History</h2>
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
<select id="filterCat" onchange="renderExpenses()"><option value="all">All Categories</option><option value="housing">Housing</option><option value="food">Food</option><option value="transport">Transport</option><option value="entertainment">Entertainment</option><option value="health">Health</option><option value="education">Education</option><option value="utilities">Utilities</option><option value="other">Other</option></select>
<button class="secondary" onclick="exportData()">Export CSV</button>
<button class="danger" onclick="clearMonth()">Clear Month</button>
</div>
<div class="expense-list" id="expenseList"></div>
</div>
</main>

<footer>
<a href="https://spunk.codes">spunk.codes</a> &middot;
<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
const LS_KEY='spunkcodes_expense_tracker';
const CATS=['housing','food','transport','entertainment','health','education','utilities','other'];
const CAT_COLORS={housing:'#ff5f1f',food:'#22cc66',transport:'#3399ff',entertainment:'#cc44ff',health:'#ff4466',education:'#ffaa22',utilities:'#44dddd',other:'#888888'};
const CAT_LABELS={housing:'Housing',food:'Food',transport:'Transport',entertainment:'Entertainment',health:'Health',education:'Education',utilities:'Utilities',other:'Other'};

let data={expenses:[],budgets:{},currentMonth:''};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function getMonthKey(d){return d?d.substring(0,7):new Date().toISOString().substring(0,7)}
function formatMoney(n){return '$'+Number(n).toFixed(2)}

function init(){
loadData();
const today=new Date();
document.getElementById('expDate').value=today.toISOString().split('T')[0];
if(!data.currentMonth)data.currentMonth=getMonthKey();
renderMonthSelect();
renderBudgetForm();
renderAll();
}

function addExpense(){
const date=document.getElementById('expDate').value;
const amount=parseFloat(document.getElementById('expAmount').value);
const cat=document.getElementById('expCat').value;
const note=document.getElementById('expNote').value.trim();
if(!date||isNaN(amount)||amount<=0){alert('Please enter a valid date and amount.');return}
data.expenses.push({id:Date.now(),date,amount,category:cat,note});
data.expenses.sort((a,b)=>b.date.localeCompare(a.date));
document.getElementById('expAmount').value='';
document.getElementById('expNote').value='';
saveData();
renderAll();
checkAlerts();
}

function removeExpense(id){
data.expenses=data.expenses.filter(e=>e.id!==id);
saveData();
renderAll();
}

function getMonthExpenses(monthKey){
return data.expenses.filter(e=>e.date.startsWith(monthKey));
}

function renderMonthSelect(){
const months=new Set();
data.expenses.forEach(e=>months.add(getMonthKey(e.date)));
months.add(getMonthKey());
const prev=new Date();prev.setMonth(prev.getMonth()-1);
months.add(getMonthKey(prev.toISOString()));
const sorted=[...months].sort().reverse();
const el=document.getElementById('monthSelect');
el.innerHTML=sorted.map(m=>{
const d=new Date(m+'-01');
const label=d.toLocaleDateString('en-US',{year:'numeric',month:'short'});
return `<div class="month-btn${m===data.currentMonth?' active':''}" onclick="switchMonth('${m}')">${esc(label)}</div>`;
}).join('');
}

function switchMonth(m){
data.currentMonth=m;
saveData();
renderMonthSelect();
renderAll();
}

function renderAll(){
const expenses=getMonthExpenses(data.currentMonth);
const total=expenses.reduce((s,e)=>s+e.amount,0);
const totalBudget=CATS.reduce((s,c)=>s+(data.budgets[c]||0),0);
const remaining=totalBudget-total;

document.getElementById('statTotal').textContent=formatMoney(total);
document.getElementById('statBudget').textContent=totalBudget>0?formatMoney(totalBudget):'Not set';
document.getElementById('statRemain').textContent=totalBudget>0?formatMoney(remaining):'--';
document.getElementById('statCount').textContent=expenses.length;

const box=document.getElementById('statRemainBox');
box.className='stat-box'+(remaining<0?' over':remaining>0?' under':'');

renderChart(expenses);
renderExpenses();
renderComparison();
checkAlerts();
}

function renderChart(expenses){
const totals={};
CATS.forEach(c=>totals[c]=0);
expenses.forEach(e=>totals[e.category]=(totals[e.category]||0)+e.amount);
const maxVal=Math.max(...Object.values(totals),1);
const el=document.getElementById('chartContainer');

el.innerHTML=CATS.map(c=>{
const spent=totals[c]||0;
const budget=data.budgets[c]||0;
const pct=Math.min((spent/maxVal)*100,100);
const budgetPct=budget>0?Math.min((budget/maxVal)*100,100):0;
const overBudget=budget>0&&spent>budget;
return `<div class="bar-row">
<div class="bar-label">${esc(CAT_LABELS[c])}</div>
<div class="bar-track">
<div class="bar-fill" style="width:${pct}%;background:${overBudget?'#cc2233':CAT_COLORS[c]}"></div>
${budget>0?`<div class="bar-budget" style="left:${budgetPct}%" title="Budget: ${formatMoney(budget)}"></div>`:''}
</div>
<div class="bar-amount">${formatMoney(spent)}</div>
</div>`;
}).join('');
}

function renderExpenses(){
const filterCat=document.getElementById('filterCat').value;
let expenses=getMonthExpenses(data.currentMonth);
if(filterCat!=='all')expenses=expenses.filter(e=>e.category===filterCat);
const el=document.getElementById('expenseList');
if(!expenses.length){el.innerHTML='<div style="color:#555;text-align:center;padding:20px">No expenses this month.</div>';return}
el.innerHTML=expenses.map(e=>`<div class="expense-item">
<span>${esc(e.date.substring(5))}</span>
<span>${esc(e.note||'--')} <span class="cat">${esc(CAT_LABELS[e.category]||e.category)}</span></span>
<span style="color:#ff5f1f;font-weight:600">${formatMoney(e.amount)}</span>
<span style="color:#666;font-size:.75rem">${esc(CAT_LABELS[e.category])}</span>
<button class="danger" onclick="removeExpense(${e.id})" style="font-size:.7rem;padding:3px 8px">&times;</button>
</div>`).join('');
}

function renderBudgetForm(){
const el=document.getElementById('budgetForm');
el.innerHTML=CATS.map(c=>`<div class="budget-row">
<label style="color:${CAT_COLORS[c]}">${CAT_LABELS[c]}</label>
<input type="number" id="budget_${c}" value="${data.budgets[c]||''}" placeholder="0" min="0" step="1">
</div>`).join('');
}

function saveBudgets(){
CATS.forEach(c=>{
const v=parseFloat(document.getElementById('budget_'+c).value);
data.budgets[c]=isNaN(v)?0:v;
});
saveData();
renderAll();
alert('Budgets saved!');
}

function renderComparison(){
const cur=data.currentMonth;
const d=new Date(cur+'-01');
d.setMonth(d.getMonth()-1);
const prev=d.toISOString().substring(0,7);
const curExp=getMonthExpenses(cur);
const prevExp=getMonthExpenses(prev);

const curTotals={};const prevTotals={};
CATS.forEach(c=>{curTotals[c]=0;prevTotals[c]=0});
curExp.forEach(e=>curTotals[e.category]+=e.amount);
prevExp.forEach(e=>prevTotals[e.category]+=e.amount);

const curTotal=curExp.reduce((s,e)=>s+e.amount,0);
const prevTotal=prevExp.reduce((s,e)=>s+e.amount,0);
const curLabel=new Date(cur+'-01').toLocaleDateString('en-US',{year:'numeric',month:'short'});
const prevLabel=new Date(prev+'-01').toLocaleDateString('en-US',{year:'numeric',month:'short'});

const el=document.getElementById('compContainer');
el.innerHTML=`
<div class="comp-col"><h3>${esc(prevLabel)}: ${formatMoney(prevTotal)}</h3>
${CATS.map(c=>`<div class="comp-row"><span>${esc(CAT_LABELS[c])}</span><span>${formatMoney(prevTotals[c])}</span></div>`).join('')}
</div>
<div class="comp-col"><h3>${esc(curLabel)}: ${formatMoney(curTotal)}</h3>
${CATS.map(c=>{
const diff=curTotals[c]-prevTotals[c];
const arrow=diff>0?'&#9650;':(diff<0?'&#9660;':'');
const color=diff>0?'#cc2233':(diff<0?'#22cc66':'#888');
return `<div class="comp-row"><span>${esc(CAT_LABELS[c])}</span><span>${formatMoney(curTotals[c])} <span style="color:${color};font-size:.7rem">${arrow} ${diff!==0?formatMoney(Math.abs(diff)):''}</span></span></div>`;
}).join('')}
</div>`;
}

function checkAlerts(){
const expenses=getMonthExpenses(data.currentMonth);
const totals={};
CATS.forEach(c=>totals[c]=0);
expenses.forEach(e=>totals[e.category]+=e.amount);
const alerts=[];
CATS.forEach(c=>{
const budget=data.budgets[c]||0;
if(budget>0){
const pct=totals[c]/budget;
if(pct>=1)alerts.push(CAT_LABELS[c]+': OVER budget by '+formatMoney(totals[c]-budget));
else if(pct>=0.8)alerts.push(CAT_LABELS[c]+': '+Math.round(pct*100)+'% of budget used');
}
});
const bar=document.getElementById('alertBar');
if(alerts.length){bar.style.display='block';bar.innerHTML='&#9888; Budget Alerts:<br>'+alerts.map(a=>esc(a)).join('<br>')}
else{bar.style.display='none'}
}

function exportData(){
const expenses=getMonthExpenses(data.currentMonth);
if(!expenses.length){alert('No data to export.');return}
let csv='Date,Amount,Category,Note\n';
expenses.forEach(e=>{csv+=`${e.date},${e.amount},${e.category},"${(e.note||'').replace(/"/g,'""')}"\n`});
const blob=new Blob([csv],{type:'text/csv'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='expenses-'+data.currentMonth+'.csv';
a.click();
URL.revokeObjectURL(a.href);
}

function clearMonth(){
if(!confirm('Delete all expenses for '+data.currentMonth+'?'))return;
data.expenses=data.expenses.filter(e=>!e.date.startsWith(data.currentMonth));
saveData();
renderAll();
}

function saveData(){localStorage.setItem(LS_KEY,JSON.stringify(data))}
function loadData(){try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d){data={...data,...d}}}catch(e){}}

init();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
