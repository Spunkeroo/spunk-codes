<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e0e0e0;font-size:.9rem}
main{flex:1;max-width:1000px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #1a1a2e;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e0e0e0}button.secondary:hover{background:#3a3a4a}
select,input[type="number"],input[type="range"]{background:#16161e;border:1px solid #1a1a2e;color:#e0e0e0;padding:8px;border-radius:6px;font-size:.85rem;font-family:inherit}
select{width:100%}
label{display:block;font-size:.82rem;color:#888;margin-bottom:4px}
.controls{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:16px}
.control-group{display:flex;flex-direction:column;gap:4px}
.preview-area{min-height:300px;border:2px dashed #1a1a2e;border-radius:10px;padding:16px;transition:all .3s}
.flex-item{border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#fff;min-width:60px;min-height:60px;transition:all .3s}
.code-output{background:#0d0d14;border:1px solid #1a1a2e;border-radius:6px;padding:14px;font-family:'SFMono-Regular',Consolas,monospace;font-size:.82rem;white-space:pre-wrap;max-height:300px;overflow:auto;position:relative}
.copy-btn{position:absolute;top:8px;right:8px}
.item-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.item-controls button{font-size:.8rem;padding:6px 12px}
.copied-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#ff5f1f;color:#fff;padding:10px 24px;border-radius:8px;font-weight:600;font-size:.9rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.copied-toast.show{opacity:1}
.share-fixed{position:fixed;bottom:18px;left:18px;z-index:200}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2e;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:600px){
header h1{font-size:1.1rem}
.controls{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<header>
<h1>CSS Flexbox Playground</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>

<div class="panel">
<h2>Container Properties</h2>
<div class="controls">
<div class="control-group"><label>flex-direction</label><select id="flexDirection" onchange="update()"><option>row</option><option>row-reverse</option><option>column</option><option>column-reverse</option></select></div>
<div class="control-group"><label>justify-content</label><select id="justifyContent" onchange="update()"><option>flex-start</option><option>flex-end</option><option>center</option><option>space-between</option><option>space-around</option><option>space-evenly</option></select></div>
<div class="control-group"><label>align-items</label><select id="alignItems" onchange="update()"><option>stretch</option><option>flex-start</option><option>flex-end</option><option>center</option><option>baseline</option></select></div>
<div class="control-group"><label>align-content</label><select id="alignContent" onchange="update()"><option>stretch</option><option>flex-start</option><option>flex-end</option><option>center</option><option>space-between</option><option>space-around</option></select></div>
<div class="control-group"><label>flex-wrap</label><select id="flexWrap" onchange="update()"><option>nowrap</option><option>wrap</option><option>wrap-reverse</option></select></div>
<div class="control-group"><label>gap (px)</label><input type="number" id="gap" value="10" min="0" max="100" onchange="update()"></div>
</div>
</div>

<div class="panel">
<h2>Items</h2>
<div class="item-controls">
<button onclick="addItem()">+ Add Item</button>
<button class="secondary" onclick="removeItem()">- Remove Item</button>
<button class="secondary" onclick="resetItems()">Reset</button>
<span style="color:#888;font-size:.85rem" id="itemCount">Items: 4</span>
</div>
</div>

<div class="panel">
<h2>Live Preview</h2>
<div class="preview-area" id="preview"></div>
</div>

<div class="panel">
<h2>Generated CSS</h2>
<div style="position:relative">
<div class="code-output" id="codeOutput"></div>
<button class="copy-btn" onclick="copyCSS()">Copy CSS</button>
</div>
</div>

</main>

<div class="share-fixed"><button onclick="shareX()">Share on X</button></div>

<footer>
<a href="https://spunk.codes">Home</a> &middot;
<a href="https://spunk.codes/tools.html">All Tools</a> &middot;
<a href="https://x.com/SpunkArt13">@SpunkArt13</a>
</footer>

<div class="copied-toast" id="toast"></div>

<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

const LS_KEY='spunkcodes_flexbox';
const colors=['#ff5f1f','#007bff','#28a745','#fd7e14','#6f42c1','#e83e8c','#20c997','#ffc107','#17a2b8','#dc3545'];
let itemCount=4;

function loadState(){
try{
const s=JSON.parse(localStorage.getItem(LS_KEY));
if(s){
if(s.flexDirection)document.getElementById('flexDirection').value=s.flexDirection;
if(s.justifyContent)document.getElementById('justifyContent').value=s.justifyContent;
if(s.alignItems)document.getElementById('alignItems').value=s.alignItems;
if(s.alignContent)document.getElementById('alignContent').value=s.alignContent;
if(s.flexWrap)document.getElementById('flexWrap').value=s.flexWrap;
if(s.gap!=null)document.getElementById('gap').value=s.gap;
if(s.itemCount)itemCount=s.itemCount;
}
}catch(e){}
}

function saveState(){
try{localStorage.setItem(LS_KEY,JSON.stringify({
flexDirection:document.getElementById('flexDirection').value,
justifyContent:document.getElementById('justifyContent').value,
alignItems:document.getElementById('alignItems').value,
alignContent:document.getElementById('alignContent').value,
flexWrap:document.getElementById('flexWrap').value,
gap:document.getElementById('gap').value,
itemCount
}))}catch(e){}
}

function addItem(){if(itemCount<20){itemCount++;update()}}
function removeItem(){if(itemCount>1){itemCount--;update()}}
function resetItems(){itemCount=4;document.getElementById('flexDirection').value='row';document.getElementById('justifyContent').value='flex-start';document.getElementById('alignItems').value='stretch';document.getElementById('alignContent').value='stretch';document.getElementById('flexWrap').value='nowrap';document.getElementById('gap').value='10';update()}

function update(){
const dir=document.getElementById('flexDirection').value;
const jc=document.getElementById('justifyContent').value;
const ai=document.getElementById('alignItems').value;
const ac=document.getElementById('alignContent').value;
const wrap=document.getElementById('flexWrap').value;
const gap=document.getElementById('gap').value;
const preview=document.getElementById('preview');
preview.style.display='flex';
preview.style.flexDirection=dir;
preview.style.justifyContent=jc;
preview.style.alignItems=ai;
preview.style.alignContent=ac;
preview.style.flexWrap=wrap;
preview.style.gap=gap+'px';
let html='';
for(let i=0;i<itemCount;i++){
const w=60+Math.floor(Math.random()*40);
const h=60+Math.floor(Math.random()*40);
html+=`<div class="flex-item" style="background:${colors[i%colors.length]};width:${w}px;height:${h}px">${i+1}</div>`;
}
preview.innerHTML=html;
document.getElementById('itemCount').textContent='Items: '+itemCount;
const css=`.container {\n  display: flex;\n  flex-direction: ${dir};\n  justify-content: ${jc};\n  align-items: ${ai};\n  align-content: ${ac};\n  flex-wrap: ${wrap};\n  gap: ${gap}px;\n}`;
document.getElementById('codeOutput').textContent=css;
saveState();
}

function copyCSS(){
const code=document.getElementById('codeOutput').textContent;
navigator.clipboard.writeText(code).then(()=>showToast('CSS copied!')).catch(()=>showToast('Copy failed'));
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

const toolURL='https://spunk.codes/exclusive/css-flexbox-playground.html';
function shareX(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('CSS Flexbox Playground - visual flex editor! '+toolURL),'_blank')}

loadState();update();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
