<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let currentLang='python';
let parsedCurl=null;
let generatedCode={};

function parseCurlCommand(cmd){
// Normalize line continuations
cmd=cmd.replace(/\\\s*\n/g,' ').trim();
if(!cmd.startsWith('curl'))throw new Error('Command must start with "curl"');

const result={method:'GET',url:'',headers:{},data:null,auth:null,cookies:{},insecure:false,compressed:false,followRedirects:false};

// Tokenize respecting quotes
const tokens=[];
let i=4; // skip 'curl'
while(i<cmd.length){
while(i<cmd.length&&cmd[i]===' ')i++;
if(i>=cmd.length)break;
let token='';
if(cmd[i]==='"'){
i++;
while(i<cmd.length&&cmd[i]!=='"'){
if(cmd[i]==='\\'){i++;if(i<cmd.length)token+=cmd[i]}else token+=cmd[i];
i++;
}
i++;
}else if(cmd[i]==="'"){
i++;
while(i<cmd.length&&cmd[i]!=="'"){token+=cmd[i];i++}
i++;
}else if(cmd[i]==='$'&&i+1<cmd.length&&cmd[i+1]==="'"){
i+=2;
while(i<cmd.length&&cmd[i]!=="'"){
if(cmd[i]==='\\'){i++;if(i<cmd.length){if(cmd[i]==='n')token+='\n';else if(cmd[i]==='t')token+='\t';else token+=cmd[i]}}
else token+=cmd[i];
i++;
}
i++;
}else{
while(i<cmd.length&&cmd[i]!==' '){token+=cmd[i];i++}
}
if(token)tokens.push(token);
}

for(let t=0;t<tokens.length;t++){
const tok=tokens[t];
if(tok==='-X'||tok==='--request'){result.method=tokens[++t].toUpperCase()}
else if(tok==='-H'||tok==='--header'){
const h=tokens[++t];
const ci=h.indexOf(':');
if(ci>0){
const key=h.slice(0,ci).trim();
const val=h.slice(ci+1).trim();
result.headers[key]=val;
}
}
else if(tok==='-d'||tok==='--data'||tok==='--data-raw'||tok==='--data-binary'){result.data=tokens[++t];if(result.method==='GET')result.method='POST'}
else if(tok==='-u'||tok==='--user'){result.auth=tokens[++t]}
else if(tok==='-b'||tok==='--cookie'){
const c=tokens[++t];
c.split(';').forEach(pair=>{const ci=pair.indexOf('=');if(ci>0)result.cookies[pair.slice(0,ci).trim()]=pair.slice(ci+1).trim()});
}
else if(tok==='-k'||tok==='--insecure'){result.insecure=true}
else if(tok==='--compressed'){result.compressed=true}
else if(tok==='-L'||tok==='--location'){result.followRedirects=true}
else if(tok==='-o'||tok==='--output'){t++} // skip output file
else if(tok==='-s'||tok==='--silent'){} // ignore
else if(tok==='-v'||tok==='--verbose'){} // ignore
else if(!tok.startsWith('-')){result.url=tok}
}

if(!result.url)throw new Error('No URL found in cURL command');
return result;
}

function toPython(c){
let code='import requests\n\n';
code+='url = "'+c.url+'"\n';
if(Object.keys(c.headers).length){
code+='\nheaders = {\n';
Object.entries(c.headers).forEach(([k,v])=>{code+='    "'+k+'": "'+v+'",\n'});
code+='}\n';
}
if(c.data){
let isJSON=false;
try{JSON.parse(c.data);isJSON=true}catch(e){}
if(isJSON){
code+='\npayload = '+JSON.stringify(JSON.parse(c.data),null,4)+'\n';
}else{
code+='\ndata = "'+c.data.replace(/"/g,'\\"')+'"\n';
}
}
if(c.auth){
const parts=c.auth.split(':');
code+='\nauth = ("'+parts[0]+'", "'+(parts[1]||'')+'")';
code+='\n';
}
code+='\nresponse = requests.'+c.method.toLowerCase()+'(\n    url';
if(Object.keys(c.headers).length)code+=',\n    headers=headers';
if(c.data){
let isJSON=false;
try{JSON.parse(c.data);isJSON=true}catch(e){}
code+=isJSON?',\n    json=payload':',\n    data=data';
}
if(c.auth)code+=',\n    auth=auth';
if(c.insecure)code+=',\n    verify=False';
if(!c.followRedirects)code+=',\n    allow_redirects=False';
code+='\n)\n\nprint(response.status_code)\nprint(response.text)\n';
return code;
}

function toJavaScript(c){
let code='';
const opts={method:c.method};
if(Object.keys(c.headers).length){
code+='const headers = {\n';
Object.entries(c.headers).forEach(([k,v])=>{code+='  "'+k+'": "'+v+'",\n'});
code+='};\n\n';
}
if(c.data){
let isJSON=false;
try{JSON.parse(c.data);isJSON=true}catch(e){}
if(isJSON){
code+='const body = JSON.stringify('+JSON.stringify(JSON.parse(c.data),null,2)+');\n\n';
}else{
code+='const body = "'+c.data.replace(/"/g,'\\"')+'";\n\n';
}
}
code+='const response = await fetch("'+c.url+'", {\n';
code+='  method: "'+c.method+'"';
if(Object.keys(c.headers).length)code+=',\n  headers';
if(c.data)code+=',\n  body';
if(!c.followRedirects)code+=',\n  redirect: "manual"';
code+='\n});\n\n';
code+='const data = await response.json();\nconsole.log(data);\n';
return code;
}

function toPHP(c){
let code='<?php\n\n$ch = curl_init();\n\n';
code+='curl_setopt($ch, CURLOPT_URL, "'+c.url+'");\n';
code+='curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);\n';
if(c.method!=='GET'){
code+='curl_setopt($ch, CURLOPT_CUSTOMREQUEST, "'+c.method+'");\n';
}
if(Object.keys(c.headers).length){
code+='curl_setopt($ch, CURLOPT_HTTPHEADER, [\n';
Object.entries(c.headers).forEach(([k,v])=>{code+='    "'+k+': '+v+'",\n'});
code+=']);\n';
}
if(c.data){
code+='curl_setopt($ch, CURLOPT_POSTFIELDS, \''+c.data.replace(/'/g,"\\'")+"');\n";
}
if(c.auth){
code+='curl_setopt($ch, CURLOPT_USERPWD, "'+c.auth+'");\n';
}
if(c.insecure){
code+='curl_setopt($ch, CURLOPT_SSL_VERIFYPEER, false);\n';
}
if(c.followRedirects){
code+='curl_setopt($ch, CURLOPT_FOLLOWLOCATION, true);\n';
}
code+='\n$response = curl_exec($ch);\n$httpCode = curl_getinfo($ch, CURLINFO_HTTP_CODE);\ncurl_close($ch);\n\n';
code+='echo "Status: " . $httpCode . "\\n";\necho $response;\n';
return code;
}

function toGo(c){
let code='package main\n\nimport (\n\t"fmt"\n\t"io"\n\t"net/http"\n';
if(c.data)code+='\t"strings"\n';
code+=')\n\nfunc main() {\n';
if(c.data){
let isJSON=false;
try{JSON.parse(c.data);isJSON=true}catch(e){}
code+='\tbody := strings.NewReader(`'+c.data+'`)\n';
code+='\treq, err := http.NewRequest("'+c.method+'", "'+c.url+'", body)\n';
}else{
code+='\treq, err := http.NewRequest("'+c.method+'", "'+c.url+'", nil)\n';
}
code+='\tif err != nil {\n\t\tpanic(err)\n\t}\n\n';
Object.entries(c.headers).forEach(([k,v])=>{
code+='\treq.Header.Set("'+k+'", "'+v+'")\n';
});
if(c.auth){
const parts=c.auth.split(':');
code+='\treq.SetBasicAuth("'+parts[0]+'", "'+(parts[1]||'')+'")\n';
}
code+='\n\tclient := &http.Client{}\n';
code+='\tresp, err := client.Do(req)\n';
code+='\tif err != nil {\n\t\tpanic(err)\n\t}\n\tdefer resp.Body.Close()\n\n';
code+='\tresBody, _ := io.ReadAll(resp.Body)\n';
code+='\tfmt.Println("Status:", resp.StatusCode)\n';
code+='\tfmt.Println(string(resBody))\n}\n';
return code;
}

function convertCurl(){
const input=document.getElementById('curlInput').value.trim();
const errBox=document.getElementById('errorBox');
const info=document.getElementById('parsedInfo');
errBox.style.display='none';
info.style.display='none';
if(!input){errBox.style.display='block';errBox.textContent='Please paste a cURL command.';return}
try{
parsedCurl=parseCurlCommand(input);
info.style.display='block';
info.innerHTML='<span>Method:</span> '+esc(parsedCurl.method)+' | <span>URL:</span> '+esc(parsedCurl.url)+
(Object.keys(parsedCurl.headers).length?' | <span>Headers:</span> '+Object.keys(parsedCurl.headers).length:'')+
(parsedCurl.data?' | <span>Body:</span> Yes':'');
generatedCode={
python:toPython(parsedCurl),
javascript:toJavaScript(parsedCurl),
php:toPHP(parsedCurl),
go:toGo(parsedCurl)
};
document.getElementById('output').innerHTML=esc(generatedCode[currentLang]);
try{localStorage.setItem('curl2code_last',input)}catch(e){}
}catch(e){
errBox.style.display='block';
errBox.textContent='Parse Error: '+e.message;
}
}

function switchLang(lang,btn){
currentLang=lang;
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
if(generatedCode[lang])document.getElementById('output').innerHTML=esc(generatedCode[lang]);
}

function copyCode(){
if(!generatedCode[currentLang])return;
navigator.clipboard.writeText(generatedCode[currentLang]).then(()=>{
const el=document.createElement('div');el.className='copied';el.textContent='Code copied!';
document.body.appendChild(el);setTimeout(()=>el.remove(),1600);
});
}

function loadSample(){
document.getElementById('curlInput').value=`curl -X POST https://api.example.com/users \\
  -H "Content-Type: application/json" \\
  -H "Authorization: Bearer eyJhbGciOiJIUzI1NiJ9.token" \\
  -H "Accept: application/json" \\
  -d '{"name": "John Doe", "email": "john@example.com", "role": "admin"}'`;
convertCurl();
}

function clearAll(){
document.getElementById('curlInput').value='';
document.getElementById('output').innerHTML='';
document.getElementById('errorBox').style.display='none';
document.getElementById('parsedInfo').style.display='none';
parsedCurl=null;generatedCode={};
}

// Restore
try{const last=localStorage.getItem('curl2code_last');if(last){document.getElementById('curlInput').value=last}}catch(e){}
</script>
