<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:1rem 2rem;text-align:center}
header h1{font-size:1.6rem;color:#ff5f1f}
header p{color:#999;font-size:.9rem;margin-top:.3rem}
.container{max-width:1100px;margin:0 auto;padding:1.5rem;flex:1;width:100%}
.section{background:#111118;border:1px solid #1e1e2e;border-radius:10px;padding:1.5rem;margin-bottom:1.5rem}
.section h2{color:#ff5f1f;font-size:1.2rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
label{display:block;color:#bbb;font-size:.85rem;margin-bottom:.3rem}
input,select,textarea{background:#0a0a0f;color:#e8e8f0;border:1px solid #2a2a3a;border-radius:6px;padding:.5rem .7rem;font-size:.9rem;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#ff5f1f}
.btn{background:#ff5f1f;color:#fff;border:none;padding:.55rem 1.1rem;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
.btn:hover{background:#e54e10}
.btn-sm{padding:.35rem .7rem;font-size:.8rem}
.btn-outline{background:transparent;border:1px solid #ff5f1f;color:#ff5f1f}
.btn-outline:hover{background:#ff5f1f;color:#fff}
.btn-danger{background:#c0392b}.btn-danger:hover{background:#a93226}
.btn-green{background:#27ae60}.btn-green:hover{background:#219a52}
.form-row{display:flex;gap:.8rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem}
.form-row>div{flex:1;min-width:150px}
.condition-block{background:#0d0d14;border:1px solid #2a2a3a;border-radius:8px;padding:1rem;margin-bottom:.8rem;position:relative}
.condition-block .remove-cond{position:absolute;top:.5rem;right:.5rem;background:#c0392b;color:#fff;border:none;width:24px;height:24px;border-radius:4px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center}
.logic-badge{display:inline-block;background:#ff5f1f;color:#fff;padding:.2rem .6rem;border-radius:4px;font-size:.75rem;font-weight:700;margin:0 .4rem}
.auto-card{background:#0d0d14;border:1px solid #2a2a3a;border-radius:10px;padding:1.2rem;margin-bottom:1rem;position:relative}
.auto-card.inactive{opacity:.5}
.auto-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.auto-name{font-size:1.1rem;font-weight:700;color:#ff5f1f}
.auto-status{display:flex;align-items:center;gap:.5rem}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{display:none}
.toggle-slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#2a2a3a;border-radius:12px;transition:.3s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#666;border-radius:50%;transition:.3s}
.toggle-switch input:checked+.toggle-slider{background:#ff5f1f}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(20px);background:#fff}
.rule-text{color:#bbb;font-size:.9rem;line-height:1.6}
.rule-text .trigger-label{color:#3498db;font-weight:600}
.rule-text .action-label{color:#2ecc71;font-weight:600}
.rule-text .logic-label{color:#ff5f1f;font-weight:600}
.auto-meta{color:#555;font-size:.8rem;margin-top:.6rem;display:flex;gap:1rem}
.auto-actions{display:flex;gap:.4rem;margin-top:.8rem}
.log-entry{padding:.4rem .6rem;border-bottom:1px solid #1a1a2a;font-size:.85rem;display:flex;gap:.8rem}
.log-entry .log-time{color:#555;white-space:nowrap;min-width:80px}
.log-entry .log-msg{color:#bbb}
.log-entry .log-auto{color:#ff5f1f;font-weight:600;min-width:100px}
.empty{text-align:center;color:#555;padding:2rem;font-size:1rem}
.count-badge{background:#ff5f1f;color:#fff;padding:.2rem .6rem;border-radius:12px;font-size:.8rem;font-weight:700}
footer{background:#111118;border-top:1px solid #1e1e2e;text-align:center;padding:1.2rem;color:#666;font-size:.8rem}
footer a{color:#ff5f1f;margin:0 .3rem}
@media(max-width:768px){
  header h1{font-size:1.2rem}
  .container{padding:1rem}
  .form-row{flex-direction:column}
  .form-row>div{min-width:100%}
}

<body>
<header>
<h1>Task Automator</h1>
<p>Build if-then automation rules. Triggers, conditions, actions — all in your browser.</p>
</header>
<div class="container">
  <div class="section" id="builderSection">
    <h2>Create Automation</h2>
    <div class="form-row">
      <div style="flex:2"><label for="autoName">Automation Name</label><input type="text" id="autoName" placeholder="e.g. Alert when price drops"></div>
    </div>

    <h3 style="color:#3498db;font-size:.95rem;margin-bottom:.8rem">Conditions (IF)</h3>
    <div id="conditionsList"></div>
    <div style="display:flex;gap:.5rem;margin-bottom:1.5rem">
      <button class="btn btn-sm btn-outline" onclick="addCondition()">+ Add Condition</button>
      <select id="logicMode" style="width:auto">
        <option value="AND">Match ALL (AND)</option>
        <option value="OR">Match ANY (OR)</option>
      </select>
    </div>

    <h3 style="color:#2ecc71;font-size:.95rem;margin-bottom:.8rem">Actions (THEN)</h3>
    <div id="actionsList"></div>
    <div style="display:flex;gap:.5rem;margin-bottom:1.5rem">
      <button class="btn btn-sm btn-outline" onclick="addAction()">+ Add Action</button>
    </div>

    <button class="btn" onclick="saveAutomation()">Save Automation</button>
    <button class="btn btn-outline" style="margin-left:.5rem" onclick="resetBuilder()">Reset</button>
  </div>

  <div class="section">
    <h2>My Automations <span class="count-badge" id="autoCount">0</span></h2>
    <div id="automationsList"></div>
  </div>

  <div class="section">
    <h2>Execution Log <button class="btn btn-sm btn-outline" onclick="clearLog()">Clear</button></h2>
    <div id="logList" style="max-height:300px;overflow-y:auto"></div>
  </div>
</div>
<footer>
  <a href="https://spunk.codes">spunk.codes</a> · <a href="https://spunk.bet">spunk.bet</a> · <a href="https://spunk.pics">spunk.pics</a> · <a href="https://spunk.work">spunk.work</a> · <a href="https://spunkart.com">SpunkArt.com</a>
</footer>
<script>
const LS_AUTOS='ta_automations';
const LS_LOG='ta_log';
let conditions=[];
let actions=[];
let editingId=null;

function getAutos(){return JSON.parse(localStorage.getItem(LS_AUTOS)||'[]');}
function saveAutos(a){localStorage.setItem(LS_AUTOS,JSON.stringify(a));}
function getLog(){return JSON.parse(localStorage.getItem(LS_LOG)||'[]');}
function saveLog(l){localStorage.setItem(LS_LOG,JSON.stringify(l));}

const triggerTypes={
  time:{label:'Time-based',fields:[{name:'time',type:'time',label:'At time'},{name:'repeat',type:'select',label:'Repeat',options:['Once','Daily','Hourly']}]},
  threshold:{label:'Value Threshold',fields:[{name:'field',type:'text',label:'Field name'},{name:'op',type:'select',label:'Operator',options:['>','<','>=','<=','==','!=']},{name:'value',type:'text',label:'Value'}]},
  status:{label:'Status Change',fields:[{name:'field',type:'text',label:'Field name'},{name:'from',type:'text',label:'From status'},{name:'to',type:'text',label:'To status'}]},
  keyword:{label:'Keyword Match',fields:[{name:'field',type:'text',label:'In field'},{name:'keyword',type:'text',label:'Contains keyword'},{name:'caseSensitive',type:'select',label:'Case',options:['Insensitive','Sensitive']}]}
};

const actionTypes={
  notify:{label:'Send Notification',fields:[{name:'title',type:'text',label:'Title'},{name:'message',type:'text',label:'Message'}]},
  updateStatus:{label:'Update Status',fields:[{name:'field',type:'text',label:'Field name'},{name:'newStatus',type:'text',label:'New status'}]},
  addToList:{label:'Add to List',fields:[{name:'listName',type:'text',label:'List name'},{name:'item',type:'text',label:'Item text'}]},
  createTask:{label:'Create Task',fields:[{name:'taskTitle',type:'text',label:'Task title'},{name:'priority',type:'select',label:'Priority',options:['Low','Medium','High','Critical']}]}
};

function addCondition(){
  conditions.push({type:'time',params:{}});
  renderConditions();
}

function removeCondition(i){conditions.splice(i,1);renderConditions();}

function renderConditions(){
  const c=document.getElementById('conditionsList');
  c.innerHTML='';
  conditions.forEach((cond,i)=>{
    const block=document.createElement('div');
    block.className='condition-block';
    let html=`<button class="remove-cond" onclick="removeCondition(${i})">&#10005;</button>`;
    if(i>0){html+=`<span class="logic-badge">${document.getElementById('logicMode').value}</span>`;}
    html+=`<div class="form-row"><div style="max-width:200px"><label>Trigger Type</label><select onchange="conditions[${i}].type=this.value;conditions[${i}].params={};renderConditions()">`;
    for(const[k,v] of Object.entries(triggerTypes)){
      html+=`<option value="${k}" ${cond.type===k?'selected':''}>${v.label}</option>`;
    }
    html+=`</select></div>`;
    const fields=triggerTypes[cond.type].fields;
    fields.forEach(f=>{
      if(f.type==='select'){
        html+=`<div><label>${f.label}</label><select onchange="conditions[${i}].params['${f.name}']=this.value">`;
        f.options.forEach(o=>{html+=`<option value="${o}" ${cond.params[f.name]===o?'selected':''}>${o}</option>`;});
        html+=`</select></div>`;
      }else{
        html+=`<div><label>${f.label}</label><input type="${f.type}" value="${escA(cond.params[f.name]||'')}" oninput="conditions[${i}].params['${f.name}']=this.value"></div>`;
      }
    });
    html+=`</div>`;
    block.innerHTML=html;
    c.appendChild(block);
  });
}

function addAction(){
  actions.push({type:'notify',params:{}});
  renderActions();
}

function removeAction(i){actions.splice(i,1);renderActions();}

function renderActions(){
  const c=document.getElementById('actionsList');
  c.innerHTML='';
  actions.forEach((act,i)=>{
    const block=document.createElement('div');
    block.className='condition-block';
    let html=`<button class="remove-cond" onclick="removeAction(${i})">&#10005;</button>`;
    html+=`<div class="form-row"><div style="max-width:200px"><label>Action Type</label><select onchange="actions[${i}].type=this.value;actions[${i}].params={};renderActions()">`;
    for(const[k,v] of Object.entries(actionTypes)){
      html+=`<option value="${k}" ${act.type===k?'selected':''}>${v.label}</option>`;
    }
    html+=`</select></div>`;
    const fields=actionTypes[act.type].fields;
    fields.forEach(f=>{
      if(f.type==='select'){
        html+=`<div><label>${f.label}</label><select onchange="actions[${i}].params['${f.name}']=this.value">`;
        f.options.forEach(o=>{html+=`<option value="${o}" ${act.params[f.name]===o?'selected':''}>${o}</option>`;});
        html+=`</select></div>`;
      }else{
        html+=`<div><label>${f.label}</label><input type="${f.type}" value="${escA(act.params[f.name]||'')}" oninput="actions[${i}].params['${f.name}']=this.value"></div>`;
      }
    });
    html+=`</div>`;
    block.innerHTML=html;
    c.appendChild(block);
  });
}

function escA(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function saveAutomation(){
  const name=document.getElementById('autoName').value.trim();
  if(!name){flash('Name is required');return;}
  if(!conditions.length){flash('Add at least one condition');return;}
  if(!actions.length){flash('Add at least one action');return;}
  const logic=document.getElementById('logicMode').value;
  const autos=getAutos();
  if(editingId){
    const idx=autos.findIndex(a=>a.id===editingId);
    if(idx>=0){autos[idx]={...autos[idx],name,conditions:JSON.parse(JSON.stringify(conditions)),actions:JSON.parse(JSON.stringify(actions)),logic,updated:new Date().toISOString()};}
    editingId=null;
  }else{
    autos.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name,conditions:JSON.parse(JSON.stringify(conditions)),actions:JSON.parse(JSON.stringify(actions)),logic,active:true,created:new Date().toISOString(),runCount:0});
  }
  saveAutos(autos);resetBuilder();renderAutos();
  flash('Automation saved!');
}

function resetBuilder(){
  document.getElementById('autoName').value='';
  conditions=[];actions=[];editingId=null;
  renderConditions();renderActions();
}

function editAutomation(id){
  const autos=getAutos();
  const auto=autos.find(a=>a.id===id);
  if(!auto)return;
  editingId=id;
  document.getElementById('autoName').value=auto.name;
  document.getElementById('logicMode').value=auto.logic||'AND';
  conditions=JSON.parse(JSON.stringify(auto.conditions));
  actions=JSON.parse(JSON.stringify(auto.actions));
  renderConditions();renderActions();
  document.getElementById('builderSection').scrollIntoView({behavior:'smooth'});
  flash('Editing: '+auto.name);
}

function deleteAutomation(id){
  if(!confirm('Delete this automation?'))return;
  const autos=getAutos().filter(a=>a.id!==id);
  saveAutos(autos);renderAutos();
}

function toggleAutomation(id){
  const autos=getAutos();
  const auto=autos.find(a=>a.id===id);
  if(auto){auto.active=!auto.active;saveAutos(autos);renderAutos();}
}

function runAutomation(id){
  const autos=getAutos();
  const auto=autos.find(a=>a.id===id);
  if(!auto)return;
  const log=getLog();
  auto.actions.forEach(act=>{
    const aType=actionTypes[act.type];
    let msg=`${aType.label}: `;
    if(act.type==='notify'){
      msg+=`"${act.params.title||'Notification'}" - ${act.params.message||'No message'}`;
      if('Notification' in window&&Notification.permission==='granted'){new Notification(act.params.title||'Automation',{body:act.params.message||''});}
      else if('Notification' in window){Notification.requestPermission();}
    }else if(act.type==='updateStatus'){
      msg+=`Set ${act.params.field||'field'} to "${act.params.newStatus||''}"`;
    }else if(act.type==='addToList'){
      msg+=`Added "${act.params.item||''}" to ${act.params.listName||'list'}`;
    }else if(act.type==='createTask'){
      msg+=`Created task "${act.params.taskTitle||''}" [${act.params.priority||'Medium'}]`;
    }
    log.unshift({time:new Date().toISOString(),autoName:auto.name,message:msg});
  });
  auto.runCount=(auto.runCount||0)+1;
  auto.lastRun=new Date().toISOString();
  saveAutos(autos);saveLog(log.slice(0,200));
  renderAutos();renderLog();
  flash('Ran: '+auto.name);
}

function describeCondition(cond){
  const t=triggerTypes[cond.type];
  if(!t)return'Unknown trigger';
  switch(cond.type){
    case'time':return`time is ${cond.params.time||'--:--'} (${cond.params.repeat||'Once'})`;
    case'threshold':return`${cond.params.field||'field'} ${cond.params.op||'>'} ${cond.params.value||'0'}`;
    case'status':return`${cond.params.field||'field'} changes from "${cond.params.from||'*'}" to "${cond.params.to||'*'}"`;
    case'keyword':return`${cond.params.field||'field'} contains "${cond.params.keyword||''}"`;
    default:return t.label;
  }
}

function describeAction(act){
  const t=actionTypes[act.type];
  if(!t)return'Unknown action';
  switch(act.type){
    case'notify':return`send notification "${act.params.title||'Alert'}"`;
    case'updateStatus':return`set ${act.params.field||'field'} to "${act.params.newStatus||''}"`;
    case'addToList':return`add "${act.params.item||'item'}" to ${act.params.listName||'list'}`;
    case'createTask':return`create task "${act.params.taskTitle||''}" [${act.params.priority||'Medium'}]`;
    default:return t.label;
  }
}

function renderAutos(){
  const autos=getAutos();
  document.getElementById('autoCount').textContent=autos.length;
  const c=document.getElementById('automationsList');
  if(!autos.length){c.innerHTML='<div class="empty">No automations yet. Create one above.</div>';return;}
  c.innerHTML='';
  autos.forEach(auto=>{
    const card=document.createElement('div');
    card.className='auto-card'+(auto.active?'':' inactive');
    const condText=auto.conditions.map((cnd,i)=>{
      const prefix=i>0?` <span class="logic-label">${auto.logic||'AND'}</span> `:'';
      return`${prefix}<span class="trigger-label">IF</span> ${escH(describeCondition(cnd))}`;
    }).join('');
    const actText=auto.actions.map(a=>`<span class="action-label">THEN</span> ${escH(describeAction(a))}`).join(', ');
    card.innerHTML=`
      <div class="auto-header">
        <span class="auto-name">${escH(auto.name)}</span>
        <div class="auto-status">
          <label class="toggle-switch"><input type="checkbox" ${auto.active?'checked':''} onchange="toggleAutomation('${auto.id}')"><span class="toggle-slider"></span></label>
        </div>
      </div>
      <div class="rule-text">${condText}<br>${actText}</div>
      <div class="auto-meta">
        <span>Runs: ${auto.runCount||0}</span>
        ${auto.lastRun?`<span>Last: ${new Date(auto.lastRun).toLocaleString()}</span>`:''}
        <span>Created: ${new Date(auto.created).toLocaleDateString()}</span>
      </div>
      <div class="auto-actions">
        <button class="btn btn-sm btn-green" onclick="runAutomation('${auto.id}')">Run Now</button>
        <button class="btn btn-sm btn-outline" onclick="editAutomation('${auto.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteAutomation('${auto.id}')">Delete</button>
      </div>`;
    c.appendChild(card);
  });
}

function renderLog(){
  const log=getLog();
  const c=document.getElementById('logList');
  if(!log.length){c.innerHTML='<div class="empty">No execution history yet.</div>';return;}
  c.innerHTML='';
  log.slice(0,50).forEach(entry=>{
    const d=document.createElement('div');d.className='log-entry';
    d.innerHTML=`<span class="log-time">${new Date(entry.time).toLocaleTimeString()}</span>
      <span class="log-auto">${escH(entry.autoName)}</span>
      <span class="log-msg">${escH(entry.message)}</span>`;
    c.appendChild(d);
  });
}

function clearLog(){
  saveLog([]);renderLog();flash('Log cleared');
}

function flash(msg){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:20px;right:20px;background:#ff5f1f;color:#fff;padding:.8rem 1.5rem;border-radius:8px;font-weight:600;z-index:9999;animation:fadeOut 2s forwards';
  d.textContent=msg;document.body.appendChild(d);
  setTimeout(()=>d.remove(),2200);
}

const style=document.createElement('style');
style.textContent='@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}';
document.head.appendChild(style);

// Timer-based automation check
function checkTimeTriggers(){
  const now=new Date();
  const hhmm=now.toTimeString().slice(0,5);
  const autos=getAutos().filter(a=>a.active);
  autos.forEach(auto=>{
    auto.conditions.forEach(cond=>{
      if(cond.type==='time'&&cond.params.time===hhmm){
        const lastMin=auto.lastRun?new Date(auto.lastRun).getMinutes():-1;
        if(lastMin!==now.getMinutes()){runAutomation(auto.id);}
      }
    });
  });
}
setInterval(checkTimeTriggers,30000);

renderAutos();renderLog();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
