<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:960px;margin:0 auto;padding:20px;flex:1}
h1{font-size:1.8rem;text-align:center;margin-bottom:8px;color:#ff5f1f}
.subtitle{text-align:center;color:#888;margin-bottom:32px;font-size:0.95rem}
.top-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.top-bar select,.top-bar input{background:#12121a;border:1px solid #2a2a3e;border-radius:8px;padding:8px 12px;color:#e8e8f0;font-size:0.9rem}
.top-bar select{flex:1;min-width:180px}
.top-bar input{flex:1;min-width:150px}
.btn{background:#ff5f1f;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn:hover{background:#e5520f;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-sm{padding:6px 12px;font-size:0.8rem}
.btn-secondary{background:#1a1a2e;color:#e8e8f0}
.btn-secondary:hover{background:#252540}
.btn-danger{background:#3a1515;color:#ef4444}
.btn-danger:hover{background:#4a2020}
.progress-bar-wrap{background:#1a1a2e;border-radius:10px;height:20px;margin-bottom:24px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#ff5f1f,#ff8c57);transition:width 0.4s ease}
.progress-text{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600}
.category{background:#12121a;border:1px solid #1a1a2e;border-radius:12px;margin-bottom:16px;overflow:hidden}
.category-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;user-select:none}
.category-header:hover{background:#1a1a2e}
.category-title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
.category-count{font-size:0.8rem;color:#888;background:#0a0a0f;padding:2px 8px;border-radius:10px}
.chevron{color:#555;transition:transform 0.2s;font-size:0.8rem}
.chevron.open{transform:rotate(90deg)}
.category-body{padding:0 20px 16px;display:none}
.category-body.open{display:block}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #1a1a2e}
.task-item:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border:2px solid #2a2a3e;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.2s}
.task-check.checked{background:#ff5f1f;border-color:#ff5f1f}
.task-check.checked::after{content:'';display:block;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.task-content{flex:1;min-width:0}
.task-name{font-size:0.95rem;word-break:break-word}
.task-name.done{text-decoration:line-through;color:#555}
.task-desc{font-size:0.8rem;color:#666;margin-top:2px}
.task-assignee{font-size:0.75rem;color:#ff5f1f;margin-top:2px}
.task-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:none;color:#555;cursor:pointer;padding:4px;font-size:0.85rem}
.icon-btn:hover{color:#ff5f1f}
.add-task-form{display:flex;flex-direction:column;gap:8px;padding-top:12px;border-top:1px solid #1a1a2e;margin-top:8px}
.add-task-form input{background:#0a0a0f;border:1px solid #2a2a3e;border-radius:6px;padding:8px 10px;color:#e8e8f0;font-size:0.85rem}
.add-task-form input:focus{outline:none;border-color:#ff5f1f}
.add-row{display:flex;gap:8px}
.add-row input{flex:1}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;display:none}
.modal-overlay.active{display:flex}
.modal{background:#12121a;border:1px solid #2a2a3e;border-radius:12px;padding:24px;max-width:440px;width:90%}
.modal h3{margin-bottom:16px;color:#ff5f1f}
.modal input{width:100%;background:#0a0a0f;border:1px solid #2a2a3e;border-radius:8px;padding:10px;color:#e8e8f0;font-size:0.95rem;margin-bottom:12px}
.modal input:focus{outline:none;border-color:#ff5f1f}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.export-box{background:#0a0a0f;border:1px solid #2a2a3e;border-radius:8px;padding:16px;font-family:monospace;font-size:0.8rem;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;margin-top:16px;display:none}
footer{text-align:center;padding:24px;color:#555;font-size:0.8rem;border-top:1px solid #1a1a2e}
footer a{color:#888}
footer a:hover{color:#ff5f1f}
@media(max-width:600px){
  h1{font-size:1.4rem}
  .container{padding:12px}
  .top-bar{flex-direction:column}
  .top-bar select,.top-bar input{width:100%}
  .category-header{padding:12px 14px}
}

<body>
<div class="container">
  <h1>Employee Onboarding Checklist</h1>
  <p class="subtitle">Create and manage onboarding plans for every role</p>

  <div class="top-bar">
    <select id="plan-select" onchange="loadPlan()"></select>
    <button class="btn btn-sm" onclick="showNewPlanModal()">+ New Plan</button>
    <button class="btn btn-sm btn-secondary" onclick="duplicatePlan()">Duplicate</button>
    <button class="btn btn-sm btn-secondary" onclick="exportPlan()">Export</button>
    <button class="btn btn-sm btn-danger" onclick="deletePlan()">Delete</button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    <div class="progress-text" id="progress-text">0% Complete</div>
  </div>

  <div id="categories-container"></div>

  <div id="export-box" class="export-box"></div>
</div>

<!-- New Plan Modal -->
<div class="modal-overlay" id="new-plan-modal">
  <div class="modal">
    <h3>New Onboarding Plan</h3>
    <input type="text" id="new-plan-name" placeholder="e.g. Software Engineer, Marketing Manager">
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:0.85rem;color:#aaa;cursor:pointer">
      <input type="checkbox" id="use-template" checked> Load default template
    </label>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal('new-plan-modal')">Cancel</button>
      <button class="btn" onclick="createNewPlan()">Create</button>
    </div>
  </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="add-task-modal">
  <div class="modal">
    <h3>Add Task</h3>
    <input type="text" id="new-task-name" placeholder="Task name">
    <input type="text" id="new-task-desc" placeholder="Description (optional)">
    <input type="text" id="new-task-assignee" placeholder="Assignee (optional)">
    <input type="hidden" id="new-task-category">
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal('add-task-modal')">Cancel</button>
      <button class="btn" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>

<footer>
  <a href="https://spunk.codes">spunk.codes</a> · <a href="https://spunk.bet">spunk.bet</a> · <a href="https://spunk.pics">spunk.pics</a> · <a href="https://spunk.work">spunk.work</a> · <a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
(function(){
  var STORAGE_KEY = 'spunk_onboarding_plans';
  var currentPlanId = null;

  var DEFAULT_TEMPLATE = {
    categories: [
      {
        name: 'Pre-arrival',
        tasks: [
          { name: 'Send offer letter and contract', desc: 'Include start date, salary, and benefits info', assignee: 'HR', done: false },
          { name: 'Set up email account and credentials', desc: '', assignee: 'IT', done: false },
          { name: 'Order laptop and equipment', desc: 'Check requirements with hiring manager', assignee: 'IT', done: false },
          { name: 'Prepare workstation / desk assignment', desc: '', assignee: 'Office Manager', done: false },
          { name: 'Send welcome email with first-day info', desc: 'Include parking, dress code, what to bring', assignee: 'HR', done: false },
          { name: 'Add to payroll system', desc: '', assignee: 'HR', done: false },
          { name: 'Create accounts for required software', desc: 'Slack, Jira, GitHub, etc.', assignee: 'IT', done: false },
          { name: 'Assign onboarding buddy', desc: '', assignee: 'Manager', done: false }
        ]
      },
      {
        name: 'Day 1',
        tasks: [
          { name: 'Welcome and office tour', desc: 'Show kitchen, restrooms, emergency exits', assignee: 'Buddy', done: false },
          { name: 'Complete HR paperwork', desc: 'Tax forms, emergency contacts, NDA', assignee: 'HR', done: false },
          { name: 'Set up laptop and software', desc: '', assignee: 'IT', done: false },
          { name: 'Team introductions', desc: 'Meet immediate team and cross-functional partners', assignee: 'Manager', done: false },
          { name: 'Review company mission and values', desc: '', assignee: 'HR', done: false },
          { name: 'First lunch with team', desc: '', assignee: 'Buddy', done: false },
          { name: 'Access badge and building access', desc: '', assignee: 'Security', done: false }
        ]
      },
      {
        name: 'Week 1',
        tasks: [
          { name: 'Complete compliance training', desc: 'Security awareness, harassment prevention', assignee: 'New Hire', done: false },
          { name: 'Review team processes and workflows', desc: '', assignee: 'Manager', done: false },
          { name: 'Set up development environment', desc: 'Clone repos, install dependencies, run locally', assignee: 'Buddy', done: false },
          { name: 'Review product roadmap and backlog', desc: '', assignee: 'Manager', done: false },
          { name: 'Shadow team members on key tasks', desc: '', assignee: 'New Hire', done: false },
          { name: 'Schedule recurring 1:1 with manager', desc: '', assignee: 'Manager', done: false },
          { name: 'Join relevant Slack channels and meetings', desc: '', assignee: 'Buddy', done: false },
          { name: 'Complete first small task or bug fix', desc: '', assignee: 'New Hire', done: false }
        ]
      },
      {
        name: 'Month 1',
        tasks: [
          { name: 'Set 30-60-90 day goals with manager', desc: '', assignee: 'Manager', done: false },
          { name: 'Complete all required training modules', desc: '', assignee: 'New Hire', done: false },
          { name: 'Contribute to first project milestone', desc: '', assignee: 'New Hire', done: false },
          { name: 'Meet with key stakeholders from other teams', desc: '', assignee: 'Manager', done: false },
          { name: 'Provide onboarding feedback survey', desc: '', assignee: 'HR', done: false },
          { name: '30-day check-in with HR', desc: 'Discuss experience, concerns, questions', assignee: 'HR', done: false },
          { name: 'Review benefits enrollment', desc: 'Health, dental, 401k, etc.', assignee: 'New Hire', done: false }
        ]
      },
      {
        name: 'Month 3',
        tasks: [
          { name: 'Complete probation review', desc: 'Formal performance check-in', assignee: 'Manager', done: false },
          { name: 'Lead a team meeting or presentation', desc: '', assignee: 'New Hire', done: false },
          { name: 'Mentor a newer team member (if applicable)', desc: '', assignee: 'New Hire', done: false },
          { name: 'Review and update onboarding documentation', desc: 'Suggest improvements based on experience', assignee: 'New Hire', done: false },
          { name: 'Set long-term development goals', desc: '', assignee: 'Manager', done: false },
          { name: 'Final onboarding assessment', desc: '', assignee: 'HR', done: false }
        ]
      }
    ]
  };

  function getPlans() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  }
  function savePlans(plans) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(plans));
  }
  function getCurrentPlan() {
    var plans = getPlans();
    return plans[currentPlanId] || null;
  }
  function saveCurrentPlan(plan) {
    var plans = getPlans();
    plans[currentPlanId] = plan;
    savePlans(plans);
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
  }

  function populatePlanSelect() {
    var plans = getPlans();
    var sel = document.getElementById('plan-select');
    var ids = Object.keys(plans);
    if (ids.length === 0) {
      createDefaultPlan();
      return;
    }
    sel.innerHTML = '';
    ids.forEach(function(id) {
      var opt = document.createElement('option');
      opt.value = id;
      opt.textContent = plans[id].name;
      sel.appendChild(opt);
    });
    if (currentPlanId && plans[currentPlanId]) {
      sel.value = currentPlanId;
    } else {
      currentPlanId = ids[0];
      sel.value = currentPlanId;
    }
  }

  function createDefaultPlan() {
    var plans = getPlans();
    var id = generateId();
    plans[id] = {
      name: 'General Onboarding',
      categories: JSON.parse(JSON.stringify(DEFAULT_TEMPLATE.categories))
    };
    savePlans(plans);
    currentPlanId = id;
    populatePlanSelect();
    renderPlan();
  }

  window.loadPlan = function() {
    currentPlanId = document.getElementById('plan-select').value;
    renderPlan();
    document.getElementById('export-box').style.display = 'none';
  };

  window.showNewPlanModal = function() {
    document.getElementById('new-plan-name').value = '';
    document.getElementById('use-template').checked = true;
    document.getElementById('new-plan-modal').classList.add('active');
    document.getElementById('new-plan-name').focus();
  };

  window.closeModal = function(id) {
    document.getElementById(id).classList.remove('active');
  };

  window.createNewPlan = function() {
    var name = document.getElementById('new-plan-name').value.trim();
    if (!name) { alert('Please enter a plan name.'); return; }
    var useTemplate = document.getElementById('use-template').checked;
    var plans = getPlans();
    var id = generateId();
    plans[id] = {
      name: name,
      categories: useTemplate ? JSON.parse(JSON.stringify(DEFAULT_TEMPLATE.categories)) : [
        { name: 'Pre-arrival', tasks: [] },
        { name: 'Day 1', tasks: [] },
        { name: 'Week 1', tasks: [] },
        { name: 'Month 1', tasks: [] },
        { name: 'Month 3', tasks: [] }
      ]
    };
    savePlans(plans);
    currentPlanId = id;
    populatePlanSelect();
    renderPlan();
    closeModal('new-plan-modal');
  };

  window.duplicatePlan = function() {
    var plan = getCurrentPlan();
    if (!plan) return;
    var plans = getPlans();
    var id = generateId();
    plans[id] = JSON.parse(JSON.stringify(plan));
    plans[id].name = plan.name + ' (Copy)';
    savePlans(plans);
    currentPlanId = id;
    populatePlanSelect();
    renderPlan();
  };

  window.deletePlan = function() {
    var plans = getPlans();
    var ids = Object.keys(plans);
    if (ids.length <= 1) { alert('Cannot delete the last plan.'); return; }
    if (!confirm('Delete this onboarding plan?')) return;
    delete plans[currentPlanId];
    savePlans(plans);
    currentPlanId = null;
    populatePlanSelect();
    renderPlan();
  };

  window.toggleCategory = function(idx) {
    var body = document.getElementById('cat-body-' + idx);
    var chev = document.getElementById('chev-' + idx);
    body.classList.toggle('open');
    chev.classList.toggle('open');
  };

  window.toggleTask = function(catIdx, taskIdx) {
    var plan = getCurrentPlan();
    plan.categories[catIdx].tasks[taskIdx].done = !plan.categories[catIdx].tasks[taskIdx].done;
    saveCurrentPlan(plan);
    renderPlan();
  };

  window.deleteTask = function(catIdx, taskIdx) {
    var plan = getCurrentPlan();
    plan.categories[catIdx].tasks.splice(taskIdx, 1);
    saveCurrentPlan(plan);
    renderPlan();
  };

  window.showAddTaskModal = function(catIdx) {
    document.getElementById('new-task-name').value = '';
    document.getElementById('new-task-desc').value = '';
    document.getElementById('new-task-assignee').value = '';
    document.getElementById('new-task-category').value = catIdx;
    document.getElementById('add-task-modal').classList.add('active');
    document.getElementById('new-task-name').focus();
  };

  window.addTask = function() {
    var name = document.getElementById('new-task-name').value.trim();
    if (!name) { alert('Please enter a task name.'); return; }
    var desc = document.getElementById('new-task-desc').value.trim();
    var assignee = document.getElementById('new-task-assignee').value.trim();
    var catIdx = parseInt(document.getElementById('new-task-category').value);
    var plan = getCurrentPlan();
    plan.categories[catIdx].tasks.push({ name: name, desc: desc, assignee: assignee, done: false });
    saveCurrentPlan(plan);
    renderPlan();
    closeModal('add-task-modal');
  };

  window.exportPlan = function() {
    var plan = getCurrentPlan();
    if (!plan) return;
    var lines = [];
    lines.push('ONBOARDING PLAN: ' + plan.name);
    lines.push('=' .repeat(50));
    lines.push('Exported: ' + new Date().toLocaleString());
    lines.push('');
    var total = 0, done = 0;
    plan.categories.forEach(function(cat) {
      lines.push('--- ' + cat.name.toUpperCase() + ' ---');
      if (cat.tasks.length === 0) {
        lines.push('  (no tasks)');
      }
      cat.tasks.forEach(function(t) {
        total++;
        if (t.done) done++;
        var check = t.done ? '[x]' : '[ ]';
        var line = '  ' + check + ' ' + t.name;
        if (t.assignee) line += '  (Assignee: ' + t.assignee + ')';
        lines.push(line);
        if (t.desc) lines.push('      ' + t.desc);
      });
      lines.push('');
    });
    lines.push('PROGRESS: ' + done + '/' + total + ' tasks completed (' + (total > 0 ? Math.round(done/total*100) : 0) + '%)');
    var box = document.getElementById('export-box');
    box.textContent = lines.join('\n');
    box.style.display = 'block';
    // Also copy to clipboard
    if (navigator.clipboard) {
      navigator.clipboard.writeText(lines.join('\n')).then(function() {
        // brief flash
      });
    }
  };

  function renderPlan() {
    var plan = getCurrentPlan();
    if (!plan) return;
    var container = document.getElementById('categories-container');
    var totalTasks = 0, doneTasks = 0;

    var html = '';
    plan.categories.forEach(function(cat, ci) {
      var catDone = cat.tasks.filter(function(t){ return t.done; }).length;
      var catTotal = cat.tasks.length;
      totalTasks += catTotal;
      doneTasks += catDone;

      html += '<div class="category">';
      html += '<div class="category-header" onclick="toggleCategory(' + ci + ')">';
      html += '<div class="category-title"><span class="chevron' + (ci < 2 ? ' open' : '') + '" id="chev-' + ci + '">&#9654;</span> ' + escHtml(cat.name) + ' <span class="category-count">' + catDone + '/' + catTotal + '</span></div>';
      html += '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();showAddTaskModal(' + ci + ')">+ Add</button>';
      html += '</div>';
      html += '<div class="category-body' + (ci < 2 ? ' open' : '') + '" id="cat-body-' + ci + '">';

      if (cat.tasks.length === 0) {
        html += '<div style="color:#555;font-size:0.85rem;padding:10px 0">No tasks yet. Click "+ Add" to add tasks.</div>';
      }

      cat.tasks.forEach(function(task, ti) {
        html += '<div class="task-item">';
        html += '<div class="task-check' + (task.done ? ' checked' : '') + '" onclick="toggleTask(' + ci + ',' + ti + ')"></div>';
        html += '<div class="task-content">';
        html += '<div class="task-name' + (task.done ? ' done' : '') + '">' + escHtml(task.name) + '</div>';
        if (task.desc) html += '<div class="task-desc">' + escHtml(task.desc) + '</div>';
        if (task.assignee) html += '<div class="task-assignee">Assignee: ' + escHtml(task.assignee) + '</div>';
        html += '</div>';
        html += '<div class="task-actions"><button class="icon-btn" onclick="deleteTask(' + ci + ',' + ti + ')" title="Delete task">&#10005;</button></div>';
        html += '</div>';
      });

      html += '</div></div>';
    });

    container.innerHTML = html;

    // Update progress
    var pct = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = pct + '% Complete (' + doneTasks + '/' + totalTasks + ' tasks)';
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Handle enter key in modals
  document.getElementById('new-plan-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') createNewPlan();
  });
  document.getElementById('new-task-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTask();
  });

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.classList.remove('active');
    });
  });

  // Init
  populatePlanSelect();
  renderPlan();
})();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
