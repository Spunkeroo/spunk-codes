<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:960px;margin:0 auto;padding:20px;flex:1}
h1{text-align:center;font-size:1.8rem;margin:20px 0 8px;color:#ff5f1f}
.subtitle{text-align:center;color:#888;margin-bottom:30px;font-size:0.95rem}
.card{background:#12121a;border:1px solid #1e1e2e;border-radius:12px;padding:24px;margin-bottom:20px}
.card h2{font-size:1.2rem;margin-bottom:16px;color:#ff5f1f}
label{display:block;font-size:0.85rem;color:#aaa;margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input[type="text"],input[type="email"],input[type="url"],textarea{width:100%;padding:10px 12px;background:#1a1a28;border:1px solid #2a2a3a;border-radius:8px;color:#e8e8f0;font-size:0.95rem;outline:none}
input:focus,textarea:focus{border-color:#ff5f1f}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{display:inline-block;padding:12px 24px;background:#ff5f1f;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600;transition:background .2s}
.btn:hover{background:#e5520f}
.btn-secondary{background:transparent;border:1px solid #ff5f1f;color:#ff5f1f}
.btn-secondary:hover{background:#ff5f1f22}
.btn-sm{padding:8px 16px;font-size:0.85rem}
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:8px}
.checkbox-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1a1a28;border-radius:8px;cursor:pointer;transition:background .2s}
.checkbox-item:hover{background:#222238}
.checkbox-item input[type="checkbox"]{accent-color:#ff5f1f;width:16px;height:16px;cursor:pointer}
.checkbox-item label{margin:0;cursor:pointer;font-size:0.9rem;color:#ccc}
.output-area{background:#0d0d14;border:1px solid #1e1e2e;border-radius:8px;padding:20px;font-size:0.9rem;line-height:1.8;max-height:500px;overflow-y:auto;white-space:pre-wrap;font-family:inherit}
.output-area h3{color:#ff5f1f;margin:20px 0 8px;font-size:1rem}
.output-area h3:first-child{margin-top:0}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.draft-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#1a1a28;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:background .2s}
.draft-item:hover{background:#222238}
.draft-item .name{font-weight:600}
.draft-item .date{color:#888;font-size:0.8rem}
.toast{position:fixed;bottom:24px;right:24px;background:#00c853;color:#fff;padding:12px 24px;border-radius:8px;font-weight:600;z-index:999;display:none;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.empty-state{text-align:center;color:#555;padding:30px}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #1e1e2e}
.tab{padding:12px 24px;cursor:pointer;color:#888;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:#ff5f1f;border-bottom-color:#ff5f1f}
.tab-content{display:none}.tab-content.active{display:block}
footer{text-align:center;padding:20px;color:#555;font-size:0.8rem;border-top:1px solid #1e1e2e;margin-top:40px}
footer a{color:#ff5f1f}
@media(max-width:600px){.row{grid-template-columns:1fr}.checkbox-grid{grid-template-columns:1fr 1fr}.container{padding:12px}h1{font-size:1.4rem}}

<body>
<div class="container">
<h1>Privacy Policy Generator</h1>
<p class="subtitle">Create a complete, GDPR and CCPA compliant privacy policy in minutes.</p>

<div class="tabs">
<div class="tab active" onclick="switchTab('generator')">Generator</div>
<div class="tab" onclick="switchTab('drafts')">Saved Drafts</div>
</div>

<div id="tab-generator" class="tab-content active">
<div class="card">
<h2>Website Information</h2>
<div class="row">
<div><label>Website Name</label><input type="text" id="siteName" placeholder="e.g. My Website"></div>
<div><label>Website URL</label><input type="url" id="siteUrl" placeholder="e.g. https://example.com"></div>
</div>
<label>Contact Email</label>
<input type="email" id="contactEmail" placeholder="e.g. privacy@example.com">
</div>

<div class="card">
<h2>Data Collected</h2>
<div class="checkbox-grid" id="dataCollected">
<div class="checkbox-item"><input type="checkbox" id="d_name" checked><label for="d_name">Name</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_email" checked><label for="d_email">Email Address</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_phone"><label for="d_phone">Phone Number</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_payment"><label for="d_payment">Payment Info</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_address"><label for="d_address">Mailing Address</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_cookies" checked><label for="d_cookies">Cookies</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_analytics" checked><label for="d_analytics">Analytics Data</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_location"><label for="d_location">Location Data</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_ip" checked><label for="d_ip">IP Address</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_device"><label for="d_device">Device Info</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_social"><label for="d_social">Social Profiles</label></div>
<div class="checkbox-item"><input type="checkbox" id="d_usage" checked><label for="d_usage">Usage Data</label></div>
</div>
</div>

<div class="card">
<h2>Third-Party Services Used</h2>
<div class="checkbox-grid" id="thirdParties">
<div class="checkbox-item"><input type="checkbox" id="tp_ga" checked><label for="tp_ga">Google Analytics</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_gtm"><label for="tp_gtm">Google Tag Manager</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_gads"><label for="tp_gads">Google Ads</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_fb"><label for="tp_fb">Facebook/Meta Pixel</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_stripe"><label for="tp_stripe">Stripe</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_paypal"><label for="tp_paypal">PayPal</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_mailchimp"><label for="tp_mailchimp">Mailchimp</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_sendgrid"><label for="tp_sendgrid">SendGrid</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_intercom"><label for="tp_intercom">Intercom</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_hotjar"><label for="tp_hotjar">Hotjar</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_clarity"><label for="tp_clarity">Microsoft Clarity</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_aws"><label for="tp_aws">AWS</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_cloudflare"><label for="tp_cloudflare">Cloudflare</label></div>
<div class="checkbox-item"><input type="checkbox" id="tp_hubspot"><label for="tp_hubspot">HubSpot</label></div>
</div>
</div>

<div style="text-align:center;margin:20px 0">
<button class="btn" onclick="generatePolicy()">Generate Privacy Policy</button>
</div>

<div id="outputSection" style="display:none">
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
<h2 style="margin:0">Your Privacy Policy</h2>
<div class="actions" style="margin:0">
<button class="btn btn-sm" onclick="copyPolicy()">Copy to Clipboard</button>
<button class="btn btn-sm btn-secondary" onclick="saveDraft()">Save Draft</button>
</div>
</div>
<div class="output-area" id="policyOutput"></div>
</div>
</div>
</div>

<div id="tab-drafts" class="tab-content">
<div class="card">
<h2>Saved Drafts</h2>
<div id="draftsList"></div>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<footer>

</footer>

<script>
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}

function getChecked(prefix){
const items=[];
document.querySelectorAll(`[id^="${prefix}"]`).forEach(el=>{
if(el.checked)items.push(el.nextElementSibling.textContent.trim());
});
return items;
}

function generatePolicy(){
const name=document.getElementById('siteName').value.trim()||'[Website Name]';
const url=document.getElementById('siteUrl').value.trim()||'[Website URL]';
const email=document.getElementById('contactEmail').value.trim()||'[Contact Email]';
const dataItems=getChecked('d_');
const tpItems=getChecked('tp_');
const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

let policy=`<h3>Privacy Policy for ${name}</h3>
<strong>Effective Date:</strong> ${today}
<strong>Website:</strong> ${url}

This Privacy Policy describes how ${name} ("we," "us," or "our") collects, uses, and shares information about you when you visit our website at ${url} (the "Site"). By using our Site, you agree to the collection and use of information as described in this policy.

<h3>1. Information We Collect</h3>
We may collect the following types of information:

${dataItems.map(d=>'- <strong>'+d+'</strong>').join('\n')}

This information may be collected when you visit our Site, create an account, make a purchase, subscribe to our newsletter, fill out a form, or interact with our services.

<h3>2. How We Use Your Information</h3>
We use the information we collect to:

- Provide, operate, and maintain our Site and services
- Improve, personalize, and expand our Site
- Understand and analyze how you use our Site
- Develop new products, services, features, and functionality
- Communicate with you, including for customer service, updates, and marketing
- Process transactions and send related information
- Find and prevent fraud
- Comply with legal obligations

<h3>3. Cookies and Tracking Technologies</h3>
${dataItems.includes('Cookies')?`We use cookies and similar tracking technologies to track activity on our Site and hold certain information. Cookies are files with small amounts of data which may include an anonymous unique identifier.

You can instruct your browser to refuse all cookies or to indicate when a cookie is being sent. However, if you do not accept cookies, some portions of our Site may not function properly.

We use the following types of cookies:
- <strong>Essential cookies:</strong> Required for basic Site functionality
- <strong>Analytics cookies:</strong> Help us understand how visitors interact with our Site
- <strong>Preference cookies:</strong> Remember your settings and preferences
- <strong>Marketing cookies:</strong> Track your activity to deliver relevant advertising`:'We use minimal cookies necessary for the operation of our Site.'}

<h3>4. Third-Party Services</h3>
${tpItems.length?`We use the following third-party services that may collect information about you:

${tpItems.map(tp=>'- <strong>'+tp+'</strong>').join('\n')}

Each of these services has their own privacy policy governing the use of your information. We encourage you to review their respective privacy policies.`:'We do not currently use third-party services that collect your personal information.'}

<h3>5. Data Sharing and Disclosure</h3>
We do not sell your personal information. We may share your information in the following situations:

- <strong>With service providers:</strong> We may share your information with third-party vendors who provide services on our behalf
- <strong>For legal reasons:</strong> If required by law, regulation, legal process, or governmental request
- <strong>To protect rights:</strong> To enforce our policies, protect our rights, privacy, safety, or property
- <strong>Business transfers:</strong> In connection with a merger, acquisition, or sale of assets

<h3>6. Data Security</h3>
We implement appropriate technical and organizational measures to protect your personal information against unauthorized access, alteration, disclosure, or destruction. However, no method of transmission over the Internet or electronic storage is 100% secure.

<h3>7. Data Retention</h3>
We retain your personal information only for as long as necessary to fulfill the purposes outlined in this policy, unless a longer retention period is required or permitted by law.

<h3>8. Your Rights Under GDPR (European Users)</h3>
If you are a resident of the European Economic Area (EEA), you have certain data protection rights under the General Data Protection Regulation (GDPR):

- <strong>Right of access:</strong> You can request copies of your personal data
- <strong>Right to rectification:</strong> You can request correction of inaccurate or incomplete data
- <strong>Right to erasure:</strong> You can request deletion of your personal data
- <strong>Right to restrict processing:</strong> You can request restriction of processing your data
- <strong>Right to data portability:</strong> You can request transfer of your data to another organization
- <strong>Right to object:</strong> You can object to processing of your personal data
- <strong>Right to withdraw consent:</strong> You can withdraw consent at any time

To exercise any of these rights, contact us at ${email}. We will respond to your request within 30 days.

<h3>9. Your Rights Under CCPA (California Residents)</h3>
If you are a California resident, the California Consumer Privacy Act (CCPA) provides you with specific rights:

- <strong>Right to know:</strong> You can request information about the categories and specific pieces of personal data we have collected
- <strong>Right to delete:</strong> You can request deletion of your personal data
- <strong>Right to opt-out:</strong> You can opt out of the sale of your personal data (we do not sell your data)
- <strong>Right to non-discrimination:</strong> We will not discriminate against you for exercising your CCPA rights

To exercise your rights under the CCPA, contact us at ${email}.

<h3>10. Children's Privacy</h3>
Our Site is not intended for children under the age of 13 (or 16 in the EEA). We do not knowingly collect personal information from children. If you believe we have collected information from a child, please contact us immediately at ${email}.

<h3>11. Links to Other Websites</h3>
Our Site may contain links to other websites that are not operated by us. We have no control over and assume no responsibility for the content, privacy policies, or practices of any third-party sites or services.

<h3>12. Changes to This Privacy Policy</h3>
We may update this Privacy Policy from time to time. We will notify you of any changes by posting the new Privacy Policy on this page and updating the "Effective Date." You are advised to review this Privacy Policy periodically.

<h3>13. Contact Us</h3>
If you have any questions about this Privacy Policy, please contact us:

- <strong>Email:</strong> ${email}
- <strong>Website:</strong> ${url}`;

document.getElementById('policyOutput').innerHTML=policy;
document.getElementById('outputSection').style.display='block';
document.getElementById('outputSection').scrollIntoView({behavior:'smooth'});
}

function copyPolicy(){
const el=document.getElementById('policyOutput');
const text=el.innerText;
navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard!')).catch(()=>{
const range=document.createRange();range.selectNode(el);
window.getSelection().removeAllRanges();window.getSelection().addRange(range);
document.execCommand('copy');window.getSelection().removeAllRanges();
showToast('Copied to clipboard!');
});
}

function saveDraft(){
const name=document.getElementById('siteName').value.trim()||'Untitled';
const content=document.getElementById('policyOutput').innerHTML;
if(!content){showToast('Generate a policy first.');return;}
let drafts=JSON.parse(localStorage.getItem('ppg_drafts')||'[]');
drafts.unshift({id:Date.now(),name,content,date:new Date().toISOString()});
if(drafts.length>20)drafts=drafts.slice(0,20);
localStorage.setItem('ppg_drafts',JSON.stringify(drafts));
showToast('Draft saved!');
}

function renderDrafts(){
const drafts=JSON.parse(localStorage.getItem('ppg_drafts')||'[]');
const container=document.getElementById('draftsList');
if(!drafts.length){container.innerHTML='<div class="empty-state">No saved drafts yet.</div>';return;}
container.innerHTML='';
drafts.forEach(d=>{
const div=document.createElement('div');
div.className='draft-item';
const date=new Date(d.date).toLocaleDateString();
div.innerHTML=`<div><div class="name">${d.name}</div><div class="date">${date}</div></div><div style="display:flex;gap:8px"><button class="btn btn-sm btn-secondary" onclick="loadDraft(${d.id})">Load</button><button class="btn btn-sm btn-danger" style="background:#ff1744;color:#fff;border:none" onclick="deleteDraft(${d.id})">Delete</button></div>`;
container.appendChild(div);
});
}

function loadDraft(id){
const drafts=JSON.parse(localStorage.getItem('ppg_drafts')||'[]');
const draft=drafts.find(d=>d.id===id);
if(!draft)return;
switchTab('generator');
document.getElementById('policyOutput').innerHTML=draft.content;
document.getElementById('outputSection').style.display='block';
document.getElementById('outputSection').scrollIntoView({behavior:'smooth'});
}

function deleteDraft(id){
if(!confirm('Delete this draft?'))return;
let drafts=JSON.parse(localStorage.getItem('ppg_drafts')||'[]');
drafts=drafts.filter(d=>d.id!==id);
localStorage.setItem('ppg_drafts',JSON.stringify(drafts));
renderDrafts();
}

function switchTab(name){
document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['generator','drafts'][i]===name));
document.querySelectorAll('.tab-content').forEach((t,i)=>t.classList.toggle('active',['generator','drafts'][i]===name));
if(name==='drafts')renderDrafts();
}
</script>
</body>
