<script>
const LS_KEY='spunkcodes_qr_gen';
let history=[];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function load(){try{history=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){history=[]}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(history.slice(0,50)))}

/* Minimal QR Code generator - byte mode, ECC L, versions 1-10 */
const QR=(function(){
const EC_CODEWORDS=[0,7,10,15,20,26,18,20,24,30,18];
const TOTAL_CODEWORDS=[0,26,44,70,100,134,172,196,242,292,346];
const DATA_CODEWORDS=[];
for(let i=0;i<=10;i++)DATA_CODEWORDS[i]=TOTAL_CODEWORDS[i]-EC_CODEWORDS[i];
const ALIGN_POS=[0,[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46],[6,28,50]];
const FORMAT_BITS=[0x77c4,0x72f3,0x7daa,0x789d,0x662f,0x6318,0x6c41,0x6976,0x5412,0x5125,0x5e7c,0x5b4b,0x45f9,0x40ce,0x4f97,0x4aa0,0x355f,0x3068,0x3f31,0x3a06,0x24b4,0x2183,0x2eda,0x2bed,0x1689,0x13be,0x1ce7,0x19d0,0x0762,0x0255,0x0d0c,0x083b];

function getVersion(len){
for(let v=1;v<=10;v++){
const cap=DATA_CODEWORDS[v]-2;
if(len<=cap)return v;
}
return 0;
}

function makeMatrix(ver){
const size=ver*4+17;
const m=[];
for(let i=0;i<size;i++){m[i]=[];for(let j=0;j<size;j++)m[i][j]=-1}
return m;
}

function setModule(m,r,c,val){if(r>=0&&r<m.length&&c>=0&&c<m.length)m[r][c]=val?1:0}

function addFinderPattern(m,r,c){
for(let dr=-1;dr<=7;dr++)for(let dc=-1;dc<=7;dc++){
const rr=r+dr,cc=c+dc;
if(rr<0||rr>=m.length||cc<0||cc>=m.length)continue;
const inOuter=(dr===0||dr===6)&&dc>=0&&dc<=6||(dc===0||dc===6)&&dr>=0&&dr<=6;
const inInner=dr>=2&&dr<=4&&dc>=2&&dc<=4;
setModule(m,rr,cc,inOuter||inInner?1:0);
}
}

function addAlignmentPattern(m,r,c){
for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
setModule(m,r+dr,c+dc,(Math.abs(dr)===2||Math.abs(dc)===2||dr===0&&dc===0)?1:0);
}
}

function addPatterns(m,ver){
const size=m.length;
addFinderPattern(m,0,0);
addFinderPattern(m,0,size-7);
addFinderPattern(m,size-7,0);
for(let i=8;i<size-8;i++){setModule(m,6,i,i%2===0?1:0);setModule(m,i,6,i%2===0?1:0)}
const ap=ALIGN_POS[ver];
if(ap.length>0){
for(let i=0;i<ap.length;i++)for(let j=0;j<ap.length;j++){
if(i===0&&j===0||i===0&&j===ap.length-1||i===ap.length-1&&j===0)continue;
addAlignmentPattern(m,ap[i],ap[j]);
}
}
setModule(m,size-8,8,1);
}

function addFormatBits(m,mask){
const bits=FORMAT_BITS[mask];
const size=m.length;
for(let i=0;i<6;i++){setModule(m,8,i,(bits>>i)&1);setModule(m,i,8,(bits>>(14-i))&1)}
setModule(m,8,7,(bits>>6)&1);setModule(m,8,8,(bits>>7)&1);setModule(m,7,8,(bits>>8)&1);
for(let i=0;i<7;i++)setModule(m,size-1-i,8,(bits>>i)&1);
for(let i=0;i<8;i++)setModule(m,8,size-8+i,(bits>>(14-i))&1);
}

function encodeData(text,ver){
const bytes=[];
for(let i=0;i<text.length;i++){
const code=text.charCodeAt(i);
if(code<128)bytes.push(code);
else if(code<2048){bytes.push(192|(code>>6));bytes.push(128|(code&63))}
else{bytes.push(224|(code>>12));bytes.push(128|((code>>6)&63));bytes.push(128|(code&63))}
}
const dataCap=DATA_CODEWORDS[ver];
const bits=[];
bits.push(0,1,0,0);
const lenBits=ver<=9?8:16;
for(let i=lenBits-1;i>=0;i--)bits.push((bytes.length>>i)&1);
for(const b of bytes)for(let i=7;i>=0;i--)bits.push((b>>i)&1);
const termLen=Math.min(4,dataCap*8-bits.length);
for(let i=0;i<termLen;i++)bits.push(0);
while(bits.length%8!==0)bits.push(0);
while(bits.length<dataCap*8){bits.push(1,1,1,0,1,1,0,0);if(bits.length<dataCap*8)bits.push(0,0,0,1,0,0,0,1)}
bits.length=dataCap*8;
const codewords=[];
for(let i=0;i<bits.length;i+=8){let b=0;for(let j=0;j<8;j++)b=(b<<1)|bits[i+j];codewords.push(b)}
return codewords;
}

function rsEncode(data,ecLen){
const LOG=[];const EXP=[];let v=1;
for(let i=0;i<256;i++){EXP[i]=v;LOG[v>=256?v^0x11d:v]=i;v=(v<<1);if(v>=256)v^=0x11d}
const gen=[];gen[0]=1;
for(let i=0;i<ecLen;i++){
const next=new Array(gen.length+1).fill(0);
for(let j=0;j<gen.length;j++){
next[j]^=gen[j];
next[j+1]^=(gen[j]===0?0:EXP[(LOG[gen[j]]+i)%255]);
}
for(let j=0;j<next.length;j++)gen[j]=next[j];
gen.length=next.length;
}
const msg=new Array(data.length+ecLen).fill(0);
for(let i=0;i<data.length;i++)msg[i]=data[i];
for(let i=0;i<data.length;i++){
const coef=msg[i];
if(coef===0)continue;
for(let j=1;j<gen.length;j++){
msg[i+j]^=(gen[j]===0?0:EXP[(LOG[gen[j]]+LOG[coef])%255]);
}
}
return msg.slice(data.length);
}

function generate(text){
if(!text)return null;
const encoded=new TextEncoder().encode(text);
const ver=getVersion(encoded.length);
if(ver===0)return null;
const size=ver*4+17;
const m=makeMatrix(ver);
addPatterns(m,ver);

// Reserve format info areas
for(let i=0;i<8;i++){if(m[8][i]===-1)m[8][i]=-2;if(m[i][8]===-1)m[i][8]=-2}
if(m[8][7]===-1)m[8][7]=-2;if(m[8][8]===-1)m[8][8]=-2;if(m[7][8]===-1)m[7][8]=-2;
for(let i=0;i<8;i++){if(m[8][size-8+i]===-1)m[8][size-8+i]=-2;if(m[size-1-i][8]===-1)m[size-1-i][8]=-2}

const dataBytes=encodeData(text,ver);
const ecLen=EC_CODEWORDS[ver];
const ecBytes=rsEncode(dataBytes,ecLen);

// Place data bits
const allBits=[];
for(const b of [...dataBytes,...ecBytes])for(let i=7;i>=0;i--)allBits.push((b>>i)&1);

let bitIdx=0;
for(let right=size-1;right>=1;right-=2){
if(right===6)right=5;
const upward=((size-1-right+(right<6?1:0))/2)%2!==0;
for(let vert=0;vert<size;vert++){
const row=upward?vert:(size-1-vert);
for(let j=0;j<2;j++){
const col=right-j;
if(m[row][col]===-1){
m[row][col]=bitIdx<allBits.length?allBits[bitIdx]:0;
bitIdx++;
}
}
}
}

// Restore format reserved to -1
for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(m[r][c]===-2)m[r][c]=-1;

// Store pattern info for masking
const pattern=makeMatrix(ver);
addPatterns(pattern,ver);

// Apply mask 0 to data modules
const result=m.map(r=>[...r]);
for(let r=0;r<size;r++)for(let c=0;c<size;c++){
if(result[r][c]===-1)result[r][c]=0;
}
for(let r=0;r<size;r++)for(let c=0;c<size;c++){
if(pattern[r][c]===-1){
if((r+c)%2===0)result[r][c]^=1;
}
}

// Add format info for mask 0, ECC L
addFormatBits(result,0);

return{modules:result,size:size};
}

return{generate:generate};
})();

function generateQR(){
const text=document.getElementById('qrInput').value.trim();
const size=parseInt(document.getElementById('qrSize').value)||300;
document.getElementById('sizeLabel').textContent=size+'px';

const canvas=document.getElementById('qrCanvas');
const ctx=canvas.getContext('2d');

if(!text){
canvas.width=size;canvas.height=size;
ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);
ctx.fillStyle='#888';ctx.font='14px sans-serif';ctx.textAlign='center';
ctx.fillText('Enter text above to generate QR code',size/2,size/2);
return;
}

const qr=QR.generate(text);
if(!qr){
canvas.width=size;canvas.height=size;
ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);
ctx.fillStyle='#c00';ctx.font='14px sans-serif';ctx.textAlign='center';
ctx.fillText('Text too long for QR encoding',size/2,size/2);
return;
}

const quiet=4;
const totalMods=qr.size+quiet*2;
canvas.width=size;canvas.height=size;
const cellSize=size/totalMods;
ctx.fillStyle='#ffffff';ctx.fillRect(0,0,size,size);
ctx.fillStyle='#000000';

for(let r=0;r<qr.size;r++){
for(let c=0;c<qr.size;c++){
if(qr.modules[r][c]===1){
ctx.fillRect(Math.floor((c+quiet)*cellSize),Math.floor((r+quiet)*cellSize),Math.ceil(cellSize),Math.ceil(cellSize));
}
}
}
}

function downloadQR(){
const canvas=document.getElementById('qrCanvas');
const link=document.createElement('a');
link.download='qr-code.png';
link.href=canvas.toDataURL('image/png');
link.click();
}

function saveToHistory(){
const text=document.getElementById('qrInput').value.trim();
if(!text)return;
if(history.some(h=>h.text===text))return;
history.unshift({id:Date.now(),date:new Date().toLocaleDateString(),text:text});
save();renderHistory();
}

function loadFromHistory(id){
const h=history.find(x=>x.id===id);
if(!h)return;
document.getElementById('qrInput').value=h.text;
generateQR();
}

function removeEntry(id){history=history.filter(h=>h.id!==id);save();renderHistory()}
function clearHistory(){if(!confirm('Clear all QR code history?'))return;history=[];save();renderHistory()}

function renderHistory(){
const list=document.getElementById('historyList');
if(!history.length){list.innerHTML='<div class="empty">No QR codes generated yet.</div>';return}
list.innerHTML=history.map(h=>`<div class="history-item" onclick="loadFromHistory(${h.id})">
<div><div class="info">${esc(h.text.length>60?h.text.substring(0,60)+'...':h.text)}</div>
<div class="date">${esc(h.date)}</div></div>
<button class="danger" onclick="event.stopPropagation();removeEntry(${h.id})" style="font-size:.75rem;padding:4px 8px">&times;</button>
</div>`).join('');
}

function shareTwitter(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Free QR Code Generator - no signup needed! https://spunk.codes/exclusive/qr-code-generator.html'),'_blank')}
function shareReddit(){window.open('https://reddit.com/submit?url='+encodeURIComponent('https://spunk.codes/exclusive/qr-code-generator.html')+'&title='+encodeURIComponent('Free QR Code Generator - No External Libraries'),'_blank')}
function shareEmail(){window.open('mailto:?subject='+encodeURIComponent('QR Code Generator')+'&body='+encodeURIComponent('Generate QR codes instantly: https://spunk.codes/exclusive/qr-code-generator.html'))}
function copyLink(){navigator.clipboard.writeText('https://spunk.codes/exclusive/qr-code-generator.html').then(()=>alert('Link copied!'))}

load();renderHistory();generateQR();
</script>
