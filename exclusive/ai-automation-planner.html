let state={activeArea:null,implemented:{},filter:'all'};
function loadState(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s){state.implemented=s.implemented||{};}}catch(e){}}
function saveState(){localStorage.setItem(LS_KEY,JSON.stringify({implemented:state.implemented}))}

function getKey(areaId,idx){return areaId+'_'+idx}

function renderDashboard(){
let total=0,done=0,timeSave=0,moneySave=0;
AREAS.forEach(a=>{
a.automations.forEach((au,i)=>{
total++;
if(state.implemented[getKey(a.id,i)]){
done++;timeSave+=au.timeSave;moneySave+=au.moneySave;
}
});
});
document.getElementById('totalAuto').textContent=total;
document.getElementById('doneAuto').textContent=done;
document.getElementById('timeSaved').textContent=timeSave.toFixed(1)+' hrs';
document.getElementById('moneySaved').textContent='$'+moneySave;
const pct=total?Math.round(done/total*100):0;
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('progressText').textContent=pct+'% complete ('+done+' of '+total+' automations implemented)';
}

function renderAreas(){
const grid=document.getElementById('areaGrid');
grid.innerHTML='';
AREAS.forEach(a=>{
const doneCount=a.automations.filter((_,i)=>state.implemented[getKey(a.id,i)]).length;
const d=document.createElement('div');
d.className='area-btn'+(state.activeArea===a.id?' active':'');
d.innerHTML='<span class="icon">'+a.icon+'</span>'+esc(a.name)+'<span class="count">'+doneCount+'/'+a.automations.length+' done</span>';
d.onclick=()=>{state.activeArea=a.id;state.filter='all';render()};
grid.appendChild(d);
});
}

function renderAutomations(){
const panel=document.getElementById('autoPanel');
const list=document.getElementById('autoList');
if(!state.activeArea){panel.style.display='none';return}
panel.style.display='block';
const area=AREAS.find(a=>a.id===state.activeArea);
document.getElementById('autoTitle').textContent=area.icon+' '+area.name+' Automations';
list.innerHTML='';
area.automations.forEach((au,i)=>{
const key=getKey(area.id,i);
const isDone=!!state.implemented[key];
if(state.filter==='done'&&!isDone)return;
if(state.filter==='todo'&&isDone)return;
const card=document.createElement('div');
card.className='auto-card'+(isDone?' implemented':'');
let stepsHTML='<ol>';
au.steps.forEach(s=>{stepsHTML+='<li>'+esc(s)+'</li>'});
stepsHTML+='</ol>';
card.innerHTML='<h4>'+(isDone?'<span class="check">\u2713</span>':'')+esc(au.title)+'</h4><div class="meta"><span class="tool-tag">'+esc(au.tool)+'</span><span class="time-tag">Saves '+au.timeSave+' hrs/week</span>'+(au.moneySave?'<span class="time-tag" style="background:#3a3a1a;color:#ffc107">Saves $'+au.moneySave+'/mo</span>':'')+'</div><div style="display:flex;gap:8px;flex-wrap:wrap">'+(isDone?'<button class="undo-btn" onclick="toggleImpl(\''+key+'\')">Undo</button>':'<button class="done-btn" onclick="toggleImpl(\''+key+'\')">Mark Done</button>')+'<button class="toggle-steps" onclick="toggleSteps(this)">Show Steps</button></div><div class="steps">'+stepsHTML+'</div>';
list.appendChild(card);
});
if(!list.children.length){list.innerHTML='<div class="empty">No automations match this filter.</div>'}
}

function toggleImpl(key){
state.implemented[key]=!state.implemented[key];
if(!state.implemented[key])delete state.implemented[key];
saveState();render();
}

function toggleSteps(btn){
const steps=btn.parentNode.nextElementSibling;
const showing=steps.style.display==='block';
steps.style.display=showing?'none':'block';
btn.textContent=showing?'Show Steps':'Hide Steps';
}

function filterAuto(f){state.filter=f;renderAutomations()}

function render(){renderDashboard();renderAreas();renderAutomations()}
loadState();render();
</script>
