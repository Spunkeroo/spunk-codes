<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

const LS_KEY='spunkcodes_htmlentity';
let mode='encode';
let lastOutput='';

const ENTITIES=[
['&','&amp;','&#38;','&#x26;','Ampersand'],
['<','&lt;','&#60;','&#x3C;','Less than'],
['>','&gt;','&#62;','&#x3E;','Greater than'],
['"','&quot;','&#34;','&#x22;','Double quote'],
["'",'&apos;','&#39;','&#x27;','Single quote'],
[' ','&nbsp;','&#160;','&#xA0;','Non-breaking space'],
['\u00a9','&copy;','&#169;','&#xA9;','Copyright'],
['\u00ae','&reg;','&#174;','&#xAE;','Registered'],
['\u2122','&trade;','&#8482;','&#x2122;','Trademark'],
['\u00a2','&cent;','&#162;','&#xA2;','Cent'],
['\u00a3','&pound;','&#163;','&#xA3;','Pound'],
['\u00a5','&yen;','&#165;','&#xA5;','Yen'],
['\u20ac','&euro;','&#8364;','&#x20AC;','Euro'],
['\u00b0','&deg;','&#176;','&#xB0;','Degree'],
['\u00b1','&plusmn;','&#177;','&#xB1;','Plus-minus'],
['\u00d7','&times;','&#215;','&#xD7;','Multiplication'],
['\u00f7','&divide;','&#247;','&#xF7;','Division'],
['\u2013','&ndash;','&#8211;','&#x2013;','En dash'],
['\u2014','&mdash;','&#8212;','&#x2014;','Em dash'],
['\u2018','&lsquo;','&#8216;','&#x2018;','Left single quote'],
['\u2019','&rsquo;','&#8217;','&#x2019;','Right single quote'],
['\u201c','&ldquo;','&#8220;','&#x201C;','Left double quote'],
['\u201d','&rdquo;','&#8221;','&#x201D;','Right double quote'],
['\u2022','&bull;','&#8226;','&#x2022;','Bullet'],
['\u2026','&hellip;','&#8230;','&#x2026;','Ellipsis'],
['\u2190','&larr;','&#8592;','&#x2190;','Left arrow'],
['\u2191','&uarr;','&#8593;','&#x2191;','Up arrow'],
['\u2192','&rarr;','&#8594;','&#x2192;','Right arrow'],
['\u2193','&darr;','&#8595;','&#x2193;','Down arrow'],
['\u2660','&spades;','&#9824;','&#x2660;','Spade'],
['\u2663','&clubs;','&#9827;','&#x2663;','Club'],
['\u2665','&hearts;','&#9829;','&#x2665;','Heart'],
['\u2666','&diams;','&#9830;','&#x2666;','Diamond'],
['\u2714','','&#10004;','&#x2714;','Check mark'],
['\u2718','','&#10008;','&#x2718;','Cross mark'],
['\u221e','&infin;','&#8734;','&#x221E;','Infinity'],
['\u00bc','&frac14;','&#188;','&#xBC;','1/4 fraction'],
['\u00bd','&frac12;','&#189;','&#xBD;','1/2 fraction'],
['\u00be','&frac34;','&#190;','&#xBE;','3/4 fraction']
];

const namedMap={};
ENTITIES.forEach(e=>{if(e[1])namedMap[e[0]]=e[1]});

function setMode(m){
mode=m;
document.getElementById('tabEncode').className=m==='encode'?'active':'';
document.getElementById('tabDecode').className=m==='decode'?'active':'';
document.getElementById('inputLabel').textContent=m==='encode'?'Text to Encode':'HTML Entities to Decode';
document.getElementById('input').placeholder=m==='encode'?'<div class="hello">&copy; 2024</div>':'&lt;div class=&quot;hello&quot;&gt;&amp;copy; 2024&lt;/div&gt;';
convert();
}

function convert(){
const input=document.getElementById('input').value;
const output=document.getElementById('output');
if(!input){output.textContent='';document.getElementById('stats').innerHTML='';return}
let result='';
if(mode==='encode'){
const encType=document.getElementById('encodeType').value;
result=encodeText(input,encType);
}else{
result=decodeEntities(input);
}
lastOutput=result;
output.textContent=result;
const stats=document.getElementById('stats');
stats.innerHTML=`<span>Input: ${input.length} chars</span><span>Output: ${result.length} chars</span>`;
try{localStorage.setItem(LS_KEY,JSON.stringify({mode,input}))}catch(e){}
}

function encodeText(text,type){
let result='';
for(let i=0;i<text.length;i++){
const ch=text[i];
const code=ch.charCodeAt(0);
if(type==='named'&&namedMap[ch]){result+=namedMap[ch]}
else if(type==='decimal'&&(code>127||'<>&"\''.includes(ch))){result+='&#'+code+';'}
else if(type==='hex'&&(code>127||'<>&"\''.includes(ch))){result+='&#x'+code.toString(16).toUpperCase()+';'}
else if(type==='named'&&'<>&"\''.includes(ch)){
const map={'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'};
result+=map[ch]||ch;
}else{result+=ch}
}
return result;
}

function decodeEntities(text){
const ta=document.createElement('textarea');
ta.innerHTML=text;
return ta.value;
}

function swapIO(){
const input=document.getElementById('input');
input.value=lastOutput||'';
mode=mode==='encode'?'decode':'encode';
setMode(mode);
}

function clearAll(){document.getElementById('input').value='';document.getElementById('output').textContent='';document.getElementById('stats').innerHTML='';lastOutput='';try{localStorage.removeItem(LS_KEY)}catch(e){}}

function copyOutput(){
navigator.clipboard.writeText(lastOutput).then(()=>showToast('Copied!')).catch(()=>showToast('Copy failed'));
}

function renderRef(filter){
const table=document.getElementById('refTable');
const q=(filter||'').toLowerCase();
let html='<tr><th>Char</th><th>Named</th><th>Decimal</th><th>Hex</th><th>Description</th></tr>';
ENTITIES.forEach(e=>{
if(q&&!e[4].toLowerCase().includes(q)&&!e[1].toLowerCase().includes(q)&&!e[0].includes(q))return;
html+=`<tr><td class="char-preview">${esc(e[0])}</td><td>${esc(e[1]||'--')}</td><td>${esc(e[2])}</td><td>${esc(e[3])}</td><td>${esc(e[4])}</td></tr>`;
});
table.innerHTML=html;
}

function filterRef(){renderRef(document.getElementById('refSearch').value)}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

const toolURL='https://spunk.codes/exclusive/html-entity-converter.html';
function shareX(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('HTML Entity Converter - encode & decode HTML entities! '+toolURL),'_blank')}

renderRef();
try{const saved=JSON.parse(localStorage.getItem(LS_KEY));if(saved){mode=saved.mode||'encode';setMode(mode);document.getElementById('input').value=saved.input||'';convert()}}catch(e){}
</script>
