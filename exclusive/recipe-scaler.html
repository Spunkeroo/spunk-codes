<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e8e8f0;font-size:.9rem}
main{flex:1;max-width:700px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e8e8f0}button.secondary:hover{background:#3a3a4a}
button.danger{background:#cc2233}button.danger:hover{background:#aa1122}
input,select,textarea{background:#16161e;border:1px solid #2a2a3a;color:#e8e8f0;padding:8px 12px;border-radius:6px;font-size:.9rem;width:100%;font-family:inherit}
textarea{resize:vertical;min-height:60px}
.input-group{margin-bottom:16px}
.input-group label{font-size:.85rem;color:#888;margin-bottom:6px;display:block}
.serving-control{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.serving-control .count{font-size:2.2rem;font-weight:700;color:#ff5f1f;min-width:50px;text-align:center}
.serving-control button{width:44px;height:44px;border-radius:50%;font-size:1.4rem;padding:0;display:flex;align-items:center;justify-content:center}
.serving-control label{font-size:.9rem;color:#888}
.quick-scale{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.quick-scale button{padding:8px 14px;border-radius:8px;font-size:.85rem}
.quick-scale button.active{background:#ff5f1f;box-shadow:0 0 12px rgba(255,95,31,.4)}
.quick-scale button:not(.active){background:#2a2a3a;color:#e8e8f0}
.ingredient-row{display:grid;grid-template-columns:80px 80px 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.ingredient-row input,.ingredient-row select{margin:0}
.ingredient-row .scaled{background:#16161e;border:1px solid #ff5f1f;border-radius:6px;padding:8px 12px;font-size:.9rem;color:#ff5f1f;font-weight:600;text-align:center;min-width:80px}
.ingredient-header{display:grid;grid-template-columns:80px 80px 1fr auto;gap:8px;margin-bottom:8px;font-size:.8rem;color:#888}
.scaled-list{margin-top:16px}
.scaled-item{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:12px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.scaled-item .orig{color:#888;font-size:.8rem}
.scaled-item .new-amount{color:#ff5f1f;font-weight:700;font-size:1.1rem}
.recipe-list .recipe-item{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:12px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.recipe-list .recipe-item:hover{border-color:#ff5f1f}
.recipe-list .recipe-item .name{font-weight:600}
.recipe-list .recipe-item .meta{font-size:.8rem;color:#888}
.empty{text-align:center;color:#555;padding:30px;font-size:.95rem}
.share-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.share-btns button{font-size:.8rem;padding:6px 12px}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2a;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:700px){
header h1{font-size:1.1rem}
.ingredient-row{grid-template-columns:60px 70px 1fr auto}
.ingredient-header{grid-template-columns:60px 70px 1fr auto}
main{padding:16px 10px}
}
</style>
</head>
<body>
<header>
<h1>Recipe Scaler</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>
<div class="panel">
<h2>Recipe Details</h2>
<div class="input-group">
<label>Recipe Name</label>
<input type="text" id="recipeName" placeholder="My Recipe" oninput="updateScaled()">
</div>
<div class="input-group">
<label>Original Servings</label>
<input type="number" id="origServings" min="1" max="1000" value="4" oninput="updateScaled()">
</div>
</div>

<div class="panel">
<h2>Scale To</h2>
<div class="serving-control">
<button class="secondary" onclick="changeTarget(-1)">-</button>
<div class="count" id="targetCount">4</div>
<button class="secondary" onclick="changeTarget(1)">+</button>
<label>servings</label>
</div>
<div class="quick-scale">
<button onclick="scaleQuick(0.5)">&frac12;x</button>
<button class="active" onclick="scaleQuick(1)">1x</button>
<button onclick="scaleQuick(1.5)">1.5x</button>
<button onclick="scaleQuick(2)">2x</button>
<button onclick="scaleQuick(3)">3x</button>
<button onclick="scaleQuick(4)">4x</button>
</div>
</div>

<div class="panel">
<h2>Ingredients</h2>
<div class="ingredient-header">
<span>Amount</span><span>Unit</span><span>Ingredient</span><span></span>
</div>
<div id="ingredientList"></div>
<button onclick="addIngredient()" style="margin-top:10px">+ Add Ingredient</button>
</div>

<div class="panel">
<h2>Scaled Ingredients</h2>
<div id="scaledOutput"><div class="empty">Add ingredients above to see scaled amounts.</div></div>
<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
<button onclick="copyScaled()">Copy to Clipboard</button>
<button class="secondary" onclick="saveRecipe()">Save Recipe</button>
</div>
</div>

<div class="panel">
<h2>Saved Recipes</h2>
<div class="recipe-list" id="recipeList"><div class="empty">No recipes saved yet.</div></div>
<div style="margin-top:10px"><button class="danger" onclick="clearRecipes()">Clear All</button></div>
</div>

<div class="panel">
<h2>Share</h2>
<div class="share-btns">
<button onclick="shareTwitter()">Share on X</button>
<button class="secondary" onclick="copyLink()">Copy Link</button>
</div>
</div>
</main>

<footer>
<a href="https://spunk.codes">spunk.codes</a> &middot;
<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
const LS_KEY='spunkcodes_recipe_scaler';
const UNITS=['','tsp','tbsp','cup','oz','fl oz','ml','L','g','kg','lb','pinch','slice','clove','whole','can','pkg'];
let ingredients=[];
let recipes=[];
let targetServings=4;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function loadData(){
try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d){recipes=d.recipes||[];if(d.current){ingredients=d.current.ingredients||[];document.getElementById('recipeName').value=d.current.name||'';document.getElementById('origServings').value=d.current.origServings||4;targetServings=d.current.targetServings||4;document.getElementById('targetCount').textContent=targetServings}}}catch(e){}
if(!ingredients.length)ingredients=[{amount:2,unit:'cup',name:'flour'},{amount:1,unit:'cup',name:'sugar'},{amount:0.5,unit:'cup',name:'butter'},{amount:2,unit:'whole',name:'eggs'}];
renderIngredients();updateScaled();renderRecipes();
}

function saveData(){
localStorage.setItem(LS_KEY,JSON.stringify({current:{name:document.getElementById('recipeName').value,origServings:parseInt(document.getElementById('origServings').value)||4,targetServings,ingredients},recipes}));
}

function addIngredient(){ingredients.push({amount:1,unit:'',name:''});renderIngredients();updateScaled()}
function removeIngredient(i){ingredients.splice(i,1);renderIngredients();updateScaled()}

function updateIngredient(i,field,val){
if(field==='amount')ingredients[i][field]=parseFloat(val)||0;
else ingredients[i][field]=val;
saveData();updateScaled();
}

function renderIngredients(){
const list=document.getElementById('ingredientList');
list.innerHTML=ingredients.map((ing,i)=>`
<div class="ingredient-row">
<input type="number" min="0" step="0.25" value="${ing.amount}" oninput="updateIngredient(${i},'amount',this.value)">
<select onchange="updateIngredient(${i},'unit',this.value)">${UNITS.map(u=>`<option value="${u}"${ing.unit===u?' selected':''}>${u||'—'}</option>`).join('')}</select>
<input type="text" value="${esc(ing.name)}" placeholder="Ingredient" oninput="updateIngredient(${i},'name',this.value)">
<button class="danger" onclick="removeIngredient(${i})" style="font-size:.75rem;padding:4px 8px">&times;</button>
</div>`).join('');
}

function changeTarget(d){
targetServings=Math.max(1,targetServings+d);
document.getElementById('targetCount').textContent=targetServings;
document.querySelectorAll('.quick-scale button').forEach(b=>b.classList.remove('active'));
updateScaled();
}

function scaleQuick(mult){
const orig=parseInt(document.getElementById('origServings').value)||4;
targetServings=Math.max(1,Math.round(orig*mult));
document.getElementById('targetCount').textContent=targetServings;
document.querySelectorAll('.quick-scale button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
updateScaled();
}

function formatAmount(n){
if(n===0)return'0';
const fractions={0.125:'1/8',0.25:'1/4',0.333:'1/3',0.375:'3/8',0.5:'1/2',0.625:'5/8',0.667:'2/3',0.75:'3/4',0.875:'7/8'};
const whole=Math.floor(n);
const frac=n-whole;
let fracStr='';
for(const[key,val]of Object.entries(fractions)){
if(Math.abs(frac-parseFloat(key))<0.03){fracStr=val;break}
}
if(fracStr)return whole>0?whole+' '+fracStr:fracStr;
return n%1===0?n.toString():n.toFixed(2).replace(/\.?0+$/,'');
}

function updateScaled(){
const orig=parseInt(document.getElementById('origServings').value)||4;
const ratio=targetServings/orig;
const output=document.getElementById('scaledOutput');
const valid=ingredients.filter(i=>i.name.trim());
if(!valid.length){output.innerHTML='<div class="empty">Add ingredients above to see scaled amounts.</div>';return}
output.innerHTML=valid.map(ing=>{
const scaled=ing.amount*ratio;
return`<div class="scaled-item">
<div><span class="new-amount">${formatAmount(scaled)} ${esc(ing.unit)}</span> ${esc(ing.name)}</div>
<div class="orig">was ${formatAmount(ing.amount)} ${esc(ing.unit)}</div>
</div>`;
}).join('');
saveData();
}

function copyScaled(){
const orig=parseInt(document.getElementById('origServings').value)||4;
const ratio=targetServings/orig;
const name=document.getElementById('recipeName').value||'Recipe';
const valid=ingredients.filter(i=>i.name.trim());
let text=name+' (scaled to '+targetServings+' servings)\n\n';
valid.forEach(ing=>{
const scaled=ing.amount*ratio;
text+=formatAmount(scaled)+' '+(ing.unit?ing.unit+' ':'')+ing.name+'\n';
});
navigator.clipboard.writeText(text).then(()=>alert('Scaled recipe copied!'));
}

function saveRecipe(){
const name=document.getElementById('recipeName').value.trim()||'Untitled Recipe';
const orig=parseInt(document.getElementById('origServings').value)||4;
recipes.unshift({id:Date.now(),name,origServings:orig,ingredients:[...ingredients.map(i=>({...i}))]});
saveData();renderRecipes();
}

function loadRecipe(id){
const r=recipes.find(r=>r.id===id);if(!r)return;
document.getElementById('recipeName').value=r.name;
document.getElementById('origServings').value=r.origServings;
targetServings=r.origServings;
document.getElementById('targetCount').textContent=targetServings;
ingredients=r.ingredients.map(i=>({...i}));
renderIngredients();updateScaled();
}

function removeRecipe(id){recipes=recipes.filter(r=>r.id!==id);saveData();renderRecipes()}
function clearRecipes(){if(!confirm('Clear all saved recipes?'))return;recipes=[];saveData();renderRecipes()}

function renderRecipes(){
const list=document.getElementById('recipeList');
if(!recipes.length){list.innerHTML='<div class="empty">No recipes saved yet.</div>';return}
list.innerHTML=recipes.map(r=>`
<div class="recipe-item" onclick="loadRecipe(${r.id})">
<div><div class="name">${esc(r.name)}</div><div class="meta">${r.origServings} servings &middot; ${r.ingredients.length} ingredients</div></div>
<button class="danger" onclick="event.stopPropagation();removeRecipe(${r.id})" style="font-size:.75rem;padding:4px 8px">&times;</button>
</div>`).join('');
}

function shareTwitter(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Scale any recipe for any serving size! Free tool: https://spunk.codes/exclusive/recipe-scaler.html'),'_blank')}
function copyLink(){navigator.clipboard.writeText('https://spunk.codes/exclusive/recipe-scaler.html').then(()=>alert('Link copied!'))}

loadData();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
