let selectedSkills=[];
let selectedEquip=[];
let selectedRisk='medium';
let currentResults=[];
let currentSort='score';

function initChips(){
document.getElementById('skillChips').innerHTML=SKILLS.map(s=>`<div class="chip" data-val="${s}" onclick="toggleChip(this,'skill')">${esc(s.replace('-',' '))}</div>`).join('');
document.getElementById('equipChips').innerHTML=EQUIPMENT.map(e=>`<div class="chip" data-val="${e}" onclick="toggleChip(this,'equip')">${esc(e)}</div>`).join('');
document.getElementById('riskChips').innerHTML=RISKS.map(r=>`<div class="chip${r===selectedRisk?' active':''}" data-val="${r}" onclick="toggleRisk(this)">${esc(r)} risk</div>`).join('');
}

function toggleChip(el,type){
el.classList.toggle('active');
const val=el.dataset.val;
if(type==='skill'){
if(selectedSkills.includes(val))selectedSkills=selectedSkills.filter(s=>s!==val);
else selectedSkills.push(val);
}else{
if(selectedEquip.includes(val))selectedEquip=selectedEquip.filter(e=>e!==val);
else selectedEquip.push(val);
}
}

function toggleRisk(el){
document.querySelectorAll('#riskChips .chip').forEach(c=>c.classList.remove('active'));
el.classList.add('active');
selectedRisk=el.dataset.val;
}

function findMatches(){
const hours=parseInt(document.getElementById('hoursRange').value);
const incomeGoal=parseInt(document.getElementById('incomeRange').value);

currentResults=HUSTLES.map(h=>{
let score=0;
const skillMatch=h.skills.filter(s=>selectedSkills.includes(s)).length;
const skillTotal=h.skills.length;
score+=skillTotal>0?(skillMatch/skillTotal)*40:20;

const equipMatch=h.equip.filter(e=>selectedEquip.includes(e)).length;
const equipTotal=h.equip.length;
score+=equipTotal>0?(equipMatch/equipTotal)*20:10;

const avgIncome=(h.income[0]+h.income[1])/2;
if(avgIncome>=incomeGoal)score+=20;
else score+=(avgIncome/incomeGoal)*20;

const riskMap={low:0,medium:1,high:2};
const hustleRisk=riskMap[h.risk]||1;
const userRisk=riskMap[selectedRisk]||1;
if(hustleRisk<=userRisk)score+=10;
else score+=5;

if(hours>=20)score+=10;
else if(hours>=10)score+=7;
else score+=4;

return{...h,score:Math.round(Math.min(score,100))};
}).filter(h=>h.score>25);

currentSort='score';
sortAndRender();
saveState();

document.getElementById('resultsPanel').style.display='block';
document.getElementById('resultsPanel').scrollIntoView({behavior:'smooth'});
}

function sortResults(by){
currentSort=by;
document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort===by));
sortAndRender();
}

function sortAndRender(){
const sorted=[...currentResults];
if(currentSort==='score')sorted.sort((a,b)=>b.score-a.score);
else if(currentSort==='income')sorted.sort((a,b)=>b.income[1]-a.income[1]);
else if(currentSort==='startup')sorted.sort((a,b)=>a.startup-b.startup);
else if(currentSort==='speed')sorted.sort((a,b)=>a.speed.localeCompare(b.speed));

document.getElementById('matchCount').textContent='('+sorted.length+' matches)';
const el=document.getElementById('resultsList');
if(!sorted.length){el.innerHTML='<div class="no-results">No matches found. Try adjusting your skills or income goal.</div>';return}

el.innerHTML=sorted.map(h=>`<div class="hustle-card">
<div class="match-score">${h.score}% Match</div>
<div class="title">${esc(h.name)}</div>
<div class="desc">${esc(h.desc)}</div>
<div class="hustle-meta">
<div class="meta-item"><div class="meta-val">$${h.income[0]}-$${h.income[1]}</div><div class="meta-lbl">Monthly Income</div></div>
<div class="meta-item"><div class="meta-val">${h.startup===0?'Free':'$'+h.startup}</div><div class="meta-lbl">Startup Cost</div></div>
<div class="meta-item"><div class="meta-val">${esc(h.speed)}</div><div class="meta-lbl">Time to First $</div></div>
<div class="meta-item"><div class="meta-val">${esc(h.risk)}</div><div class="meta-lbl">Risk Level</div></div>
</div>
<div class="ai-tools">
<h4>AI Tools That Help</h4>
${h.aiTools.map(t=>`<div class="ai-tool-item">&#8226; ${esc(t)}</div>`).join('')}
</div>
<div class="steps hidden" id="steps-${h.id}">
<h4>Step-by-Step Start Guide</h4>
${h.steps.map(s=>`<div class="step-item">${esc(s)}</div>`).join('')}
</div>
<button class="expand-btn" onclick="toggleSteps('${h.id}',this)">Show Start Guide</button>
</div>`).join('');
}

function toggleSteps(id,btn){
const el=document.getElementById('steps-'+id);
if(el.classList.contains('hidden')){el.classList.remove('hidden');btn.textContent='Hide Start Guide'}
else{el.classList.add('hidden');btn.textContent='Show Start Guide'}
}

initChips();
}

function saveState(){localStorage.setItem(LS_KEY,JSON.stringify({skills:selectedSkills,equip:selectedEquip,risk:selectedRisk,hours:document.getElementById('hoursRange').value,income:document.getElementById('incomeRange').value}))}
function loadState(){try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d){selectedSkills=d.skills||[];selectedEquip=d.equip||[];selectedRisk=d.risk||'medium';if(d.hours){document.getElementById('hoursRange').value=d.hours;document.getElementById('hoursVal').textContent=d.hours+'h/week'}if(d.income){document.getElementById('incomeRange').value=d.income;document.getElementById('incomeVal').textContent='$'+d.income+'/mo'}}}catch(e){}}

loadState();
initChips();
if(selectedSkills.length||selectedEquip.length){
document.querySelectorAll('#skillChips .chip').forEach(c=>{if(selectedSkills.includes(c.dataset.val))c.classList.add('active')});
document.querySelectorAll('#equipChips .chip').forEach(c=>{if(selectedEquip.includes(c.dataset.val))c.classList.add('active')});
document.querySelectorAll('#riskChips .chip').forEach(c=>{c.classList.toggle('active',c.dataset.val===selectedRisk)});
}
</script>
