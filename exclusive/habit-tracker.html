<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e8e8f0;font-size:.9rem}
main{flex:1;max-width:700px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e8e8f0}button.secondary:hover{background:#3a3a4a}
button.danger{background:#cc2233}button.danger:hover{background:#aa1122}
input,select{background:#16161e;border:1px solid #2a2a3a;color:#e8e8f0;padding:8px 12px;border-radius:6px;font-size:.9rem;width:100%;font-family:inherit}
.input-group{margin-bottom:16px}
.input-group label{font-size:.85rem;color:#888;margin-bottom:6px;display:block}
.add-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.add-form .input-group{flex:1;min-width:150px;margin-bottom:0}
.add-form select{width:auto;min-width:100px}
.habit-card{background:#16161e;border:1px solid #2a2a3a;border-radius:10px;padding:16px;margin-bottom:12px}
.habit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.habit-name{font-size:1rem;font-weight:600;color:#e8e8f0}
.habit-freq{font-size:.75rem;color:#888;background:#2a2a3a;padding:2px 8px;border-radius:4px}
.habit-stats{display:flex;gap:16px;margin-bottom:12px;font-size:.8rem}
.habit-stats .stat{text-align:center}
.habit-stats .stat .val{font-size:1.2rem;color:#ff5f1f;font-weight:700}
.habit-stats .stat .lbl{color:#888;margin-top:2px}
.week-row{display:flex;gap:6px;margin-bottom:10px}
.day-btn{width:36px;height:36px;border-radius:6px;border:1px solid #2a2a3a;background:#1a1a2a;color:#888;font-size:.65rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s}
.day-btn.done{background:#ff5f1f;color:#fff;border-color:#ff5f1f}
.day-btn.today{border-color:#ff5f1f;box-shadow:0 0 6px rgba(255,95,31,.3)}
.day-btn .dn{font-size:.55rem;margin-top:1px}
.heat-map{margin-top:10px}
.heat-label{font-size:.75rem;color:#888;margin-bottom:6px}
.heat-grid{display:flex;gap:2px;flex-wrap:wrap}
.heat-cell{width:14px;height:14px;border-radius:2px;background:#1a1a2a}
.heat-cell.l1{background:#3a2010}
.heat-cell.l2{background:#6a3518}
.heat-cell.l3{background:#cc5520}
.heat-cell.l4{background:#ff5f1f}
.heat-months{display:flex;gap:2px;margin-bottom:4px;font-size:.6rem;color:#555}
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.overview-card{background:#16161e;border:1px solid #2a2a3a;border-radius:10px;padding:16px;text-align:center}
.overview-card .value{font-size:1.5rem;color:#ff5f1f;font-weight:700}
.overview-card .label{font-size:.78rem;color:#888;margin-top:4px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.empty{text-align:center;color:#555;padding:30px;font-size:.9rem}
.share-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.share-btns button{font-size:.8rem;padding:6px 12px}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2a;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:700px){
.overview-grid{grid-template-columns:1fr 1fr}
header h1{font-size:1.1rem}
.week-row{gap:4px}
.day-btn{width:32px;height:32px;font-size:.6rem}
}

<body>
<header>
<h1>Daily Habit Tracker</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>
<div class="panel">
<h2>Add New Habit</h2>
<div class="add-form">
<div class="input-group"><label>Habit Name</label><input type="text" id="newHabitName" placeholder="e.g., Exercise, Read, Meditate"></div>
<div class="input-group"><label>Target</label>
<select id="newHabitFreq">
<option value="daily">Daily</option>
<option value="5x">5x / week</option>
<option value="3x">3x / week</option>
<option value="weekdays">Weekdays</option>
</select>
</div>
<button onclick="addHabit()">Add</button>
</div>
</div>

<div class="panel">
<h2>Overview</h2>
<div class="overview-grid" id="overviewGrid">
<div class="overview-card"><div class="value" id="totalHabits">0</div><div class="label">Active Habits</div></div>
<div class="overview-card"><div class="value" id="todayDone">0</div><div class="label">Done Today</div></div>
<div class="overview-card"><div class="value" id="bestStreak">0</div><div class="label">Best Streak</div></div>
</div>
</div>

<div class="panel">
<h2>Today — <span id="todayDate"></span></h2>
<div id="habitsList"><div class="empty">No habits yet. Add one above to get started!</div></div>
</div>

<div class="panel">
<h2>Share</h2>
<div class="share-btns">
<button onclick="shareX()">Share on X</button>
<button class="secondary" onclick="shareReddit()">Share on Reddit</button>
<button class="secondary" onclick="shareEmail()">Email</button>
<button class="secondary" onclick="copyLink()">Copy Link</button>
</div>
</div>
</main>

<footer>
<a href="https://spunk.codes">spunk.codes</a> &middot;
<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
const LS_KEY='spunkcodes_habit_tracker';
let habits=[];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function todayStr(){return new Date().toISOString().split('T')[0]}
function dateStr(d){return d.toISOString().split('T')[0]}

function load(){try{habits=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){habits=[]}}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(habits))}catch(e){}}

function addHabit(){
const name=document.getElementById('newHabitName').value.trim();
const freq=document.getElementById('newHabitFreq').value;
if(!name){alert('Enter a habit name');return}
habits.push({id:Date.now(),name:name,freq:freq,completions:{},created:todayStr()});
document.getElementById('newHabitName').value='';
save();render();
}

function deleteHabit(id){
if(!confirm('Delete this habit and all its data?'))return;
habits=habits.filter(h=>h.id!==id);
save();render();
}

function toggleDay(habitId,date){
const habit=habits.find(h=>h.id===habitId);
if(!habit)return;
if(!habit.completions)habit.completions={};
if(habit.completions[date])delete habit.completions[date];
else habit.completions[date]=true;
save();render();
}

function getStreak(habit){
let streak=0;
const d=new Date();
for(let i=0;i<365;i++){
const ds=dateStr(d);
if(habit.completions&&habit.completions[ds])streak++;
else if(i>0)break;
else{break}
d.setDate(d.getDate()-1);
}
return streak;
}

function getLongestStreak(habit){
if(!habit.completions)return 0;
const dates=Object.keys(habit.completions).sort();
if(!dates.length)return 0;
let longest=1,current=1;
for(let i=1;i<dates.length;i++){
const prev=new Date(dates[i-1]);
const curr=new Date(dates[i]);
const diff=(curr-prev)/(1000*60*60*24);
if(diff===1){current++;longest=Math.max(longest,current)}
else{current=1}
}
return longest;
}

function getWeekCompletion(habit){
const today=new Date();
const dow=today.getDay();
const startOfWeek=new Date(today);
startOfWeek.setDate(today.getDate()-dow);
let done=0,total=7;
for(let i=0;i<7;i++){
const d=new Date(startOfWeek);
d.setDate(startOfWeek.getDate()+i);
if(habit.completions&&habit.completions[dateStr(d)])done++;
}
return{done,total};
}

function getMonthCompletion(habit){
const today=new Date();
const y=today.getFullYear();
const m=today.getMonth();
const daysInMonth=new Date(y,m+1,0).getDate();
let done=0;
for(let i=1;i<=daysInMonth;i++){
const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(i).padStart(2,'0');
if(habit.completions&&habit.completions[ds])done++;
}
return{done,total:daysInMonth};
}

function buildWeekRow(habit){
const today=new Date();
const dow=today.getDay();
const startOfWeek=new Date(today);
startOfWeek.setDate(today.getDate()-dow);
const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
let html='<div class="week-row">';
for(let i=0;i<7;i++){
const d=new Date(startOfWeek);
d.setDate(startOfWeek.getDate()+i);
const ds=dateStr(d);
const isToday=ds===todayStr();
const isDone=habit.completions&&habit.completions[ds];
html+=`<div class="day-btn${isDone?' done':''}${isToday?' today':''}" onclick="toggleDay(${habit.id},'${ds}')"><span>${days[i]}</span><span class="dn">${d.getDate()}</span></div>`;
}
html+='</div>';
return html;
}

function buildHeatMap(habit){
const today=new Date();
const cells=[];
// last 90 days
for(let i=89;i>=0;i--){
const d=new Date(today);
d.setDate(today.getDate()-i);
const ds=dateStr(d);
const done=habit.completions&&habit.completions[ds];
let level='';
if(done)level=' l4';
cells.push(`<div class="heat-cell${level}" title="${ds}"></div>`);
}
return`<div class="heat-map"><div class="heat-label">Last 90 Days</div><div class="heat-grid">${cells.join('')}</div></div>`;
}

function render(){
document.getElementById('todayDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

const list=document.getElementById('habitsList');
if(!habits.length){
list.innerHTML='<div class="empty">No habits yet. Add one above to get started!</div>';
document.getElementById('totalHabits').textContent='0';
document.getElementById('todayDone').textContent='0';
document.getElementById('bestStreak').textContent='0';
return;
}

let todayDoneCount=0;
let globalBest=0;

list.innerHTML=habits.map(h=>{
const streak=getStreak(h);
const longest=getLongestStreak(h);
const week=getWeekCompletion(h);
const month=getMonthCompletion(h);
const totalDone=Object.keys(h.completions||{}).length;
const isDoneToday=h.completions&&h.completions[todayStr()];
if(isDoneToday)todayDoneCount++;
if(longest>globalBest)globalBest=longest;
const freqLabel={daily:'Daily','5x':'5x/week','3x':'3x/week',weekdays:'Weekdays'}[h.freq]||h.freq;

return`<div class="habit-card">
<div class="habit-header">
<div>
<span class="habit-name">${esc(h.name)}</span>
<span class="habit-freq">${freqLabel}</span>
</div>
<div class="btn-row">
<button class="${isDoneToday?'secondary':''}" onclick="toggleDay(${h.id},'${todayStr()}')" style="font-size:.8rem;padding:6px 12px">${isDoneToday?'Undo':'Done!'}</button>
<button class="danger" onclick="deleteHabit(${h.id})" style="font-size:.75rem;padding:4px 8px">&times;</button>
</div>
</div>
<div class="habit-stats">
<div class="stat"><div class="val">${streak}</div><div class="lbl">Current Streak</div></div>
<div class="stat"><div class="val">${longest}</div><div class="lbl">Best Streak</div></div>
<div class="stat"><div class="val">${week.done}/${week.total}</div><div class="lbl">This Week</div></div>
<div class="stat"><div class="val">${month.done}/${month.total}</div><div class="lbl">This Month</div></div>
<div class="stat"><div class="val">${totalDone}</div><div class="lbl">Total</div></div>
</div>
${buildWeekRow(h)}
${buildHeatMap(h)}
</div>`;
}).join('');

document.getElementById('totalHabits').textContent=habits.length;
document.getElementById('todayDone').textContent=todayDoneCount;
document.getElementById('bestStreak').textContent=globalBest;
}

const toolURL='https://spunk.codes/exclusive/habit-tracker.html';
function shareX(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Track your habits and build streaks! Free tool: '+toolURL),'_blank')}
function shareReddit(){window.open('https://reddit.com/submit?url='+encodeURIComponent(toolURL)+'&title='+encodeURIComponent('Daily Habit Tracker - Free Tool'),'_blank')}
function shareEmail(){window.location.href='mailto:?subject='+encodeURIComponent('Daily Habit Tracker')+'&body='+encodeURIComponent('Check this out: '+toolURL)}
function copyLink(){navigator.clipboard.writeText(toolURL).then(()=>alert('Link copied!'))}

load();render();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
