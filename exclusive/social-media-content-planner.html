<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff5f1f;text-decoration:none}a:hover{text-decoration:underline}
header{background:#111118;border-bottom:2px solid #ff5f1f;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:1.4rem;color:#ff5f1f}
header .back{color:#e8e8f0;font-size:.9rem}
main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:24px 16px}
.panel{background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:20px;margin-bottom:20px}
.panel h2{font-size:1.1rem;color:#ff5f1f;margin-bottom:14px}
button{background:#ff5f1f;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
button:hover{background:#e8520e}
button.secondary{background:#2a2a3a;color:#e8e8f0}button.secondary:hover{background:#3a3a4a}
button.danger{background:#cc2233}button.danger:hover{background:#aa1a28}
select,input,textarea{background:#16161e;border:1px solid #2a2a3a;color:#e8e8f0;padding:8px 12px;border-radius:6px;font-size:.9rem;font-family:inherit}
textarea{resize:vertical;width:100%}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.tri{grid-template-columns:1fr 1fr 1fr}
.form-row label{font-size:.8rem;color:#888;margin-bottom:4px;display:block}
.form-row .field{display:flex;flex-direction:column}
.form-row .field select,.form-row .field input{width:100%}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.nav-row .week-label{font-size:1.1rem;font-weight:600;color:#e8e8f0}
.view-toggle{display:flex;gap:4px}
.view-toggle button{padding:6px 12px;font-size:.8rem}
.view-toggle button.active{background:#ff5f1f}
.view-toggle button:not(.active){background:#2a2a3a;color:#e8e8f0}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-header{background:#1a1a2e;padding:8px 4px;text-align:center;font-size:.75rem;color:#888;border-radius:4px;font-weight:600}
.cal-day{background:#16161e;border:1px solid #2a2a3a;border-radius:6px;min-height:100px;padding:6px;position:relative;cursor:pointer;transition:border-color .2s}
.cal-day:hover{border-color:#ff5f1f}
.cal-day.today{border-color:#ff5f1f}
.cal-day.other-month{opacity:.4}
.cal-day .day-num{font-size:.75rem;color:#888;margin-bottom:4px}
.cal-day .post-chip{font-size:.65rem;padding:2px 5px;border-radius:3px;margin-bottom:2px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:block}
.plat-twitter{background:#1d9bf0}
.plat-instagram{background:#e1306c}
.plat-linkedin{background:#0077b5}
.plat-tiktok{background:#ff0050}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:10px;text-align:center}
.stat-card .num{font-size:1.3rem;font-weight:700}
.stat-card .lbl{font-size:.7rem;color:#888;margin-top:2px}
.stat-card.tw .num{color:#1d9bf0}
.stat-card.ig .num{color:#e1306c}
.stat-card.li .num{color:#0077b5}
.stat-card.tk .num{color:#ff0050}
.stat-card.all .num{color:#ff5f1f}
.stat-card.done .num{color:#22cc66}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.legend span{font-size:.75rem;display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.post-detail{background:#0a0a0f;border:1px solid #2a2a3a;border-radius:8px;padding:16px;margin-top:10px}
.post-detail h3{font-size:.95rem;color:#ff5f1f;margin-bottom:8px}
.post-detail .meta{font-size:.8rem;color:#888;margin-bottom:6px}
.post-detail .caption{font-size:.85rem;color:#e8e8f0;white-space:pre-wrap}
.posted-badge{display:inline-block;background:#22cc66;color:#000;font-size:.65rem;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:700}
.empty{color:#555;text-align:center;padding:30px}
footer{text-align:center;padding:20px;color:#555;font-size:.8rem;border-top:1px solid #1a1a2a;margin-top:auto}
footer a{color:#ff5f1f;margin:0 4px}
@media(max-width:700px){
.form-row,.form-row.tri{grid-template-columns:1fr}
.calendar{grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:60px;padding:3px}
.cal-day .post-chip{font-size:.55rem;padding:1px 3px}
.cal-day .day-num{font-size:.65rem}
header h1{font-size:1.1rem}
.stats-row{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>
<header>
<h1>Social Media Content Planner</h1>
<a href="https://spunk.codes" class="back">spunk.codes</a>
</header>
<main>
<div class="panel">
<h2>Add Post</h2>
<div class="form-row tri">
<div class="field"><label>Platform</label>
<select id="postPlatform">
<option value="twitter">X / Twitter</option>
<option value="instagram">Instagram</option>
<option value="linkedin">LinkedIn</option>
<option value="tiktok">TikTok</option>
</select>
</div>
<div class="field"><label>Post Type</label>
<select id="postType">
<option value="text">Text</option>
<option value="image">Image</option>
<option value="video">Video</option>
<option value="story">Story</option>
<option value="reel">Reel</option>
<option value="carousel">Carousel</option>
</select>
</div>
<div class="field"><label>Date &amp; Time</label><input type="datetime-local" id="postDate"></div>
</div>
<div class="form-row" style="grid-template-columns:1fr">
<div class="field"><label>Caption / Content</label><textarea id="postCaption" rows="3" placeholder="Write your post content..."></textarea></div>
</div>
<div class="form-row" style="grid-template-columns:1fr">
<div class="field"><label>Notes (optional)</label><input type="text" id="postNotes" placeholder="e.g. Use product photo, include CTA"></div>
</div>
<div class="btn-row">
<button onclick="addPost()">Add Post</button>
</div>
</div>

<div class="panel">
<h2>Overview</h2>
<div class="stats-row">
<div class="stat-card all"><div class="num" id="statAll">0</div><div class="lbl">Total</div></div>
<div class="stat-card tw"><div class="num" id="statTw">0</div><div class="lbl">X/Twitter</div></div>
<div class="stat-card ig"><div class="num" id="statIg">0</div><div class="lbl">Instagram</div></div>
<div class="stat-card li"><div class="num" id="statLi">0</div><div class="lbl">LinkedIn</div></div>
<div class="stat-card tk"><div class="num" id="statTk">0</div><div class="lbl">TikTok</div></div>
<div class="stat-card done"><div class="num" id="statDone">0</div><div class="lbl">Posted</div></div>
</div>
<div class="legend">
<span><span class="dot plat-twitter"></span> X/Twitter</span>
<span><span class="dot plat-instagram"></span> Instagram</span>
<span><span class="dot plat-linkedin"></span> LinkedIn</span>
<span><span class="dot plat-tiktok"></span> TikTok</span>
</div>
</div>

<div class="panel">
<h2>Calendar</h2>
<div class="nav-row">
<div>
<button class="secondary" onclick="navMonth(-1)" style="padding:6px 10px">&laquo;</button>
<span class="week-label" id="monthLabel"></span>
<button class="secondary" onclick="navMonth(1)" style="padding:6px 10px">&raquo;</button>
</div>
<div class="btn-row">
<button class="secondary" onclick="navToday()" style="padding:6px 10px;font-size:.8rem">Today</button>
</div>
</div>
<div class="calendar" id="calGrid"></div>
</div>

<div class="panel" id="detailPanel" style="display:none">
<h2>Post Details</h2>
<div id="postDetail"></div>
</div>

<div class="panel">
<h2>Actions</h2>
<div class="btn-row">
<button onclick="exportPlan()">Export as JSON</button>
<button class="secondary" onclick="clearAll()">Clear All Posts</button>
</div>
</div>
</main>

<footer>
<a href="https://spunk.codes">spunk.codes</a> &middot;
<a href="https://spunk.bet">spunk.bet</a> &middot;
<a href="https://spunk.pics">spunk.pics</a> &middot;
<a href="https://spunk.work">spunk.work</a> &middot;
<a href="https://spunkart.com">SpunkArt.com</a>
</footer>

<script>
const LS_KEY='spunkcodes_social_planner';
let posts=[];
let viewYear,viewMonth;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function addPost(){
const platform=document.getElementById('postPlatform').value;
const type=document.getElementById('postType').value;
const dateVal=document.getElementById('postDate').value;
const caption=document.getElementById('postCaption').value.trim();
const notes=document.getElementById('postNotes').value.trim();
if(!dateVal){alert('Please select a date and time.');return}
if(!caption){alert('Please enter caption/content.');return}
posts.push({id:genId(),platform,type,date:dateVal,caption,notes,posted:false});
save();
document.getElementById('postCaption').value='';
document.getElementById('postNotes').value='';
renderCalendar();
updateStats();
}

function removePost(id){
posts=posts.filter(p=>p.id!==id);
save();renderCalendar();updateStats();
document.getElementById('detailPanel').style.display='none';
}

function togglePosted(id){
const p=posts.find(x=>x.id===id);
if(p)p.posted=!p.posted;
save();renderCalendar();updateStats();showDetail(id);
}

function save(){localStorage.setItem(LS_KEY,JSON.stringify(posts))}
function load(){try{posts=JSON.parse(localStorage.getItem(LS_KEY))||[]}catch(e){posts=[]}}

function updateStats(){
document.getElementById('statAll').textContent=posts.length;
document.getElementById('statTw').textContent=posts.filter(p=>p.platform==='twitter').length;
document.getElementById('statIg').textContent=posts.filter(p=>p.platform==='instagram').length;
document.getElementById('statLi').textContent=posts.filter(p=>p.platform==='linkedin').length;
document.getElementById('statTk').textContent=posts.filter(p=>p.platform==='tiktok').length;
document.getElementById('statDone').textContent=posts.filter(p=>p.posted).length;
}

function platClass(p){return'plat-'+p}
function platLabel(p){return{twitter:'X',instagram:'IG',linkedin:'LI',tiktok:'TT'}[p]||p}

function renderCalendar(){
const grid=document.getElementById('calGrid');
const first=new Date(viewYear,viewMonth,1);
const last=new Date(viewYear,viewMonth+1,0);
const startDay=first.getDay();
const daysInMonth=last.getDate();
const today=new Date();
const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('monthLabel').textContent=months[viewMonth]+' '+viewYear;

let html='';
['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{html+=`<div class="cal-header">${d}</div>`});

const prevLast=new Date(viewYear,viewMonth,0).getDate();
for(let i=startDay-1;i>=0;i--){
html+=`<div class="cal-day other-month"><div class="day-num">${prevLast-i}</div></div>`;
}

for(let d=1;d<=daysInMonth;d++){
const dateStr=viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
const isToday=dateStr===todayStr;
const dayPosts=posts.filter(p=>p.date.startsWith(dateStr));
html+=`<div class="cal-day${isToday?' today':''}">`;
html+=`<div class="day-num">${d}</div>`;
dayPosts.slice(0,4).forEach(p=>{
html+=`<span class="post-chip ${platClass(p.platform)}${p.posted?' posted':''}" onclick="showDetail('${p.id}')" title="${esc(p.caption.substring(0,60))}">${platLabel(p.platform)}: ${esc(p.caption.substring(0,15))}${p.posted?'<span class="posted-badge">DONE</span>':''}</span>`;
});
if(dayPosts.length>4)html+=`<span style="font-size:.6rem;color:#888">+${dayPosts.length-4} more</span>`;
html+=`</div>`;
}

const totalCells=startDay+daysInMonth;
const remaining=totalCells%7===0?0:7-(totalCells%7);
for(let i=1;i<=remaining;i++){
html+=`<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
}

grid.innerHTML=html;
}

function showDetail(id){
const p=posts.find(x=>x.id===id);
if(!p)return;
const panel=document.getElementById('detailPanel');
panel.style.display='block';
const dt=new Date(p.date);
const el=document.getElementById('postDetail');
el.innerHTML=`<div class="post-detail">
<h3><span class="post-chip ${platClass(p.platform)}" style="display:inline;font-size:.8rem;padding:3px 8px">${esc(platLabel(p.platform))}</span> ${esc(p.type)}${p.posted?'<span class="posted-badge">POSTED</span>':''}</h3>
<div class="meta">${dt.toLocaleString()}</div>
<div class="caption">${esc(p.caption)}</div>
${p.notes?'<div class="meta" style="margin-top:8px">Notes: '+esc(p.notes)+'</div>':''}
<div class="btn-row" style="margin-top:12px">
<button onclick="togglePosted('${p.id}')">${p.posted?'Mark Unposted':'Mark as Posted'}</button>
<button class="danger" onclick="removePost('${p.id}')">Delete</button>
</div>
</div>`;
panel.scrollIntoView({behavior:'smooth'});
}

function navMonth(dir){viewMonth+=dir;if(viewMonth>11){viewMonth=0;viewYear++}if(viewMonth<0){viewMonth=11;viewYear--}renderCalendar()}
function navToday(){const t=new Date();viewYear=t.getFullYear();viewMonth=t.getMonth();renderCalendar()}

function exportPlan(){
const json=JSON.stringify(posts,null,2);
const blob=new Blob([json],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;a.download='social-media-plan.json';a.click();URL.revokeObjectURL(url);
}

function clearAll(){
if(!posts.length)return;
if(!confirm('Clear all posts?'))return;
posts=[];save();renderCalendar();updateStats();
document.getElementById('detailPanel').style.display='none';
}

function init(){
load();
const now=new Date();
viewYear=now.getFullYear();viewMonth=now.getMonth();
const dtInput=document.getElementById('postDate');
dtInput.value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'T09:00';
renderCalendar();
updateStats();
}

init();
</script>
<script src="https://spunk.codes/cross-promo.js" defer></script>
</body>
</html>
