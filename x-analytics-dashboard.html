<div class="container">
<h1>X Analytics <span>Dashboard</span></h1>
<p class="subtitle">Track your X/Twitter growth manually with visual insights and trend analysis</p>

<div class="row-4" id="topStats"></div>

<div class="glass-card" style="margin-top:20px;">
<div class="card-title">Log Today's Stats</div>
<div class="row-4" style="margin-bottom:16px;">
<div><label>Date</label><input type="date" id="logDate"></div>
<div><label>Followers</label><input type="number" id="logFollowers" placeholder="0"></div>
<div><label>Impressions</label><input type="number" id="logImpressions" placeholder="0"></div>
<div><label>Engagements</label><input type="number" id="logEngagements" placeholder="0"></div>
</div>
<div class="row-4" style="margin-bottom:16px;">
<div><label>Likes</label><input type="number" id="logLikes" placeholder="0"></div>
<div><label>Retweets</label><input type="number" id="logRetweets" placeholder="0"></div>
<div><label>Replies</label><input type="number" id="logReplies" placeholder="0"></div>
<div><label>Profile Visits</label><input type="number" id="logVisits" placeholder="0"></div>
</div>
<button class="btn btn-primary" onclick="logEntry()">Log Entry</button>
</div>

<div class="glass-card">
<div class="card-title">Follower Growth Chart</div>
<div class="chart-area" id="followerChart"></div>
<div style="height:24px;"></div>
</div>

<div class="glass-card">
<div class="card-title">Growth Insights</div>
<div id="insights"></div>
</div>

<div class="glass-card">
<div class="card-title">History Log</div>
<div style="overflow-x:auto;">
<table class="data-table">
<thead><tr><th>Date</th><th>Followers</th><th>Impressions</th><th>Engagements</th><th>Eng. Rate</th><th>Actions</th></tr></thead>
<tbody id="historyBody"></tbody>
</table>
</div>
</div>

<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;">
<button class="btn btn-secondary" onclick="exportData()">Export CSV</button>
<button class="btn btn-secondary" onclick="clearAllData()">Clear All Data</button>
</div>
</div>

<div class="watermark">SPUNK.CODES</div>
<div class="toast" id="toast"></div>
<footer><a href="/store.html">Store</a> | <a href="/blog.html">Blog</a> | <a href="https://x.com/SpunkArt13" target="_blank">@SpunkArt13 on X</a></footer>

<script>
document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='u'))e.preventDefault();});

document.getElementById('logDate').value=new Date().toISOString().split('T')[0];

function getData(){return JSON.parse(localStorage.getItem('sc_xdash_data')||'[]');}
function saveData(d){localStorage.setItem('sc_xdash_data',JSON.stringify(d));}

function logEntry(){
const entry={date:document.getElementById('logDate').value,followers:+document.getElementById('logFollowers').value||0,impressions:+document.getElementById('logImpressions').value||0,engagements:+document.getElementById('logEngagements').value||0,likes:+document.getElementById('logLikes').value||0,retweets:+document.getElementById('logRetweets').value||0,replies:+document.getElementById('logReplies').value||0,visits:+document.getElementById('logVisits').value||0};
if(!entry.date){showToast('Select a date');return;}
let data=getData();
const existIdx=data.findIndex(d=>d.date===entry.date);
if(existIdx>=0)data[existIdx]=entry;else data.push(entry);
data.sort((a,b)=>a.date.localeCompare(b.date));
saveData(data);render();showToast('Entry logged!');
}

function deleteEntry(i){const data=getData();data.splice(i,1);saveData(data);render();}

function render(){
const data=getData();
const latest=data[data.length-1]||{};
const prev=data[data.length-2]||{};
const fChange=latest.followers&&prev.followers?latest.followers-prev.followers:0;
const engRate=latest.impressions?(latest.engagements/latest.impressions*100).toFixed(2):0;
document.getElementById('topStats').innerHTML=`
<div class="stat-card"><div class="stat-val" style="color:#58a6ff;">${(latest.followers||0).toLocaleString()}</div><div class="stat-label">Followers</div><div class="stat-change" style="color:${fChange>=0?'#39d353':'#f85149'};">${fChange>=0?'+':''}${fChange}</div></div>
<div class="stat-card"><div class="stat-val" style="color:#39d353;">${(latest.impressions||0).toLocaleString()}</div><div class="stat-label">Impressions</div></div>
<div class="stat-card"><div class="stat-val" style="color:#f0883e;">${engRate}%</div><div class="stat-label">Eng. Rate</div></div>
<div class="stat-card"><div class="stat-val" style="color:#bc8cff;">${(latest.visits||0).toLocaleString()}</div><div class="stat-label">Profile Visits</div></div>`;

// Chart
const chart=document.getElementById('followerChart');
if(data.length<2){chart.innerHTML='<p style="text-align:center;color:#8b949e;padding-top:80px;">Log at least 2 entries to see the chart</p>';}
else{
const last14=data.slice(-14);
const max=Math.max(...last14.map(d=>d.followers),1);
const barWidth=Math.max(20,Math.floor((chart.offsetWidth-20)/last14.length)-4);
chart.innerHTML=last14.map((d,i)=>{
const h=Math.max(4,(d.followers/max)*180);
const left=i*(barWidth+4)+2;
return `<div class="chart-bar" style="left:${left}px;height:${h}px;width:${barWidth}px;" title="${d.date}: ${d.followers}"><div class="chart-label">${d.date.slice(5)}</div></div>`;
}).join('');
}

// Insights
const ins=[];
if(data.length>=7){
const last7=data.slice(-7);
const avgEng=last7.reduce((s,d)=>s+(d.impressions?d.engagements/d.impressions*100:0),0)/7;
const totalGrowth=last7[last7.length-1].followers-last7[0].followers;
ins.push({type:totalGrowth>0?'good':'warn',text:`7-day follower change: ${totalGrowth>=0?'+':''}${totalGrowth} (${(totalGrowth/Math.max(last7[0].followers,1)*100).toFixed(1)}%)`});
ins.push({type:avgEng>=2?'good':'warn',text:`7-day avg engagement rate: ${avgEng.toFixed(2)}% ${avgEng>=2?'(healthy)':'(needs improvement)'}`});
}
if(data.length>=2){
const growth=latest.followers-prev.followers;
if(growth>0)ins.push({type:'good',text:`Growing! +${growth} followers since last entry.`});
else if(growth<0)ins.push({type:'warn',text:`Lost ${Math.abs(growth)} followers. Review recent content for engagement.`});
}
if(!data.length)ins.push({type:'info',text:'Start logging daily stats to see growth insights here.'});
document.getElementById('insights').innerHTML=ins.map(i=>`<div style="padding:10px 14px;margin-bottom:8px;border-radius:8px;font-size:13px;background:${i.type==='good'?'rgba(57,211,83,0.1);border:1px solid rgba(57,211,83,0.2);color:#39d353':i.type==='warn'?'rgba(240,136,62,0.1);border:1px solid rgba(240,136,62,0.2);color:#f0883e':'rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.2);color:#58a6ff'}">${i.text}</div>`).join('');

// History
document.getElementById('historyBody').innerHTML=data.slice().reverse().map((d,i)=>{
const engR=d.impressions?(d.engagements/d.impressions*100).toFixed(2)+'%':'N/A';
return `<tr><td>${d.date}</td><td>${d.followers.toLocaleString()}</td><td>${d.impressions.toLocaleString()}</td><td>${d.engagements.toLocaleString()}</td><td>${engR}</td><td><button class="btn btn-sm btn-secondary" style="padding:2px 8px;font-size:11px;color:#f85149;" onclick="deleteEntry(${data.length-1-i})">Del</button></td></tr>`;
}).join('');
}

function exportData(){
const data=getData();
if(!data.length){showToast('No data to export');return;}
let csv='Date,Followers,Impressions,Engagements,Likes,Retweets,Replies,ProfileVisits\n';
data.forEach(d=>csv+=`${d.date},${d.followers},${d.impressions},${d.engagements},${d.likes},${d.retweets},${d.replies},${d.visits}\n`);
navigator.clipboard.writeText(csv);showToast('CSV copied to clipboard!');
}

function clearAllData(){if(confirm('Delete all analytics data?')){localStorage.removeItem('sc_xdash_data');render();showToast('All data cleared');}}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

render();
</script>
