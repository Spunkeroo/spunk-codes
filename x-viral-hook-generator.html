<body>

<div class="container">
<h1>X Viral Hook <span>Generator</span></h1>
<p class="subtitle">Generate viral tweet hooks using 50+ proven templates that drive engagement</p>

<div class="glass-card">
<div class="card-title">Your Topic</div>
<div class="row" style="margin-bottom:16px;">
<div><label>Topic / Niche</label><input type="text" id="topic" placeholder="e.g., AI, productivity, startup growth" oninput="saveInput()"></div>
<div><label>Your Specific Result / Number</label><input type="text" id="result" placeholder="e.g., 10K followers, $50K MRR, 3 years" oninput="saveInput()"></div>
</div>
<div class="row" style="margin-bottom:16px;">
<div><label>Target Audience</label><input type="text" id="audience" placeholder="e.g., founders, developers, creators" oninput="saveInput()"></div>
<div><label>Hooks to Generate</label><select id="hookCount"><option value="5">5 hooks</option><option value="10" selected>10 hooks</option><option value="15">15 hooks</option><option value="20">20 hooks</option></select></div>
</div>
</div>

<div class="glass-card">
<div class="card-title">Hook Categories</div>
<div class="category-tags" id="catTags"></div>
</div>

<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
<button class="btn btn-primary" onclick="generate()">Generate Hooks</button>
<button class="btn btn-secondary" onclick="shuffleHooks()">Shuffle</button>
</div>

<div id="results"></div>

<div class="glass-card">
<div class="card-title">Saved Hooks</div>
<div id="savedList"></div>
</div>
</div>

<div class="watermark">SPUNK.CODES</div>
<div class="toast" id="toast"></div>

<script>
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='u'))e.preventDefault();});

const CATEGORIES=[
{id:'curiosity',name:'Curiosity Gap',color:'#58a6ff'},
{id:'bold',name:'Bold Claim',color:'#f85149'},
{id:'story',name:'Story Opener',color:'#39d353'},
{id:'data',name:'Data/Numbers',color:'#f0883e'},
{id:'question',name:'Question Hook',color:'#bc8cff'},
{id:'contrarian',name:'Contrarian',color:'#79c0ff'},
{id:'listicle',name:'Listicle',color:'#56d364'},
{id:'urgency',name:'Urgency/FOMO',color:'#f85149'}
];

const TEMPLATES={
curiosity:[
"Most people don't realize {topic} can {result}.\n\nHere's what they're missing:",
"I spent 6 months studying {topic}.\n\nThe #1 thing nobody talks about:",
"The secret to {topic} that {audience} overlook:\n\n(This changed everything for me)",
"99% of {audience} get {topic} wrong.\n\nThe 1% who get it right do this:",
"What if I told you {topic} is easier than you think?\n\nHere's the proof:",
"There's a hidden pattern in {topic} that top {audience} exploit.\n\nLet me show you:"
],
bold:[
"Hot take: {topic} is broken.\n\nAnd I have the receipts to prove it.",
"{topic} advice from 2024 is dead.\n\nHere's what actually works in 2026:",
"I'm going to say what most {audience} won't:\n\n{topic} doesn't require talent. It requires this:",
"Unpopular opinion: You don't need {topic} to {result}.\n\nYou need this instead:",
"Stop doing {topic} the hard way.\n\nThe shortcut nobody shares:",
"Everyone says {topic} takes years.\n\nI did it in months. Here's how:"
],
story:[
"{result} ago, I knew nothing about {topic}.\n\nToday I {result}.\n\nHere's the full story:",
"I almost gave up on {topic}.\n\nThen one conversation changed everything:",
"From zero to {result} with {topic}.\n\nThe journey nobody sees:",
"3 years ago I was struggling with {topic}.\n\nWhat happened next surprised everyone:",
"The worst day of my {topic} journey taught me the best lesson:",
"I failed at {topic} 7 times before this one thing clicked:"
],
data:[
"I analyzed 1,000+ {topic} accounts.\n\nHere are the patterns of the top 1%:",
"{result} in {topic}. Here are the exact numbers:\n\n(Full breakdown below)",
"The data is clear: {audience} who do this 1 thing grow 3x faster at {topic}:",
"I tracked every {topic} metric for 90 days.\n\nThe results will surprise you:",
"After {result}, here are my real {topic} numbers:\n\n(No fluff, just data)",
"Study: {audience} who master {topic} earn 2-5x more.\n\nHere's the breakdown:"
],
question:[
"What's the ONE {topic} skill that separates good {audience} from great ones?\n\n(It's not what you think)",
"If you could only give one piece of {topic} advice to {audience}, what would it be?\n\nMine:",
"Why do 90% of {audience} fail at {topic}?\n\nI asked 50 successful ones. Their answer:",
"What would you do if you had to start {topic} from zero today?\n\nHere's my exact plan:",
"Is {topic} still worth it in 2026?\n\nHere's what the data actually says:",
"Why aren't more {audience} talking about this {topic} strategy?"
],
contrarian:[
"Everyone's doing {topic} wrong and here's proof:\n\n(Warning: this might upset some {audience})",
"The {topic} advice that ruined my progress:\n\n\"Just {result}\"\n\nHere's what actually works:",
"Controversial: The best {audience} don't focus on {topic}.\n\nThey focus on this instead:",
"I stopped following popular {topic} advice.\n\nMy results 3x'd in 30 days:",
"The biggest lie in {topic}: \"You need {result} to succeed.\"\n\nReality:",
"What if everything you know about {topic} is backwards?"
],
listicle:[
"7 {topic} lessons I learned the hard way:\n\n(So you don't have to)",
"10 {topic} mistakes {audience} make daily:\n\n(#7 costs the most)",
"5 tools every {audience} needs for {topic}:\n\n(All free)",
"8 signs your {topic} strategy is working:\n\n(Most {audience} miss #4)",
"The top 10 {topic} trends for 2026:\n\n(#1 changes everything)",
"6 {topic} habits of the most successful {audience}:"
],
urgency:[
"If you're not doing this with {topic} in 2026, you're already behind:\n\n(Time-sensitive)",
"The {topic} window is closing fast.\n\nHere's why {audience} need to act NOW:",
"{topic} is changing faster than ever.\n\n{audience} who adapt will win. Here's how:",
"In 12 months, {topic} will look completely different.\n\nPrepare now:",
"The {audience} who start {topic} today will dominate tomorrow.\n\nHere's the playbook:",
"Warning to all {audience}: {topic} is about to shift dramatically."
]
};

let activeCategories=new Set(CATEGORIES.map(c=>c.id));
let generatedHooks=[];

function renderCatTags(){
document.getElementById('catTags').innerHTML=CATEGORIES.map(c=>`<span class="cat-tag ${activeCategories.has(c.id)?'active':''}" style="${activeCategories.has(c.id)?`border-color:${c.color};color:${c.color};`:''}" onclick="toggleCat('${c.id}')">${c.name}</span>`).join('');
}

function toggleCat(id){
if(activeCategories.has(id))activeCategories.delete(id);else activeCategories.add(id);
renderCatTags();
}

function fillTemplate(tpl,topic,result,audience){
return tpl.replace(/\{topic\}/g,topic||'[your topic]').replace(/\{result\}/g,result||'[your result]').replace(/\{audience\}/g,audience||'[your audience]');
}

function generate(){
const topic=document.getElementById('topic').value.trim();
const result=document.getElementById('result').value.trim();
const audience=document.getElementById('audience').value.trim();
const count=parseInt(document.getElementById('hookCount').value);
if(!topic){showToast('Enter a topic first');return;}
let pool=[];
activeCategories.forEach(cat=>{
if(TEMPLATES[cat])TEMPLATES[cat].forEach(t=>pool.push({text:fillTemplate(t,topic,result,audience),category:cat}));
});
for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
generatedHooks=pool.slice(0,count);
renderResults();
}

function shuffleHooks(){
if(!generatedHooks.length){showToast('Generate hooks first');return;}
for(let i=generatedHooks.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[generatedHooks[i],generatedHooks[j]]=[generatedHooks[j],generatedHooks[i]];}
renderResults();
}

function renderResults(){
const el=document.getElementById('results');
const catMap={};CATEGORIES.forEach(c=>catMap[c.id]=c);
el.innerHTML=generatedHooks.map((h,i)=>{
const cat=catMap[h.category];
return `<div class="hook-result" onclick="copyHook(${i})"><div class="hook-text">${h.text.replace(/</g,'&lt;')}</div><div class="hook-meta"><span class="hook-type" style="background:${cat.color}15;color:${cat.color};">${cat.name}</span><div style="display:flex;gap:8px;"><button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();copyHook(${i})">Copy</button><button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();saveHook(${i})">Save</button></div></div></div>`;
}).join('');
}

function copyHook(i){
navigator.clipboard.writeText(generatedHooks[i].text);
showToast('Hook copied!');
}

function saveHook(i){
const saved=JSON.parse(localStorage.getItem('sc_xhooks_saved')||'[]');
saved.unshift({...generatedHooks[i],date:new Date().toISOString()});
if(saved.length>50)saved.pop();
localStorage.setItem('sc_xhooks_saved',JSON.stringify(saved));
renderSaved();showToast('Hook saved!');
}

function renderSaved(){
const saved=JSON.parse(localStorage.getItem('sc_xhooks_saved')||'[]');
const el=document.getElementById('savedList');
if(!saved.length){el.innerHTML='<p style="color:#8b949e;font-size:13px;">No saved hooks yet. Generate and save your favorites!</p>';return;}
el.innerHTML=saved.map((s,i)=>`<div class="hook-result"><div class="hook-text" style="font-size:13px;">${s.text.replace(/</g,'&lt;').substring(0,150)}...</div><div class="hook-meta"><span style="font-size:11px;color:#8b949e;">${new Date(s.date).toLocaleDateString()}</span><div style="display:flex;gap:8px;"><button class="btn btn-sm btn-secondary" onclick="navigator.clipboard.writeText(${JSON.stringify(s.text).replace(/"/g,'&quot;')});showToast('Copied!')">Copy</button><button class="btn btn-sm btn-secondary" style="color:#f85149;" onclick="deleteSaved(${i})">Del</button></div></div></div>`).join('');
}

function deleteSaved(i){
const saved=JSON.parse(localStorage.getItem('sc_xhooks_saved')||'[]');
saved.splice(i,1);localStorage.setItem('sc_xhooks_saved',JSON.stringify(saved));renderSaved();
}

function saveInput(){
localStorage.setItem('sc_xhooks_input',JSON.stringify({topic:document.getElementById('topic').value,result:document.getElementById('result').value,audience:document.getElementById('audience').value}));
}

function loadInput(){
try{const d=JSON.parse(localStorage.getItem('sc_xhooks_input'));if(d){document.getElementById('topic').value=d.topic||'';document.getElementById('result').value=d.result||'';document.getElementById('audience').value=d.audience||'';}}catch(e){}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

renderCatTags();loadInput();renderSaved();
</script>
</body>
