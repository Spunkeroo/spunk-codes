<body>
<nav><div class="nav-logo">SPUNK.CODES</div><div class="nav-links"><a href="/store.html">Store</a><a href="/free-tools.html">Free Tools</a><a href="/blog.html">Blog</a></div></nav>
<div class="container">
<h1>X Audience <span>Persona</span></h1>
<p class="subtitle">Build detailed audience personas to create content that resonates</p>

<div class="glass-card">
<div class="card-title">Demographics</div>
<div class="row" style="margin-bottom:16px;">
<div><label>Persona Name</label><input type="text" id="pName" placeholder="e.g., Startup Steve" oninput="autoSave()"></div>
<div><label>Age Range</label><select id="pAge" onchange="autoSave()"><option>18-24</option><option>25-34</option><option selected>25-44</option><option>35-54</option><option>45-65</option><option>65+</option></select></div>
</div>
<div class="row" style="margin-bottom:16px;">
<div><label>Job Title / Role</label><input type="text" id="pRole" placeholder="e.g., Founder, Developer, Creator" oninput="autoSave()"></div>
<div><label>Location</label><input type="text" id="pLocation" placeholder="e.g., US, Global, EU" oninput="autoSave()"></div>
</div>
<div class="row">
<div><label>Income Level</label><select id="pIncome" onchange="autoSave()"><option>Student/Entry</option><option>$30K-$60K</option><option selected>$60K-$100K</option><option>$100K-$200K</option><option>$200K+</option></select></div>
<div><label>Education</label><select id="pEdu" onchange="autoSave()"><option>Self-taught</option><option>High School</option><option selected>Bachelor's</option><option>Master's/PhD</option></select></div>
</div>
</div>

<div class="glass-card">
<div class="card-title">Psychographics</div>
<div style="margin-bottom:16px;"><label>Goals & Aspirations</label><textarea id="pGoals" rows="3" placeholder="What does this person want to achieve? e.g., Build a profitable SaaS, grow a personal brand, learn to code..." oninput="autoSave()"></textarea></div>
<div style="margin-bottom:16px;"><label>Pain Points & Frustrations</label><textarea id="pPains" rows="3" placeholder="What keeps them up at night? e.g., Not enough leads, imposter syndrome, information overload..." oninput="autoSave()"></textarea></div>
<div style="margin-bottom:16px;"><label>Values & Beliefs</label><textarea id="pValues" rows="2" placeholder="What do they care about? e.g., Transparency, hustle culture, work-life balance, innovation..." oninput="autoSave()"></textarea></div>
<div><label>Favorite Accounts They Follow</label><textarea id="pFollows" rows="2" placeholder="@account1, @account2, @account3..." oninput="autoSave()"></textarea></div>
</div>

<div class="glass-card">
<div class="card-title">Content Preferences</div>
<div class="row" style="margin-bottom:16px;">
<div><label>Content Types They Engage With</label><textarea id="pContent" rows="2" placeholder="e.g., Threads, hot takes, how-tos, memes, case studies..." oninput="autoSave()"></textarea></div>
<div><label>Topics They Care About</label><textarea id="pTopics" rows="2" placeholder="e.g., AI, startups, productivity, crypto, design..." oninput="autoSave()"></textarea></div>
</div>
<div class="row">
<div><label>Active Times on X</label><select id="pTimes" onchange="autoSave()"><option>Early morning (6-9 AM)</option><option selected>Morning (9 AM-12 PM)</option><option>Afternoon (12-5 PM)</option><option>Evening (5-9 PM)</option><option>Late night (9 PM+)</option></select></div>
<div><label>Engagement Style</label><select id="pEngStyle" onchange="autoSave()"><option>Lurker (reads, rarely engages)</option><option selected>Light engager (likes, bookmarks)</option><option>Active (replies, retweets)</option><option>Power user (creates content too)</option></select></div>
</div>
</div>

<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
<button class="btn btn-primary" onclick="generatePersona()">Generate Persona Card</button>
<button class="btn btn-success" onclick="savePersona()">Save Persona</button>
<button class="btn btn-secondary" onclick="clearForm()">Clear Form</button>
<button class="btn btn-secondary" onclick="exportPersona()">Export</button>
</div>

<div id="personaOutput"></div>

<div class="glass-card">
<div class="card-title">Saved Personas</div>
<div id="savedList"></div>
</div>
</div>

<div class="watermark">SPUNK.CODES</div>
<div class="toast" id="toast"></div>
<footer><a href="/store.html">Store</a> | <a href="/blog.html">Blog</a> | <a href="https://x.com/SpunkArt13" target="_blank">@SpunkArt13 on X</a></footer>

<script>
document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='u'))e.preventDefault();});

const FIELDS=['pName','pAge','pRole','pLocation','pIncome','pEdu','pGoals','pPains','pValues','pFollows','pContent','pTopics','pTimes','pEngStyle'];
const AVATARS=['#58a6ff','#39d353','#f0883e','#f85149','#bc8cff','#79c0ff'];

function getFormData(){const d={};FIELDS.forEach(f=>{const el=document.getElementById(f);d[f]=el.value;});return d;}
function setFormData(d){FIELDS.forEach(f=>{if(d[f])document.getElementById(f).value=d[f];});}

function autoSave(){localStorage.setItem('sc_xpersona_draft',JSON.stringify(getFormData()));}
function loadDraft(){try{const d=JSON.parse(localStorage.getItem('sc_xpersona_draft'));if(d)setFormData(d);}catch(e){}}

function generatePersona(){
const d=getFormData();
if(!d.pName){showToast('Enter a persona name');return;}
const initial=d.pName.charAt(0).toUpperCase();
const color=AVATARS[d.pName.length%AVATARS.length];
const goals=d.pGoals.split(',').map(g=>g.trim()).filter(g=>g);
const pains=d.pPains.split(',').map(p=>p.trim()).filter(p=>p);
const topics=d.pTopics.split(',').map(t=>t.trim()).filter(t=>t);
document.getElementById('personaOutput').innerHTML=`
<div class="persona-card">
<div class="persona-header">
<div class="persona-avatar" style="background:${color};">${initial}</div>
<div><div class="persona-name">${d.pName}</div><div class="persona-role">${d.pRole} | ${d.pAge} | ${d.pLocation}</div></div>
</div>
<div class="section-label">Demographics</div>
<p style="font-size:13px;color:#8b949e;">Income: ${d.pIncome} | Education: ${d.pEdu} | Active: ${d.pTimes}</p>
<div class="section-label">Goals & Aspirations</div>
<div class="tag-list">${goals.map(g=>`<span class="tag" style="background:#39d35322;color:#39d353;">${g}</span>`).join('')||'<span style="color:#484f58;font-size:13px;">Not specified</span>'}</div>
<div class="section-label">Pain Points</div>
<div class="tag-list">${pains.map(p=>`<span class="tag" style="background:#f8514922;color:#f85149;">${p}</span>`).join('')||'<span style="color:#484f58;font-size:13px;">Not specified</span>'}</div>
<div class="section-label">Topics of Interest</div>
<div class="tag-list">${topics.map(t=>`<span class="tag" style="background:#58a6ff22;color:#58a6ff;">${t}</span>`).join('')||'<span style="color:#484f58;font-size:13px;">Not specified</span>'}</div>
<div class="section-label">Content Preferences</div>
<p style="font-size:13px;color:#8b949e;">${d.pContent||'Not specified'}</p>
<div class="section-label">Engagement Style</div>
<p style="font-size:13px;color:#8b949e;">${d.pEngStyle} | Follows: ${d.pFollows||'Not specified'}</p>
<div class="section-label">Content Strategy Recommendations</div>
<ul style="font-size:13px;color:#8b949e;padding-left:20px;margin-top:4px;">
${goals.length?`<li>Create content showing how to achieve: ${goals[0]}</li>`:''}
${pains.length?`<li>Address their frustration with: ${pains[0]}</li>`:''}
${topics.length?`<li>Post about: ${topics.join(', ')}</li>`:''}
<li>Post during: ${d.pTimes}</li>
<li>Format: Focus on ${d.pContent||'varied formats'} since they're a ${d.pEngStyle.toLowerCase()}</li>
</ul>
</div>`;
}

function savePersona(){
const d=getFormData();
if(!d.pName){showToast('Enter a persona name first');return;}
const saved=JSON.parse(localStorage.getItem('sc_xpersona_saved')||'[]');
saved.unshift({...d,date:new Date().toISOString()});
if(saved.length>20)saved.pop();
localStorage.setItem('sc_xpersona_saved',JSON.stringify(saved));
renderSaved();showToast('Persona saved!');
}

function renderSaved(){
const saved=JSON.parse(localStorage.getItem('sc_xpersona_saved')||'[]');
const el=document.getElementById('savedList');
if(!saved.length){el.innerHTML='<p style="color:#8b949e;font-size:13px;">No saved personas yet.</p>';return;}
el.innerHTML=saved.map((s,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .3s;" onclick="loadPersona(${i})"><div><div style="font-size:14px;font-weight:600;">${s.pName}</div><div style="font-size:12px;color:#8b949e;">${s.pRole} | ${s.pAge}</div></div><div style="display:flex;gap:8px;"><button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();loadPersona(${i})">Load</button><button class="btn btn-sm btn-secondary" style="color:#f85149;" onclick="event.stopPropagation();deletePersona(${i})">Del</button></div></div>`).join('');
}

function loadPersona(i){
const saved=JSON.parse(localStorage.getItem('sc_xpersona_saved')||'[]');
if(saved[i]){setFormData(saved[i]);generatePersona();showToast('Persona loaded!');}
}

function deletePersona(i){
const saved=JSON.parse(localStorage.getItem('sc_xpersona_saved')||'[]');
saved.splice(i,1);localStorage.setItem('sc_xpersona_saved',JSON.stringify(saved));renderSaved();
}

function clearForm(){FIELDS.forEach(f=>document.getElementById(f).value='');document.getElementById('personaOutput').innerHTML='';localStorage.removeItem('sc_xpersona_draft');}

function exportPersona(){
const d=getFormData();
if(!d.pName){showToast('Generate a persona first');return;}
const text=`AUDIENCE PERSONA: ${d.pName}\n${'='.repeat(40)}\nRole: ${d.pRole}\nAge: ${d.pAge}\nLocation: ${d.pLocation}\nIncome: ${d.pIncome}\nEducation: ${d.pEdu}\n\nGOALS:\n${d.pGoals}\n\nPAIN POINTS:\n${d.pPains}\n\nVALUES:\n${d.pValues}\n\nFAVORITE ACCOUNTS:\n${d.pFollows}\n\nCONTENT PREFERENCES:\n${d.pContent}\n\nTOPICS:\n${d.pTopics}\n\nACTIVE TIMES: ${d.pTimes}\nENGAGEMENT STYLE: ${d.pEngStyle}`;
navigator.clipboard.writeText(text);showToast('Persona exported to clipboard!');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadDraft();renderSaved();
</script>
