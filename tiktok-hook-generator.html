]

const tips={
curiosity:"Open a loop the viewer MUST close. Never reveal the answer in the hook.",
controversial:"Lean in hard with your delivery. Confident tone sells hot takes.",
storytelling:"Start mid-action. Drop the viewer into the most exciting part first.",
educational:"Lead with the benefit, not the process. Promise transformation.",
shock:"Use facial expressions and pauses to amplify the surprise factor.",
relatable:"Match the viewer's internal dialogue. They should feel called out.",
challenge:"Use direct eye contact and point at the camera. Make it personal.",
listicle:"Show the number visually on screen. Tease the best item."
};

let savedHooks=JSON.parse(localStorage.getItem('tthg_saved')||'[]');

function generateHooks(count=5){
const niche=document.getElementById('niche').value.trim()||'your niche';
const subject=document.getElementById('subject').value.trim()||niche;
const style=document.getElementById('hookStyle').value;
const results=document.getElementById('results');
let hooks=[];
const styles=style==='all'?Object.keys(hookTemplates):[style];
for(let i=0;i<count;i++){
const s=styles[Math.floor(Math.random()*styles.length)];
const templates=hookTemplates[s];
const template=templates[Math.floor(Math.random()*templates.length)];
const text=template.replace(/\{niche\}/g,niche).replace(/\{subject\}/g,subject);
hooks.push({type:s,text,tip:tips[s]});
}
let html='';
hooks.forEach((h,i)=>{
html+=`<div class="hook-result">
<div class="hook-type">${h.type}</div>
<div class="hook-text">${h.text}</div>
<div class="hook-tip">Tip: ${h.tip}</div>
<div class="hook-actions">
<button class="btn-sm" onclick="copyHook(this,'${escapeQuotes(h.text)}')">Copy</button>
<button class="btn-sm" onclick="saveHook(this,'${escapeQuotes(h.text)}','${h.type}')">Save</button>
</div>
</div>`;
});
results.innerHTML=html;
showToast(`Generated ${count} hooks!`);
}

function escapeQuotes(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

function copyHook(btn,text){
navigator.clipboard.writeText(text.replace(/&quot;/g,'"'));
btn.textContent='Copied!';btn.classList.add('copied');
setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},1500);
}

function saveHook(btn,text,type){
text=text.replace(/&quot;/g,'"');
if(!savedHooks.find(h=>h.text===text)){
savedHooks.push({text,type,date:new Date().toISOString()});
localStorage.setItem('tthg_saved',JSON.stringify(savedHooks));
btn.textContent='Saved!';btn.classList.add('saved');
renderSaved();
showToast('Hook saved!');
}
}

function renderSaved(){
const section=document.getElementById('savedSection');
const list=document.getElementById('savedList');
document.getElementById('savedCount').textContent=savedHooks.length;
if(savedHooks.length===0){section.style.display='none';return;}
section.style.display='block';
list.innerHTML=savedHooks.map((h,i)=>`<div class="hook-result">
<div class="hook-type">${h.type}</div>
<div class="hook-text">${h.text}</div>
<div class="hook-actions">
<button class="btn-sm" onclick="copyHook(this,'${escapeQuotes(h.text)}')">Copy</button>
<button class="btn-sm" onclick="removeSaved(${i})">Remove</button>
</div>
</div>`).join('');
}

function removeSaved(i){
savedHooks.splice(i,1);
localStorage.setItem('tthg_saved',JSON.stringify(savedHooks));
renderSaved();
}

function clearSaved(){
if(confirm('Clear all saved hooks?')){
savedHooks=[];localStorage.removeItem('tthg_saved');renderSaved();
}
}

function exportSaved(){
const text=savedHooks.map((h,i)=>`${i+1}. [${h.type.toUpperCase()}] ${h.text}`).join('\n');
navigator.clipboard.writeText(text);
showToast('All hooks copied to clipboard!');
}

function clearResults(){document.getElementById('results').innerHTML='';}

function showToast(msg){
const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2000);
}

renderSaved();
