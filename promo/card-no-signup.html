<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPUNK.CODES — Zero Sign-Up</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 675px;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 40%, #0d1117 100%);
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .glow-1 {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(57,211,83,0.12) 0%, transparent 70%);
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 0;
  }
  .glow-2 {
    position: absolute;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(88,166,255,0.08) 0%, transparent 70%);
    bottom: -80px;
    right: 50px;
    z-index: 0;
  }

  .brand {
    position: absolute;
    top: 28px;
    right: 40px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(88,166,255,0.6);
    text-transform: uppercase;
    z-index: 2;
  }

  .content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    z-index: 1;
  }
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 40px 60px 60px;
  }
  .headline {
    font-size: 66px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -2px;
  }
  .headline span {
    color: #39d353;
  }
  .subline {
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 38px;
  }
  .cta {
    display: inline-block;
    background: rgba(57,211,83,0.1);
    border: 1px solid rgba(57,211,83,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 19px;
    font-weight: 700;
    color: #39d353;
    letter-spacing: 0.5px;
    width: fit-content;
  }

  /* Right side -- crossed out form */
  .right {
    width: 460px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 60px 40px 20px;
  }
  .form-mockup {
    position: relative;
    width: 340px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 36px 28px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.4);
  }
  .form-title {
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.25);
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .form-field {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 14px;
    font-size: 14px;
    color: rgba(255,255,255,0.18);
    font-family: inherit;
  }
  .form-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.2);
    margin-top: 6px;
  }

  /* Red X strike-through */
  .strike {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 3;
  }
  .strike-line {
    position: absolute;
    background: rgba(255,70,70,0.55);
    border-radius: 3px;
    height: 5px;
  }
  .strike-line-1 {
    top: 10%;
    left: 5%;
    width: 130%;
    transform: rotate(32deg);
    transform-origin: left center;
  }
  .strike-line-2 {
    bottom: 10%;
    left: 5%;
    width: 130%;
    transform: rotate(-32deg);
    transform-origin: left center;
  }

  /* Green checkmark */
  .checkmark {
    position: absolute;
    bottom: -28px;
    right: -22px;
    width: 84px;
    height: 84px;
    background: rgba(57,211,83,0.15);
    border: 3px solid #39d353;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    color: #39d353;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(57,211,83,0.25);
    z-index: 4;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #39d353, #58a6ff, #39d353);
    z-index: 2;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="brand">SPUNK.CODES</div>

  <div class="content">
    <div class="left">
      <div class="headline"><span>Zero</span> Sign-Up<br>Required</div>
      <div class="subline">Every tool works instantly.<br>No email. No BS.</div>
      <div class="cta">spunk.codes &mdash; just use it</div>
    </div>
    <div class="right">
      <div class="form-mockup">
        <div class="form-title">Create Account</div>
        <div class="form-field">Email address</div>
        <div class="form-field">Password</div>
        <div class="form-field">Confirm password</div>
        <div class="form-btn">Sign Up</div>
        <div class="strike">
          <div class="strike-line strike-line-1"></div>
          <div class="strike-line strike-line-2"></div>
        </div>
        <div class="checkmark">&#10003;</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
