<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPUNK.CODES — Automate Your Business</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 675px;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 40%, #0d1117 100%);
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .glow-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(57,211,83,0.1) 0%, transparent 70%);
    top: -200px;
    right: 100px;
    z-index: 0;
  }
  .glow-2 {
    position: absolute;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(88,166,255,0.07) 0%, transparent 70%);
    bottom: -80px;
    left: 200px;
    z-index: 0;
  }

  .brand {
    position: absolute;
    top: 28px;
    left: 40px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(88,166,255,0.6);
    text-transform: uppercase;
    z-index: 5;
  }

  .content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    z-index: 1;
  }
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 30px 60px 60px;
  }
  .premium-badge {
    display: inline-block;
    background: rgba(57,211,83,0.12);
    border: 1px solid rgba(57,211,83,0.3);
    border-radius: 50px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 700;
    color: #39d353;
    letter-spacing: 1.5px;
    width: fit-content;
    margin-bottom: 22px;
    text-transform: uppercase;
  }
  .headline {
    font-size: 64px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 18px;
    letter-spacing: -2px;
  }
  .headline span {
    background: linear-gradient(135deg, #39d353, #58a6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subline {
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .price-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 32px;
  }
  .price-dollar {
    font-size: 54px;
    font-weight: 800;
    color: #39d353;
  }
  .price-period {
    font-size: 22px;
    color: rgba(57,211,83,0.6);
    font-weight: 500;
  }
  .cta {
    display: inline-block;
    background: linear-gradient(135deg, rgba(57,211,83,0.12), rgba(88,166,255,0.08));
    border: 1px solid rgba(57,211,83,0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 19px;
    font-weight: 700;
    color: #39d353;
    letter-spacing: 0.5px;
    width: fit-content;
  }

  /* Right side -- dashboard */
  .right {
    width: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 50px 40px 10px;
  }
  .dashboard {
    width: 420px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 16px 56px rgba(0,0,0,0.4);
  }
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }
  .dash-title {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .dash-period {
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.04);
    padding: 4px 12px;
    border-radius: 6px;
  }
  .revenue {
    font-size: 40px;
    font-weight: 800;
    color: #39d353;
    margin-bottom: 4px;
    letter-spacing: -1px;
  }
  .revenue-change {
    font-size: 14px;
    color: #39d353;
    margin-bottom: 22px;
    font-weight: 600;
  }
  .chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 120px;
    margin-bottom: 22px;
  }
  .bar {
    flex: 1;
    border-radius: 6px 6px 0 0;
  }
  .bar:nth-child(1)  { height: 25%; background: rgba(88,166,255,0.25); }
  .bar:nth-child(2)  { height: 35%; background: rgba(88,166,255,0.3); }
  .bar:nth-child(3)  { height: 30%; background: rgba(88,166,255,0.28); }
  .bar:nth-child(4)  { height: 45%; background: rgba(88,166,255,0.35); }
  .bar:nth-child(5)  { height: 42%; background: rgba(88,166,255,0.33); }
  .bar:nth-child(6)  { height: 55%; background: rgba(57,211,83,0.35); }
  .bar:nth-child(7)  { height: 52%; background: rgba(57,211,83,0.33); }
  .bar:nth-child(8)  { height: 65%; background: rgba(57,211,83,0.4); }
  .bar:nth-child(9)  { height: 72%; background: rgba(57,211,83,0.45); }
  .bar:nth-child(10) { height: 80%; background: rgba(57,211,83,0.5); }
  .bar:nth-child(11) { height: 88%; background: rgba(57,211,83,0.55); }
  .bar:nth-child(12) { height: 100%; background: linear-gradient(180deg, #39d353, rgba(57,211,83,0.4)); box-shadow: 0 0 20px rgba(57,211,83,0.25); }
  .metrics {
    display: flex;
    gap: 14px;
  }
  .metric {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .metric-value {
    font-size: 20px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
  }
  .metric-value.green { color: #39d353; }
  .metric-label {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #39d353, #58a6ff, #39d353);
    z-index: 2;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="brand">SPUNK.CODES</div>

  <div class="content">
    <div class="left">
      <div class="premium-badge">Premium Tools</div>
      <div class="headline"><span>Automate</span><br>Your Business</div>
      <div class="subline">75 premium tools</div>
      <div class="price-row">
        <span class="price-dollar">$9</span>
        <span class="price-period">/mo</span>
      </div>
      <div class="cta">spunk.codes/pricing</div>
    </div>
    <div class="right">
      <div class="dashboard">
        <div class="dash-header">
          <span class="dash-title">Revenue</span>
          <span class="dash-period">Last 12 months</span>
        </div>
        <div class="revenue">$48,290</div>
        <div class="revenue-change">&#9650; 127% year over year</div>
        <div class="chart">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value green">+34%</div>
            <div class="metric-label">Conversions</div>
          </div>
          <div class="metric">
            <div class="metric-value">18h/wk</div>
            <div class="metric-label">Time Saved</div>
          </div>
          <div class="metric">
            <div class="metric-value green">412%</div>
            <div class="metric-label">ROI</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
