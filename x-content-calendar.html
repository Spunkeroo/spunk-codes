<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1117;color:#e6edf3;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6;min-height:100vh;}
a{color:#58a6ff;text-decoration:none;transition:color .3s;}a:hover{color:#79c0ff;}
::selection{background:#58a6ff33;color:#fff;}
::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-track{background:#0d1117;}::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px;}
nav{background:rgba(13,17,23,0.9);backdrop-filter:blur(12px);border-bottom:1px solid #21262d;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,#58a6ff,#39d353);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-links{display:flex;gap:20px;font-size:14px;font-weight:500;}.nav-links a{color:#8b949e;}.nav-links a:hover{color:#58a6ff;}
.container{max-width:1100px;margin:0 auto;padding:32px 20px 100px;}
h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#e6edf3,#8b949e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
h1 span{background:linear-gradient(135deg,#58a6ff,#39d353);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{color:#8b949e;font-size:15px;margin-bottom:28px;}
.glass-card{background:rgba(22,27,34,0.8);backdrop-filter:blur(10px);border:1px solid #21262d;border-radius:12px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden;transition:border-color .3s;}
.glass-card:hover{border-color:#30363d;}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#58a6ff33,transparent);}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;color:#e6edf3;}
label{display:block;font-size:13px;font-weight:600;color:#8b949e;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
input,textarea,select{width:100%;background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:10px 14px;color:#e6edf3;font-size:14px;font-family:inherit;transition:border-color .3s;resize:vertical;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff;box-shadow:0 0 0 3px #58a6ff22;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;border:1px solid transparent;}
.btn-primary{background:linear-gradient(135deg,#58a6ff,#388bfd);color:#fff;border-color:#58a6ff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px #58a6ff33;}
.btn-secondary{background:#21262d;color:#e6edf3;border-color:#30363d;}
.btn-secondary:hover{border-color:#58a6ff;color:#58a6ff;}
.btn-sm{padding:6px 14px;font-size:12px;}
.pillar-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.pillar-tag{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .3s;border:1px solid;}
.pillar-add{background:#0d1117;border:1px dashed #30363d;border-radius:20px;padding:6px 14px;font-size:13px;color:#8b949e;cursor:pointer;transition:all .3s;}
.pillar-add:hover{border-color:#58a6ff;color:#58a6ff;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:16px;}
@media(max-width:768px){.calendar-grid{grid-template-columns:repeat(2,1fr);}}
.day-col{background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:12px;min-height:200px;transition:all .3s;}
.day-col:hover{border-color:#30363d;}
.day-header{font-size:13px;font-weight:700;color:#58a6ff;margin-bottom:10px;text-align:center;padding-bottom:8px;border-bottom:1px solid #21262d;}
.cal-item{background:#161b22;border:1px solid #21262d;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:12px;cursor:pointer;transition:all .3s;position:relative;}
.cal-item:hover{border-color:#58a6ff;}
.cal-item .pillar-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.cal-item .del{position:absolute;top:4px;right:6px;color:#f85149;cursor:pointer;font-size:10px;opacity:0;transition:opacity .3s;}
.cal-item:hover .del{opacity:1;}
.type-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-top:4px;}
.week-nav{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.week-nav button{background:none;border:1px solid #21262d;color:#8b949e;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .3s;}
.week-nav button:hover{border-color:#58a6ff;color:#58a6ff;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:640px){.row{grid-template-columns:1fr;}}
.stat-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
.stat-box{flex:1;min-width:120px;background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:14px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;color:#58a6ff;}
.stat-label{font-size:11px;color:#8b949e;text-transform:uppercase;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(135deg,#39d353,#2ea043);color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.watermark{position:fixed;bottom:14px;right:18px;font-size:14px;font-weight:800;color:rgba(88,166,255,.08);pointer-events:none;z-index:50;letter-spacing:1px;}
footer{text-align:center;padding:40px 20px 30px;color:#484f58;font-size:13px;border-top:1px solid #21262d;}
footer a{color:#8b949e;margin:0 12px;}footer a:hover{color:#58a6ff;}
</style>

<body>
<nav><div class="nav-logo">SPUNK.CODES</div><div class="nav-links"><a href="/store.html">Store</a><a href="/free-tools.html">Free Tools</a><a href="/blog.html">Blog</a></div></nav>
<div class="container">
<h1>X Content <span>Calendar</span></h1>
<p class="subtitle">Plan your weekly X/Twitter content with content pillars and post type rotation</p>

<div class="glass-card">
<div class="card-title">Content Pillars</div>
<p style="font-size:13px;color:#8b949e;margin-bottom:12px;">Define 3-5 content pillars that your audience cares about</p>
<div class="pillar-tags" id="pillarTags"></div>
<div style="display:flex;gap:8px;">
<input type="text" id="newPillar" placeholder="Add a content pillar..." style="max-width:300px;" onkeydown="if(event.key==='Enter')addPillar()">
<button class="btn btn-sm btn-secondary" onclick="addPillar()">Add Pillar</button>
</div>
</div>

<div class="glass-card">
<div class="card-title">Add Content</div>
<div class="row" style="margin-bottom:12px;">
<div><label>Day</label><select id="addDay"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select></div>
<div><label>Content Pillar</label><select id="addPillar"></select></div>
</div>
<div class="row" style="margin-bottom:12px;">
<div><label>Post Type</label><select id="addType"><option value="tweet">Single Tweet</option><option value="thread">Thread</option><option value="quote">Quote Tweet</option><option value="poll">Poll</option><option value="image">Image/Graphic</option><option value="video">Video</option><option value="space">X Space</option></select></div>
<div><label>Time Slot</label><select id="addTime"><option>7:00 AM</option><option>8:00 AM</option><option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option><option>12:00 PM</option><option>1:00 PM</option><option>2:00 PM</option><option>3:00 PM</option><option>5:00 PM</option><option>7:00 PM</option><option>9:00 PM</option></select></div>
</div>
<div style="margin-bottom:12px;">
<label>Content Idea / Notes</label>
<textarea id="addNote" rows="2" placeholder="Brief description of the content..."></textarea>
</div>
<button class="btn btn-primary" onclick="addContent()">Add to Calendar</button>
</div>

<div class="glass-card">
<div class="card-title">Weekly Overview</div>
<div class="week-nav">
<button onclick="changeWeek(-1)">&larr; Prev</button>
<span id="weekLabel" style="font-weight:700;"></span>
<button onclick="changeWeek(1)">Next &rarr;</button>
</div>
<div class="stat-row" id="weekStats"></div>
<div class="calendar-grid" id="calendarGrid"></div>
</div>

<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;">
<button class="btn btn-secondary" onclick="exportCalendar()">Export as Text</button>
<button class="btn btn-secondary" onclick="autoFill()">Auto-Fill Week</button>
<button class="btn btn-secondary" onclick="clearWeek()">Clear This Week</button>
</div>
</div>

<div class="watermark">SPUNK.CODES</div>
<div class="toast" id="toast"></div>
<footer><a href="/store.html">Store</a> | <a href="/blog.html">Blog</a> | <a href="https://x.com/SpunkArt13" target="_blank">@SpunkArt13 on X</a></footer>

<script>
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='u'))e.preventDefault();});

const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const COLORS=['#58a6ff','#39d353','#f0883e','#f85149','#bc8cff','#79c0ff','#56d364'];
const TYPE_COLORS={tweet:'#58a6ff',thread:'#39d353',quote:'#f0883e',poll:'#bc8cff',image:'#f85149',video:'#56d364',space:'#79c0ff'};
let pillars=[];
let calendar={};
let currentWeekOffset=0;

function getWeekKey(){
const d=new Date();d.setDate(d.getDate()+currentWeekOffset*7);
const mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);
return mon.toISOString().split('T')[0];
}

function getWeekLabel(){
const d=new Date();d.setDate(d.getDate()+currentWeekOffset*7);
const mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);
const sun=new Date(mon);sun.setDate(mon.getDate()+6);
return `${mon.toLocaleDateString('en-US',{month:'short',day:'numeric'})} - ${sun.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
}

function loadData(){
pillars=JSON.parse(localStorage.getItem('sc_xcal_pillars')||'[]');
calendar=JSON.parse(localStorage.getItem('sc_xcal_data')||'{}');
if(!pillars.length)pillars=[{name:'Educational',color:COLORS[0]},{name:'Personal',color:COLORS[1]},{name:'Promotional',color:COLORS[2]},{name:'Engagement',color:COLORS[3]}];
}

function saveData(){
localStorage.setItem('sc_xcal_pillars',JSON.stringify(pillars));
localStorage.setItem('sc_xcal_data',JSON.stringify(calendar));
}

function renderPillars(){
const c=document.getElementById('pillarTags');
c.innerHTML=pillars.map((p,i)=>`<span class="pillar-tag" style="background:${p.color}22;border-color:${p.color};color:${p.color};" onclick="removePillar(${i})">${p.name} x</span>`).join('');
const sel=document.getElementById('addPillar');
sel.innerHTML=pillars.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
}

function addPillar(){
const input=document.getElementById('newPillar');
const name=input.value.trim();
if(!name)return;
pillars.push({name,color:COLORS[pillars.length%COLORS.length]});
input.value='';
saveData();renderPillars();renderCalendar();
}

function removePillar(i){
pillars.splice(i,1);
saveData();renderPillars();renderCalendar();
}

function addContent(){
const day=document.getElementById('addDay').value;
const pillar=document.getElementById('addPillar').value;
const type=document.getElementById('addType').value;
const time=document.getElementById('addTime').value;
const note=document.getElementById('addNote').value.trim();
if(!note){showToast('Add a content note');return;}
const wk=getWeekKey();
if(!calendar[wk])calendar[wk]={};
if(!calendar[wk][day])calendar[wk][day]=[];
calendar[wk][day].push({pillar,type,time,note});
calendar[wk][day].sort((a,b)=>a.time.localeCompare(b.time));
document.getElementById('addNote').value='';
saveData();renderCalendar();
showToast('Content added!');
}

function deleteItem(day,idx){
const wk=getWeekKey();
if(calendar[wk]&&calendar[wk][day]){calendar[wk][day].splice(idx,1);saveData();renderCalendar();}
}

function renderCalendar(){
const wk=getWeekKey();
const data=calendar[wk]||{};
document.getElementById('weekLabel').textContent=getWeekLabel();
let totalPosts=0,typeCount={},pillarCount={};
DAYS.forEach(d=>{
const items=data[d]||[];
totalPosts+=items.length;
items.forEach(it=>{typeCount[it.type]=(typeCount[it.type]||0)+1;pillarCount[it.pillar]=(pillarCount[it.pillar]||0)+1;});
});
document.getElementById('weekStats').innerHTML=`
<div class="stat-box"><div class="stat-val">${totalPosts}</div><div class="stat-label">Posts This Week</div></div>
<div class="stat-box"><div class="stat-val">${(totalPosts/7).toFixed(1)}</div><div class="stat-label">Posts/Day Avg</div></div>
<div class="stat-box"><div class="stat-val">${Object.keys(typeCount).length}</div><div class="stat-label">Content Types</div></div>
<div class="stat-box"><div class="stat-val">${Object.keys(pillarCount).length}</div><div class="stat-label">Pillars Used</div></div>`;
const grid=document.getElementById('calendarGrid');
grid.innerHTML=DAYS.map(d=>{
const items=data[d]||[];
const pillarColor=(name)=>{const p=pillars.find(pp=>pp.name===name);return p?p.color:'#8b949e';};
return `<div class="day-col"><div class="day-header">${d.slice(0,3)}</div>${items.map((it,i)=>`
<div class="cal-item"><span class="pillar-dot" style="background:${pillarColor(it.pillar)};"></span><strong>${it.time}</strong><br>${it.note.slice(0,60)}${it.note.length>60?'...':''}<br><span class="type-badge" style="background:${TYPE_COLORS[it.type]||'#58a6ff'}22;color:${TYPE_COLORS[it.type]||'#58a6ff'};">${it.type}</span><span class="del" onclick="event.stopPropagation();deleteItem('${d}',${i})">X</span></div>`).join('')}${!items.length?'<p style="font-size:11px;color:#484f58;text-align:center;margin-top:20px;">No content</p>':''}</div>`;
}).join('');
}

function changeWeek(dir){currentWeekOffset+=dir;renderCalendar();}

function autoFill(){
if(!pillars.length){showToast('Add content pillars first');return;}
const wk=getWeekKey();
if(!calendar[wk])calendar[wk]={};
const types=['tweet','thread','image','poll','tweet','video','tweet'];
const times=['9:00 AM','12:00 PM','3:00 PM','5:00 PM'];
DAYS.forEach((d,di)=>{
if(!calendar[wk][d])calendar[wk][d]=[];
if(calendar[wk][d].length===0){
const pillar=pillars[di%pillars.length];
const type=types[di];
const time=times[di%times.length];
calendar[wk][d].push({pillar:pillar.name,type,time,note:`${pillar.name} ${type} - [Add your idea here]`});
}
});
saveData();renderCalendar();
showToast('Week auto-filled!');
}

function clearWeek(){
const wk=getWeekKey();
delete calendar[wk];
saveData();renderCalendar();
showToast('Week cleared');
}

function exportCalendar(){
const wk=getWeekKey();
const data=calendar[wk]||{};
let text=`X Content Calendar - ${getWeekLabel()}\n${'='.repeat(50)}\n\n`;
DAYS.forEach(d=>{
text+=`${d}:\n`;
const items=data[d]||[];
if(!items.length)text+='  (no content planned)\n';
items.forEach(it=>text+=`  ${it.time} | ${it.type.toUpperCase()} | ${it.pillar} | ${it.note}\n`);
text+='\n';
});
navigator.clipboard.writeText(text);
showToast('Calendar copied to clipboard!');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadData();renderPillars();renderCalendar();
</script>
</body>
</html>
